<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正文美化 · 修真叙事</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================== 主题变量 ================== */
      :root,
      [data-theme='dark'] {
        --rb-bg: #1a1a2e;
        --rb-paper: linear-gradient(180deg, rgba(45, 40, 60, 0.95) 0%, rgba(30, 25, 45, 0.98) 100%);
        --rb-paper-flat: rgba(45, 40, 60, 0.92);
        --rb-text: #e8d5b7;
        --rb-text-muted: #a89888;
        --rb-text-soft: #c5b696;
        --rb-accent: #a89968;
        --rb-accent-glow: rgba(168, 153, 104, 0.45);
        --rb-border: #a89968;
        --rb-border-soft: rgba(168, 153, 104, 0.4);
        --rb-narration-bg: rgba(255, 255, 255, 0.03);
        --rb-narration-border: rgba(168, 153, 104, 0.18);
        --rb-toolbar-bg: rgba(20, 15, 35, 0.92);
        --rb-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        --rb-shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.25);
        --rb-bubble-bg: linear-gradient(135deg, rgba(70, 60, 90, 0.65) 0%, rgba(50, 40, 70, 0.85) 100%);
        --rb-bubble-border: rgba(168, 153, 104, 0.55);
      }

      [data-theme='light'] {
        --rb-bg: #f5efe1;
        --rb-paper: linear-gradient(180deg, #fffef9 0%, #f7f1e3 100%);
        --rb-paper-flat: #fffef9;
        --rb-text: #2a2520;
        --rb-text-muted: #8b8275;
        --rb-text-soft: #5a5249;
        --rb-accent: #a07f48;
        --rb-accent-glow: rgba(160, 127, 72, 0.35);
        --rb-border: #c9a96e;
        --rb-border-soft: rgba(201, 169, 110, 0.45);
        --rb-narration-bg: rgba(201, 169, 110, 0.08);
        --rb-narration-border: rgba(201, 169, 110, 0.3);
        --rb-toolbar-bg: rgba(247, 241, 227, 0.95);
        --rb-shadow: 0 6px 24px -8px rgba(42, 37, 32, 0.22);
        --rb-shadow-soft: 0 2px 8px rgba(42, 37, 32, 0.12);
        --rb-bubble-bg: linear-gradient(135deg, #faf5e8 0%, #f0e7d0 100%);
        --rb-bubble-border: rgba(201, 169, 110, 0.6);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
        color: var(--rb-text);
        background: var(--rb-bg);
        min-height: 100vh;
        line-height: 1.9;
        font-size: 16px;
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      /* ================== 顶部工具栏 ================== */
      .rb-toolbar {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        background: var(--rb-toolbar-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rb-border-soft);
      }
      .rb-logo {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.1em;
        letter-spacing: 3px;
        color: var(--rb-accent);
        flex: 1;
      }
      .rb-logo .rb-logo-icon {
        margin-right: 6px;
      }
      .rb-controls {
        display: flex;
        gap: 6px;
      }
      .rb-btn {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text);
        padding: 4px 12px;
        border-radius: 16px;
        cursor: pointer;
        font-size: 13px;
        letter-spacing: 1px;
        transition: all 0.18s ease;
      }
      .rb-btn:hover {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }
      .rb-btn.active {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }

      /* ================== 设置面板 ================== */
      .rb-settings {
        position: fixed;
        top: 56px;
        right: 14px;
        width: min(92vw, 340px);
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        background: var(--rb-paper-flat);
        border: 1px solid var(--rb-border);
        border-radius: 10px;
        padding: 14px;
        box-shadow: var(--rb-shadow);
        display: none;
        z-index: 60;
      }
      .rb-settings.active {
        display: block;
      }
      .rb-settings-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed var(--rb-border-soft);
      }
      .rb-settings-row:last-of-type {
        border-bottom: none;
      }
      .rb-settings-label {
        flex: 1;
        font-size: 13px;
        color: var(--rb-text-soft);
        letter-spacing: 1px;
      }
      .rb-toggle {
        width: 36px;
        height: 20px;
        background: var(--rb-border-soft);
        border-radius: 10px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      .rb-toggle.active {
        background: var(--rb-accent);
      }
      .rb-toggle::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: var(--rb-paper-flat);
        border-radius: 50%;
        transition: transform 0.2s ease;
      }
      .rb-toggle.active::after {
        transform: translateX(16px);
      }

      .rb-section-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 13px;
        letter-spacing: 3px;
        color: var(--rb-accent);
        padding: 12px 0 6px;
        border-bottom: 1px solid var(--rb-border-soft);
        margin-bottom: 6px;
      }

      /* —— 角色管理 —— */
      .rb-char-tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.06);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      [data-theme='dark'] .rb-char-tabs {
        background: rgba(255, 255, 255, 0.04);
      }
      .rb-char-tab {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--rb-text-muted);
        padding: 6px;
        font-size: 12px;
        letter-spacing: 1px;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.18s ease;
      }
      .rb-char-tab.active {
        background: var(--rb-accent);
        color: var(--rb-bg);
      }
      .rb-char-content {
        display: none;
      }
      .rb-char-content.active {
        display: block;
      }
      .rb-char-hint {
        font-size: 11px;
        color: var(--rb-text-muted);
        margin-bottom: 6px;
        line-height: 1.6;
      }
      .rb-char-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 200px;
        overflow-y: auto;
      }
      .rb-char-empty {
        font-size: 11.5px;
        color: var(--rb-text-muted);
        text-align: center;
        padding: 8px 0;
      }
      .rb-char-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid var(--rb-border-soft);
        border-radius: 6px;
        background: var(--rb-narration-bg);
      }
      .rb-char-avatar-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--rb-border-soft);
      }
      .rb-char-avatar-placeholder-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--rb-narration-bg);
        border: 1px dashed var(--rb-border-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--rb-text-muted);
        font-size: 14px;
      }
      .rb-color-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1px solid var(--rb-border-soft);
      }
      .rb-char-name {
        flex: 1;
        font-size: 13px;
        color: var(--rb-text);
      }
      .rb-char-action {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text-soft);
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        cursor: pointer;
        font-family: inherit;
      }
      .rb-char-action:hover {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }
      .rb-char-action.in-chat {
        background: var(--rb-accent-glow);
        color: var(--rb-text);
        cursor: default;
      }
      .rb-char-builtin {
        font-size: 10.5px;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(168, 153, 104, 0.2);
        color: var(--rb-accent);
      }
      .rb-char-delete {
        background: transparent;
        border: none;
        color: var(--rb-text-muted);
        font-size: 14px;
        cursor: pointer;
        padding: 0 4px;
      }
      .rb-char-delete:hover {
        color: #c53030;
      }

      .rb-char-form {
        background: var(--rb-narration-bg);
        border: 1px dashed var(--rb-border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 6px;
        display: none;
      }
      .rb-char-form.active {
        display: block;
      }
      .rb-char-form input[type='text'] {
        width: 100%;
        background: var(--rb-paper-flat);
        border: 1px solid var(--rb-border-soft);
        border-radius: 6px;
        padding: 6px 8px;
        color: var(--rb-text);
        font-family: inherit;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .rb-char-form input[type='text']:focus {
        border-color: var(--rb-accent);
        outline: none;
      }
      .rb-form-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .rb-form-row label {
        font-size: 11.5px;
        color: var(--rb-text-muted);
      }
      .rb-form-row input[type='color'] {
        width: 36px;
        height: 24px;
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        border-radius: 4px;
        cursor: pointer;
      }
      .rb-avatar-preview {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px dashed var(--rb-border-soft);
        display: none;
      }
      .rb-upload-btn {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text);
        padding: 4px 10px;
        font-size: 11.5px;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      .rb-upload-btn:hover {
        border-color: var(--rb-accent);
        color: var(--rb-accent);
      }
      .rb-form-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      .rb-form-actions .rb-btn {
        font-size: 11.5px;
        padding: 4px 12px;
      }
      .rb-add-btn {
        width: 100%;
        margin-top: 8px;
        background: transparent;
        border: 1px dashed var(--rb-border);
        color: var(--rb-accent);
        padding: 6px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 1px;
      }
      .rb-add-btn:hover {
        background: var(--rb-narration-bg);
      }

      /* ================== 正文容器 ================== */
      .rb-container {
        max-width: 880px;
        margin: 22px auto;
        padding: 0 14px;
      }
      .rb-content {
        background: var(--rb-paper);
        border: 2px solid var(--rb-border);
        border-radius: 14px;
        padding: 28px 32px;
        box-shadow: var(--rb-shadow);
        position: relative;
        font-size: var(--rb-reading-font, 17px);
      }
      .rb-content::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, var(--rb-accent), transparent);
      }

      /* ================== 面板美化（毛玻璃 + 动效，合并自 5 个独立美化器） ================== */

      /* —— 5 类面板共享的"卡片"样式 —— */
      .action-panel,
      .battle-panel,
      .char-panel,
      .item-panel,
      .realm-panel {
        position: relative;
        margin: 18px 0;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(155deg,
          rgba(20, 16, 32, 0.78) 0%,
          rgba(28, 22, 44, 0.72) 60%,
          rgba(20, 16, 32, 0.82) 100%);
        backdrop-filter: blur(18px) saturate(180%);
        -webkit-backdrop-filter: blur(18px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 14px 44px rgba(0, 0, 0, 0.42),
          0 1px 0 rgba(255, 255, 255, 0.06) inset,
          0 -1px 0 rgba(0, 0, 0, 0.25) inset;
        color: #e8d5b7;
        animation: rb-panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }
      .action-panel:hover,
      .battle-panel:hover,
      .char-panel:hover,
      .item-panel:hover,
      .realm-panel:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.16);
        box-shadow:
          0 22px 56px rgba(0, 0, 0, 0.5),
          0 0 0 1px var(--rb-panel-accent, #a89968) inset,
          0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      @keyframes rb-panel-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* —— 顶部光带（带流光动画） —— */
      .action-panel::before,
      .battle-panel::before,
      .char-panel::before,
      .item-panel::before,
      .realm-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          var(--rb-panel-accent, #a89968) 30%,
          color-mix(in srgb, var(--rb-panel-accent, #a89968) 70%, white) 50%,
          var(--rb-panel-accent, #a89968) 70%,
          transparent 100%);
        background-size: 250% 100%;
        animation: rb-panel-shimmer 6s ease-in-out infinite;
      }
      @keyframes rb-panel-shimmer {
        0%, 100% { background-position: 0% 0; }
        50% { background-position: 100% 0; }
      }

      /* —— 强调色（每个 panel 类型 + 6 种 action 子类） —— */
      .action-panel { --rb-panel-accent: #fc8181; }
      .action-panel.battle { --rb-panel-accent: #fc8181; }
      .action-panel.craft { --rb-panel-accent: #68d391; }
      .action-panel.cultivation { --rb-panel-accent: #90cdf4; }
      .action-panel.breakthrough { --rb-panel-accent: #f6ad55; }
      .action-panel.insight { --rb-panel-accent: #b794f4; }
      .action-panel.judge { --rb-panel-accent: #63b3ed; }
      .battle-panel { --rb-panel-accent: #fc8181; }
      .char-panel { --rb-panel-accent: #d4af37; }
      .item-panel { --rb-panel-accent: #f6e27a; }
      .realm-panel { --rb-panel-accent: #f6ad55; }

      /* —— 头部 —— */
      .action-panel .panel-header,
      .battle-panel .panel-header,
      .char-panel .panel-header,
      .item-panel .panel-header,
      .realm-panel .panel-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        cursor: pointer;
        user-select: none;
        background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.02) 50%,
          rgba(255, 255, 255, 0.06) 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        transition: background 0.25s ease;
      }
      .action-panel .panel-header:hover,
      .battle-panel .panel-header:hover,
      .char-panel .panel-header:hover,
      .item-panel .panel-header:hover,
      .realm-panel .panel-header:hover {
        background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.04) 50%,
          rgba(255, 255, 255, 0.10) 100%);
      }
      .action-panel .panel-icon,
      .battle-panel .panel-icon,
      .char-panel .panel-icon,
      .item-panel .panel-icon,
      .realm-panel .panel-icon {
        font-size: 1.25em;
        color: var(--rb-panel-accent);
        filter: drop-shadow(0 0 10px color-mix(in srgb, var(--rb-panel-accent) 60%, transparent));
      }
      .action-panel .panel-title,
      .battle-panel .panel-title,
      .char-panel .panel-title,
      .item-panel .panel-title,
      .realm-panel .panel-title {
        flex: 1;
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.1em;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--rb-panel-accent);
        text-shadow: 0 0 14px color-mix(in srgb, var(--rb-panel-accent) 35%, transparent);
        word-break: break-word;
      }
      .action-panel .panel-toggle,
      .battle-panel .panel-toggle,
      .char-panel .panel-toggle,
      .item-panel .panel-toggle,
      .realm-panel .panel-toggle {
        color: var(--rb-panel-accent);
        opacity: 0.7;
        transition: transform 0.3s ease, opacity 0.2s ease;
      }
      .action-panel .panel-header:hover .panel-toggle,
      .battle-panel .panel-header:hover .panel-toggle,
      .char-panel .panel-header:hover .panel-toggle,
      .item-panel .panel-header:hover .panel-toggle,
      .realm-panel .panel-header:hover .panel-toggle { opacity: 1; }
      .action-panel .panel-header.collapsed .panel-toggle,
      .battle-panel .panel-header.collapsed .panel-toggle,
      .char-panel .panel-header.collapsed .panel-toggle,
      .item-panel .panel-header.collapsed .panel-toggle,
      .realm-panel .panel-header.collapsed .panel-toggle { transform: rotate(-90deg); }

      /* —— 内容区 —— */
      .action-panel .panel-content,
      .battle-panel .panel-content,
      .char-panel .panel-content,
      .item-panel .panel-content,
      .realm-panel .panel-content {
        padding: 14px 16px;
        transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
        overflow: hidden;
        color: #e8d5b7; /* 显式设色,避免在 light 主题下被父级覆盖成黑色 */
      }
      .action-panel .panel-content.collapsed,
      .battle-panel .panel-content.collapsed,
      .char-panel .panel-content.collapsed,
      .item-panel .panel-content.collapsed,
      .realm-panel .panel-content.collapsed { max-height: 0; padding: 0 16px; opacity: 0; }

      /* —— 数据行 —— */
      .action-panel .data-row,
      .battle-panel .data-row,
      .item-panel .data-row,
      .realm-panel .data-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
        padding: 9px 12px;
        margin-bottom: 8px;
        font-size: 0.95em;
        line-height: 1.6;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-left: 3px solid color-mix(in srgb, var(--rb-panel-accent) 60%, transparent);
        color: #e8d5b7;
        transition: background 0.18s ease, border-left-color 0.18s ease, transform 0.18s ease;
      }
      .action-panel .data-row:last-child,
      .battle-panel .data-row:last-child,
      .item-panel .data-row:last-child,
      .realm-panel .data-row:last-child { margin-bottom: 0; }
      .action-panel .data-row:hover,
      .battle-panel .data-row:hover,
      .item-panel .data-row:hover,
      .realm-panel .data-row:hover {
        background: rgba(255, 255, 255, 0.05);
        border-left-color: var(--rb-panel-accent);
        transform: translateX(2px);
      }
      /* char_info 用紧凑样式(无背景) */
      .char-panel .data-row {
        padding: 4px 0;
        font-size: 0.95em;
        line-height: 1.6;
        color: #e8d5b7;
      }

      /* —— 标签:统一 pill 设计 —— */
      .action-panel .tag,
      .battle-panel .tag,
      .item-panel .tag,
      .realm-panel .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 12px;
        border-radius: 999px;
        font-size: 0.88em;
        font-weight: 600;
        white-space: normal;
        word-break: break-word;
        max-width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #e8d5b7;
        vertical-align: middle;
        transition: transform 0.15s ease, box-shadow 0.18s ease;
      }
      .action-panel .tag:hover,
      .battle-panel .tag:hover,
      .item-panel .tag:hover,
      .realm-panel .tag:hover { transform: translateY(-1px); }
      .char-panel .tag {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.85em;

      // ============== MVU 接入层 ==============
      const mvuState = { ready: false, mvu: null };
      function checkMvu() {
        try {
          const win = window.parent || window;
          if (typeof win.Mvu === 'object' && typeof win.Mvu.getMvuData === 'function') {
            mvuState.mvu = win.Mvu;
            mvuState.ready = true;
            return true;
          }
        } catch (e) {
          /* ignore */
        }
        mvuState.ready = false;
        mvuState.mvu = null;
        return false;
      }

      function fetchLatestMvuData() {
        let data = {};
        try {
          if (mvuState.ready || checkMvu()) {
            const m = mvuState.mvu.getMvuData({ type: 'message', message_id: 'latest' });
            if (m && m.stat_data && Object.keys(m.stat_data).length) {
              data = m.stat_data;
            } else {
              const c = mvuState.mvu.getMvuData({ type: 'chat' });
              if (c && c.stat_data) data = c.stat_data;
            }
          }
        } catch (e) {
          console.warn('[正文美化] MVU 读取失败:', e);
        }
        return data;
      }

      function writeMvuPath(path, value) {
        try {
          if (!mvuState.ready && !checkMvu()) return false;
          const data = mvuState.mvu.getMvuData({ type: 'message', message_id: 'latest' });
          if (!data || !data.stat_data) return false;
          const parts = path.split('/').filter(Boolean);
          let obj = data.stat_data;
          for (let i = 0; i < parts.length - 1; i++) {
            if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
            obj = obj[parts[i]];
          }
          obj[parts[parts.length - 1]] = value;
          mvuState.mvu.replaceMvuData(data, { type: 'message', message_id: 'latest' });
          return true;
        } catch (e) {
          console.warn('[正文美化] MVU 写入失败:', e);
          return false;
        }
      }

      function getDialogueBeautifyList() {
        try {
          const d = fetchLatestMvuData();
          const list = d && d.系统配置 ? d.系统配置.对白美化 : null;
          if (Array.isArray(list)) return list;
        } catch (e) {
          /* ignore */
        }
        return [];
      }
      function setDialogueBeautifyList(list) {
        return writeMvuPath('系统配置/对白美化', list);
      }

      // ============== 缓存读写 ==============
      function getAllCachedChars() {
        try {
          const raw = localStorage.getItem(CHAR_CACHE_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }
      function saveCachedChars(chars) {
        try {
          localStorage.setItem(CHAR_CACHE_KEY, JSON.stringify(chars));
        } catch (e) {
          console.warn('缓存写入失败:', e);
        }
      }
      function saveAvatarToCache(name, dataUrl) {
        try {
          localStorage.setItem(AVATAR_CACHE_PREFIX + name, dataUrl);
        } catch (e) {
          console.warn('头像缓存失败:', e);
        }
      }
      function getAvatarFromCache(name) {
        try {
          return localStorage.getItem(AVATAR_CACHE_PREFIX + name) || '';
        } catch (e) {
          return '';
        }
      }
      function removeAvatarFromCache(name) {
        try {
          localStorage.removeItem(AVATAR_CACHE_PREFIX + name);
        } catch (e) {

      // ============== 自定义角色注入 ==============
      function injectCharCSS(name, color) {
        if (!color) return;
        const id = 'rb-char-css-' + name;
        const old = document.getElementById(id);
        if (old) old.remove();
        const style = document.createElement('style');
        style.id = id;
        const safe = name.replace(/["'\\]/g, '');
        style.textContent =
          `.rb-dialogue[data-char="${safe}"] .rb-dlg-name { color: ${color}; }\n` +
          `.rb-dialogue[data-char="${safe}"] .rb-dlg-bubble { border-color: ${color}; }\n` +
          `.rb-dialogue[data-char="${safe}"] .rb-dlg-bubble::before { border-right-color: ${color}; }\n` +
          `.rb-dialogue[data-char="${safe}"] .rb-dlg-avatar, .rb-dialogue[data-char="${safe}"] .rb-dlg-avatar-placeholder { border-color: ${color}; }`;
        document.head.appendChild(style);
      }

      /** 把缓存库 + MVU 列表中的非内置角色注入 CHARACTER_CONFIG */
      function loadCustomCharsIntoConfig() {
        const cached = getAllCachedChars();
        const mvuList = getDialogueBeautifyList();
        const allNames = new Set([...Object.keys(cached), ...mvuList]);
        allNames.forEach(name => {
          if (BUILTIN_CHAR_NAMES.includes(name)) return;
          const info = cached[name] || {};
          const avatar = getAvatarFromCache(name);
          CHARACTER_CONFIG[name] = {
            color: info.color || '#a89968',
            avatar: avatar || '',
            given_name: name,
            aliases: [name],
            _custom: true,
          };
          if (info.color) injectCharCSS(name, info.color);
        });
        // 内置角色配色注入
        BUILTIN_CHAR_NAMES.forEach(name => {
          const c = CHARACTER_CONFIG[name];
          if (c && c.color) injectCharCSS(name, c.color);
        });
      }

      // ============== 名称规整化 ==============
      function normalizeDisplayName(raw) {
        const s = String(raw || '')
          .trim()
          .replace(/^[\s"'""''「」『』《》〈〉()（）【】\[\]]+|[\s"'""''「」『』《》〈〉()（）【】\[\]]+$/g, '')
          .trim();
        if (CHARACTER_CONFIG[s]) return s;
        for (const k of Object.keys(CHARACTER_CONFIG)) {
          const c = CHARACTER_CONFIG[k];
          if (c.aliases && c.aliases.includes(s)) return k;
        }
        return s;
      }

      // ============== 内容渲染 ==============
      // 注意：SillyTavern 在把 iframe srcdoc 注入前会 HTML-decode 实体（&amp; → &），
      // 因此源码里不能出现裸的实体字面量；用 & (`&` 的 Unicode 转义) 把 '&' 隔开
      // 避开扫描器，JS 引擎仍会得到正确的 '&amp;' 等字符串。
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '\u0026amp;')
          .replace(/</g, '\u0026lt;')
          .replace(/>/g, '\u0026gt;')
          .replace(/"/g, '\u0026quot;')
          .replace(/'/g, '\u0026#39;');
      }

      function decodeEntities(text) {
        if (!text || text.indexOf('&') === -1) return text;
        const ta = document.createElement('textarea');
        let cur = text;
        for (let i = 0; i < 4; i++) {
          ta.innerHTML = cur;
          const next = ta.value;
          if (next === cur) break;
          cur = next;
          if (cur.indexOf('&') === -1) break;
        }
        return cur;
      }

      function renderNameHtml(config, displayName) {
        if (!config) return `<span>${escapeHtml(displayName)}</span>`;
        const first = displayName.charAt(0);
        const rest = displayName.slice(1);
        return (
          `<span class="rb-dlg-name-initial">${escapeHtml(first)}</span>` +
          `<span>${escapeHtml(rest)}</span>`
        );
      }

      function renderDialogue(rawName, content) {
        const norm = normalizeDisplayName(rawName);
        const config = CHARACTER_CONFIG[norm];
        const avatar = config && config.avatar ? config.avatar : '';
        const avatarHtml = avatar
          ? `<img class="rb-dlg-avatar" src="${avatar}" alt="${escapeHtml(norm)}">`
          : `<div class="rb-dlg-avatar-placeholder">👤</div>`;
        const nameHtml = renderNameHtml(config, norm);
        // 清理对话内容中残留的 {角色名} 标记
        const cleanContent = content.replace(/\{[^}]+\}/g, '').trim();
        return (
          `<div class="rb-dialogue" data-char="${escapeHtml(norm)}">` +
          `${avatarHtml}` +
          `<div class="rb-dlg-body">` +
          `<div class="rb-dlg-name">${nameHtml}</div>` +
          `<div class="rb-dlg-bubble">${escapeHtml(cleanContent)}</div>` +
          `</div></div>`
        );
      }

        // 移除任何残留的 {角色名} 花括号标记

        return `<div class="rb-narration">${escapeHtml(cleaned)}</div>`;

      // 表格语法解析：{标题} + |行|（action/battle/item/realm 共用）
      function parseTablePanel(content) {
        const lines = _.chain(content).split('\n').map(_.trim).compact().value();
        const sections = [];
        let currentSection = null;
        _.forEach(lines, line => {
          const titleMatch = line.match(/^\{(.+?)\}$/);
          if (titleMatch) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: titleMatch[1], rows: [] };
          } else if (_.startsWith(line, '|') && _.endsWith(line, '|') && currentSection) {
            const rowContent = line.slice(1, -1).trim();
            if (rowContent) currentSection.rows.push(rowContent);
          }
        });
        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      // char_info 缩进式语法（一级标题无缩进、二级标题缩进 2 空格以冒号结尾）
      function parseCharIndentedPanel(content) {
        const lines = content.split('\n');
        const sections = [];
        let currentSection = null;
        _.forEach(lines, line => {
          if (!line.trim()) return;
          const indent = line.search(/\S/);
          const trimmed = line.trim();
          if (indent === 0) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: trimmed, rows: [], subsections: [] };
          } else if (currentSection) {
            if (indent === 2 && trimmed.endsWith(':')) {
              currentSection.subsections.push({ title: trimmed.slice(0, -1), rows: [] });
            } else if (currentSection.subsections.length > 0) {
              _.last(currentSection.subsections).rows.push(trimmed);
            } else {
              currentSection.rows.push(trimmed);
            }
          }
        });
        if (currentSection) sections.push(currentSection);
        return { sections };
      }

        html = html.replace(/灵气:\s*(\d+)/g, (m, val) => `<span class="field-label">灵气:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/\[([^\]]+)\]/g, (m, tag) => `<span class="tag tag-attr"><i class="fa-solid fa-bookmark"></i> ${tag}</span>`);
        html = html.replace(/效果:\s*([^|]+)/g, (m, effect) => `<span class="field-label">效果:</span> <span class="effect-text">${effect.trim()}</span>`);
        return html;
      }

      function beautifyRealmRow(row) {
        let html = _.escape(row);
        ['简单', '寻常', '困难', '极难', '绝境'].forEach(d => {
          html = html.replace(
            new RegExp(`难度:\\s*${d}`, 'g'),
            `<span class="field-label">难度:</span> <span class="tag tag-difficulty-${d}"><i class="fa-solid fa-skull"></i> ${d}</span>`,
          );
        });
        html = html.replace(/类型:\s*([^|]+)/g, (m, val) => `<span class="field-label">类型:</span> <span class="tag tag-type"><i class="fa-solid fa-map"></i> ${val.trim()}</span>`);
        html = html.replace(/危害:\s*([^|]+)/g, (m, val) => `<span class="field-label">危害:</span> <span class="tag tag-hazard"><i class="fa-solid fa-exclamation"></i> ${val.trim()}</span>`);
        html = html.replace(/奖励:\s*([^|]+)/g, (m, val) => `<span class="field-label">奖励:</span> <span class="tag tag-reward"><i class="fa-solid fa-gift"></i> ${val.trim()}</span>`);
        html = html.replace(/(\d+)/g, (m, val) => `<span class="stat-value">${val}</span>`);
        return html;
      }

      // —— 渲染各 panel 为 HTML 字符串（不操作 DOM，便于嵌入占位符流程） ——
      function renderActionHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          const config = RB_PANEL_CONFIG_ACTION[section.title] || { type: 'battle', icon: 'fa-solid fa-scroll' };
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyActionRow(row)}</div>`; });
          html += `<div class="action-panel ${config.type}"><div class="panel-header"><i class="panel-icon ${config.icon}"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;
        });
        return html;
      }

      function renderBattleHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          const icon = RB_PANEL_CONFIG_BATTLE[section.title] || 'fa-solid fa-scroll';
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyBattleRow(row)}</div>`; });
          html += `<div class="battle-panel"><div class="panel-header"><i class="panel-icon ${icon}"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;

      function renderCharHtml(charData) {
        let sectionsHtml = '';
        _.forEach(charData.sections, section => {
          let secInner = '';
          if (section.title) secInner += `<div class="section-title">${_.escape(section.title)}</div>`;
          _.forEach(section.rows, row => { secInner += `<div class="data-row">${beautifyCharRow(row)}</div>`; });
          _.forEach(section.subsections, sub => {
            let subInner = '';
            if (sub.title) subInner += `<div class="subsection-title">${_.escape(sub.title)}</div>`;
            _.forEach(sub.rows, row => { subInner += `<div class="data-row" style="padding-left: 12px;">${beautifyCharRow(row)}</div>`; });
            secInner += `<div>${subInner}</div>`;
          });
          sectionsHtml += `<div class="section">${secInner}</div>`;
        });
        return `<div class="char-panel"><div class="panel-header"><i class="panel-icon fa-solid fa-user"></i><span class="panel-title">角色信息</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${sectionsHtml}</div></div>`;
      }

      function renderItemHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          const config = RB_PANEL_CONFIG_ITEM[section.title] || { icon: 'fa-solid fa-box' };
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyItemRow(row)}</div>`; });
          html += `<div class="item-panel"><div class="panel-header"><i class="panel-icon ${config.icon}"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;
        });

      }

      function renderRealmHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyRealmRow(row)}</div>`; });
          html += `<div class="realm-panel"><div class="panel-header"><i class="panel-icon fa-solid fa-mountain"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;
        });
        return html;
      }

      // 渲染失败时的兜底:把原始内容裹一个红色"解析失败"条回退,避免整段 processContent 崩溃
      function renderPanelFallback(label, rawInner) {
        const safe = (typeof escapeHtml === 'function' ? escapeHtml : (s => String(s)))(String(rawInner || '').slice(0, 800));
        return `<div class="rb-fallback"><span class="rb-fallback-tag">${escapeHtml(label)} 解析失败</span>${safe}</div>`;
      }

      // 安全调用面板解析 + 渲染:任何抛错都吞掉返回 fallback
      function safeRenderPanel(label, parseFn, renderFn, inner) {
        try {
          const trimmed = String(inner || '').trim();
          if (!trimmed) return ''; // 空面板直接丢弃
          const parsed = parseFn(trimmed);
          // 没有任何 section 时直接丢弃,不渲染空壳
          if (!parsed || !parsed.sections || !parsed.sections.length) return '';
          const html = renderFn(parsed);
          return html || '';
        } catch (e) {
          console.warn(`[正文美化] ${label} 渲染异常:`, e);
          return renderPanelFallback(label, inner);
        }
      }

      // 把 raw 中的 5 类面板抽走、留 placeholder（避免被 paragraph splitter 切碎）
      // 顺序：内层（item/char/realm/battle）先于外层（action）；按 prompt 设计本不应嵌套
      function extractPanels(raw, stash) {
        const wrap = html => (html ? '\n\n' + stash(html) + '\n\n' : '\n\n');
        raw = raw.replace(/<item_info>([\s\S]*?)<\/item_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('item_info', parseTablePanel, renderItemHtml, inner)),
        );
        raw = raw.replace(/<char_info>([\s\S]*?)<\/char_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('char_info', parseCharIndentedPanel, renderCharHtml, inner)),
        );
        raw = raw.replace(/<secret_realm_info>([\s\S]*?)<\/secret_realm_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('secret_realm_info', parseTablePanel, renderRealmHtml, inner)),
        );
        raw = raw.replace(/<battle_info>([\s\S]*?)<\/battle_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('battle_info', parseTablePanel, renderBattleHtml, inner)),
        );
        raw = raw.replace(/<action_info>([\s\S]*?)<\/action_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('action_info', parseTablePanel, renderActionHtml, inner)),
        );
        // 清理任何未配对的孤儿标签(AI 截断、写漏闭合等)
        raw = raw.replace(
          /<\/?(?:action_info|battle_info|char_info|item_info|secret_realm_info)\b[^>]*>?/gi,
          '',
        );
        return raw;
      }

      // 折叠点击事件委托（只挂一次）
      let _rbPanelDelegated = false;
      function ensurePanelClickDelegation() {
        if (_rbPanelDelegated) return;
        try {
          if (typeof $ === 'undefined') return;
          _rbPanelDelegated = true;
          $('#readingContent').on(
            'click',
            '.action-panel > .panel-header, .battle-panel > .panel-header, .char-panel > .panel-header, .item-panel > .panel-header, .realm-panel > .panel-header',
            function () {
              $(this).toggleClass('collapsed');
              $(this).next('.panel-content').toggleClass('collapsed');
            },
          );
        } catch (e) {
          console.warn('[正文美化] 折叠委托绑定失败:', e);
        }
      }

      /** 主渲染：把原始文本切分为旁白 / 对话块 */
      function processContent() {
        const container = document.getElementById('readingContent');
        if (!container) return;
        let raw = container.innerHTML;
        if (!raw) return;

        // 1) 先解码实体（让 &lt;action_info&gt; 之类还原成真实标签）
        raw = decodeEntities(raw);

        // 1.5) 剥离 HTML 注释 <!-- ... --> （AI 把子思维链放在注释里）
        raw = raw.replace(/<!--[\s\S]*?-->/g, '');
        // 顺手清理孤儿的 --> 或 <!-- 标记字符串（仅当它们是行首/行尾的独立 token，避免误伤正文）
        raw = raw.replace(/^\s*-->\s*$/gm, '');
        raw = raw.replace(/^\s*<!--\s*$/gm, '');

        // 2) 抽取 5 类面板，留 U+2063 包裹的 placeholder（不会被 escape/trim/split 破坏）
        const panelMap = new Map();
        let panelCounter = 0;
        const stashPanel = htmlFragment => {
          const token = `⁣RB_PANEL_${panelCounter++}⁣`;
          panelMap.set(token, htmlFragment);
          return token;
        };
        try {
          raw = extractPanels(raw, stashPanel);
        } catch (e) {
          console.warn('[正文美化] 面板抽取失败:', e);
        }

        // 3) 继续原有的标签剥离 & 空白规整
        raw = raw
          .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/(?:p|div|li|h[1-6]|blockquote)>/gi, '\n')
          .replace(/<(?:hr)\s*\/?>/gi, '\n\n')
          .replace(
            /<\/?(?:div|span|p|ul|ol|li|strong|em|b|i|h[1-6]|a|br|hr|blockquote|pre|code|table|thead|tbody|tr|td|th)[^>]*>/gi,
            '',
          )
          .replace(/[\t ]+\n/g, '\n')
          .replace(/\n{3,}/g, '\n\n');

        // 全是面板（无文本）也要继续，否则面板渲染不到
        if (!raw.trim() && panelMap.size === 0) return;

        const lines = raw
          .split(/\n+/)
          .map(s => s.trim())
          .filter(Boolean);

        const out = [];
        let pending = null;

        const flush = () => {
          if (!pending) return;
          out.push(renderDialogue(pending.rawName, pending.lines.join('\n\n')));
          pending = null;
        };

        const braceFmt = /^\s*\{([^}]+)\}\s*([\s\S]+)$/;
        const panelTokenRe = /^⁣RB_PANEL_\d+⁣$/;

        for (const line of lines) {
          // 面板占位符：直接放入，不裹 narration 容器
          if (panelTokenRe.test(line)) {
            flush();
            out.push(line);
            continue;
          }

          // 双花括号包裹的情绪 / 动作标记按旁白输出
          if (/^\{\{.*\}\}/.test(line)) {
            flush();
            const html = renderNarration(line);
            if (html) out.push(html);
            continue;
          }

          const m = line.match(braceFmt);
          if (m) {
            const rawName = m[1].trim();
            const content = m[2].trim();
            const normName = normalizeDisplayName(rawName);
            const config = CHARACTER_CONFIG[normName];
            if (config) {
              if (pending && pending.normName === normName) {
                pending.lines.push(content);
              } else {
                flush();
                pending = { rawName, normName, lines: [content] };
              }
              continue;
            }
            flush();
            const html = renderNarration(content);
            if (html) out.push(html);
            continue;
          }

          flush();
          const html = renderNarration(line);
          if (html) out.push(html);
        }
        flush();

        // 4) 还原 placeholder 为真实面板 HTML
        let finalHtml = out.join('');
        panelMap.forEach((html, token) => {
          finalHtml = finalHtml.split(token).join(html);
        });
        container.innerHTML = finalHtml;

        // 5) 单次绑定折叠点击委托
        ensurePanelClickDelegation();
      }

      // ============== 主题切换 ==============
      function applyTheme(theme) {
        const t = theme === 'light' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        try {
          localStorage.setItem(THEME_KEY, t);
        } catch (e) {
          /* ignore */
        }
        const btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = t === 'dark' ? '🌙 夜' : '☀ 日';
      }
      function initTheme() {
        let saved = 'dark';
        try {
          saved = localStorage.getItem(THEME_KEY) || 'dark';
        } catch (e) {
          /* ignore */
        }
        applyTheme(saved);
      }

      // ============== 字号 ==============
      function adjustFontSize(delta) {
        const root = document.querySelector('.rb-content');
        if (!root) return;
        const cur = parseInt(getComputedStyle(root).fontSize) || 17;
        const next = Math.max(13, Math.min(24, cur + delta));
        root.style.setProperty('--rb-reading-font', next + 'px');
        root.style.fontSize = next + 'px';
        try {
          localStorage.setItem(FONT_SIZE_KEY, String(next));
        } catch (e) {
          /* ignore */
        }
      }
      window.adjustFontSize = adjustFontSize;
      function initFontSize() {
        try {
          const saved = parseInt(localStorage.getItem(FONT_SIZE_KEY) || '17');
          const root = document.querySelector('.rb-content');
          if (root && saved >= 13 && saved <= 24) {
            root.style.fontSize = saved + 'px';
          }
        } catch (e) {
          /* ignore */
        }
      }

      // ============== Toast ==============
      function showToast(msg) {
        const el = document.createElement('div');
        el.className = 'rb-toast';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
      }

      // ============== 角色管理 UI ==============
      let _pendingAvatar = '';

      window.switchCharTab = function (tab) {
        const isCache = tab === 'cache';
        document.getElementById('tabBtnCache').classList.toggle('active', isCache);
        document.getElementById('tabBtnChat').classList.toggle('active', !isCache);
        document.getElementById('tabCache').classList.toggle('active', isCache);
        document.getElementById('tabChat').classList.toggle('active', !isCache);
        if (isCache) renderCacheCharList();
        else renderChatCharList();
      };

      function renderCacheCharList() {
        const list = document.getElementById('cacheCharList');
        if (!list) return;
        const cached = getAllCachedChars();
        const mvuList = getDialogueBeautifyList();
        const names = Object.keys(cached);
        if (!names.length) {
          list.innerHTML = '<div class="rb-char-empty">缓存库为空，点下方新建</div>';
          return;
        }
        let html = '';
        names.forEach(name => {
          const info = cached[name] || {};
          const av = getAvatarFromCache(name);
          const safeName = escapeHtml(name);
          const avHtml = av
            ? `<img class="rb-char-avatar-small" src="${av}" alt="${safeName}">`
            : `<div class="rb-char-avatar-placeholder-small">👤</div>`;
          const dot = info.color ? `<span class="rb-color-dot" style="background:${info.color}"></span>` : '';
          const inMvu = mvuList.includes(name);
          const writeBtn = inMvu
            ? `<span class="rb-char-action in-chat">已写入</span>`
            : `<button class="rb-char-action" data-action="write-chat" data-arg="${safeName}">写入</button>`;
          html +=
            `<div class="rb-char-item">${avHtml}${dot}` +
            `<span class="rb-char-name">${safeName}</span>` +
            `${writeBtn}` +
            `<button class="rb-char-delete" data-action="del-cache" data-arg="${safeName}" title="从缓存删除">✕</button>` +
            `</div>`;
        });
        list.innerHTML = html;
      }

      function renderChatCharList() {
        const list = document.getElementById('chatCharList');
        if (!list) return;
        const mvuList = getDialogueBeautifyList();
        if (!mvuList.length) {
          list.innerHTML = '<div class="rb-char-empty">当前聊天暂无写入的角色</div>';
          return;
        }
        let html = '';
        mvuList.forEach(name => {
          const isBuiltin = BUILTIN_CHAR_NAMES.includes(name);
          const cfg = CHARACTER_CONFIG[name];
          const av = (cfg && cfg.avatar) || getAvatarFromCache(name);
          const safeName = escapeHtml(name);
          const avHtml = av
            ? `<img class="rb-char-avatar-small" src="${av}" alt="${safeName}">`
            : `<div class="rb-char-avatar-placeholder-small">👤</div>`;
          const dot = !isBuiltin && cfg && cfg.color ? `<span class="rb-color-dot" style="background:${cfg.color}"></span>` : '';
          const trailing = isBuiltin
            ? '<span class="rb-char-builtin">内置</span>'
            : `<button class="rb-char-delete" data-action="del-chat" data-arg="${safeName}" title="从当前聊天移除">✕</button>`;
          html +=
            `<div class="rb-char-item">${avHtml}${dot}` +
            `<span class="rb-char-name">${safeName}</span>` +
            `${trailing}</div>`;
        });
        list.innerHTML = html;
      }

      window.showAddCustomCharForm = function () {
        document.getElementById('customCharForm').classList.add('active');
        document.getElementById('customCharAddBtn').style.display = 'none';
        document.getElementById('customCharNameInput').value = '';
        document.getElementById('customCharColorInput').value = '#a89968';
        const preview = document.getElementById('customCharAvatarPreview');
        preview.style.display = 'none';
        preview.src = '';
        _pendingAvatar = '';
        document.getElementById('customCharUploadBtn').textContent = '📷 上传头像';
      };

      window.cancelAddCustomChar = function () {
        document.getElementById('customCharForm').classList.remove('active');
        document.getElementById('customCharAddBtn').style.display = 'block';
        _pendingAvatar = '';
      };

      window.confirmAddCustomChar = function () {
        const name = document.getElementById('customCharNameInput').value.trim();
        if (!name) return showToast('请输入角色名称');
        if (BUILTIN_CHAR_NAMES.includes(name)) return showToast('不能与内置角色同名');
        const cached = getAllCachedChars();
        if (cached[name]) return showToast('缓存中已存在该角色');
        const color = document.getElementById('customCharColorInput').value || '#a89968';
        if (_pendingAvatar) saveAvatarToCache(name, _pendingAvatar);
        cached[name] = { color };
        saveCachedChars(cached);
        // 注册到内存配置
        CHARACTER_CONFIG[name] = {
          color,
          avatar: _pendingAvatar || '',
          given_name: name,
          aliases: [name],
          _custom: true,
        };
        injectCharCSS(name, color);
        renderCacheCharList();
        cancelAddCustomChar();
        showToast(`已保存「${name}」到缓存库`);
      };

      window.writeCacheCharToChat = function (name) {
        const cached = getAllCachedChars();
        const info = cached[name];
        if (!info) return showToast('缓存中未找到该角色');
        const list = getDialogueBeautifyList();
        if (!list.includes(name)) {
          list.push(name);
          const ok = setDialogueBeautifyList(list);
          if (!ok) return showToast('MVU 写入失败：未连通 Mvu');
        }
        // 注册到当前页内存
        const av = getAvatarFromCache(name);
        CHARACTER_CONFIG[name] = {
          color: info.color || '#a89968',
          avatar: av || '',
          given_name: name,
          aliases: [name],
          _custom: true,
        };
        if (info.color) injectCharCSS(name, info.color);
        renderCacheCharList();
        showToast(`已将「${name}」写入当前聊天`);
      };

      window.deleteCacheChar = function (name) {
        if (BUILTIN_CHAR_NAMES.includes(name)) return;
        const cached = getAllCachedChars();
        delete cached[name];
        saveCachedChars(cached);
        removeAvatarFromCache(name);
        // MVU 同步
        const list = getDialogueBeautifyList();
        if (list.includes(name)) setDialogueBeautifyList(list.filter(n => n !== name));
        delete CHARACTER_CONFIG[name];
        const styleEl = document.getElementById('rb-char-css-' + name);
        if (styleEl) styleEl.remove();
        renderCacheCharList();
        showToast(`已从缓存删除「${name}」`);
      };

      window.removeChatChar = function (name) {
        if (BUILTIN_CHAR_NAMES.includes(name)) return showToast('内置角色不可移除');
        const list = getDialogueBeautifyList().filter(n => n !== name);
        const ok = setDialogueBeautifyList(list);
        if (!ok) return showToast('MVU 写入失败');
        delete CHARACTER_CONFIG[name];
        const styleEl = document.getElementById('rb-char-css-' + name);
        if (styleEl) styleEl.remove();
        renderChatCharList();
        showToast(`已从当前聊天移除「${name}」`);
      };

      function initAvatarUpload() {
        const btn = document.getElementById('customCharUploadBtn');
        const input = document.getElementById('customCharFileInput');
        const preview = document.getElementById('customCharAvatarPreview');
        if (!btn || !input || !preview) return;
        btn.addEventListener('click', () => input.click());
        input.addEventListener('change', function () {
          const file = this.files && this.files[0];
          if (!file) return;
          if (file.size > 500 * 1024) {
            showToast('图片不能超过 500KB');
            this.value = '';
            return;
          }
          const reader = new FileReader();
          reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
              const max = 128;
              let w = img.width;
              let h = img.height;
              if (w > h) {
                h = Math.round((h * max) / w);
                w = max;
              } else {
                w = Math.round((w * max) / h);
                h = max;
              }
              const canvas = document.createElement('canvas');
              canvas.width = w;
              canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              _pendingAvatar = canvas.toDataURL('image/webp', 0.85);
              preview.src = _pendingAvatar;
              preview.style.display = 'block';
              btn.textContent = '✅ 已选择';
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      // ============== 设置面板开关 ==============
      function initSettingsPanel() {
        const btn = document.getElementById('settingsBtn');
        const panel = document.getElementById('settingsPanel');
        if (!btn || !panel) return;
        btn.addEventListener('click', e => {
          e.stopPropagation();
          panel.classList.toggle('active');
          if (panel.classList.contains('active')) {

        document.addEventListener('click', e => {

      function initThemeToggle() {
        const btn = document.getElementById('themeToggle');
        if (!btn) return;
        btn.addEventListener('click', () => {
          const cur = document.body.getAttribute('data-theme') || 'dark';
          applyTheme(cur === 'dark' ? 'light' : 'dark');
        });
      }

      // ============== 事件委托：所有 [data-action] 按钮 ==============
      function initEventDelegation() {
        document.body.addEventListener('click', e => {
          const t = e.target && e.target.closest && e.target.closest('[data-action]');
          if (!t) return;
          const action = t.getAttribute('data-action');
          const arg = t.getAttribute('data-arg');
          switch (action) {
            case 'font':
              adjustFontSize(parseInt(arg, 10) || 0);
              break;
            case 'tab':
              if (typeof window.switchCharTab === 'function') window.switchCharTab(arg);
              break;
            case 'show-add':
              if (typeof window.showAddCustomCharForm === 'function') window.showAddCustomCharForm();
              break;
            case 'cancel-add':
              if (typeof window.cancelAddCustomChar === 'function') window.cancelAddCustomChar();
              break;
            case 'confirm-add':
              if (typeof window.confirmAddCustomChar === 'function') window.confirmAddCustomChar();
              break;
            case 'write-chat':
              if (typeof window.writeCacheCharToChat === 'function') window.writeCacheCharToChat(arg);
              break;
            case 'del-cache':
              if (typeof window.deleteCacheChar === 'function') window.deleteCacheChar(arg);
              break;
            case 'del-chat':
              if (typeof window.removeChatChar === 'function') window.removeChatChar(arg);
              break;
          }
        });
      }

      // ============== 入口（每个步骤独立 try，互不影响） ==============
      function safeRun(label, fn) {
        try {
          fn();
        } catch (e) {
          console.error('[正文美化] ' + label + ' 失败:', e);
        }
      }

      let _rbBooted = false;
      function rbBoot() {
        if (_rbBooted) return;
        _rbBooted = true;
        // 优先把按钮事件挂上，确保即使后续 init 出错按钮也能用
        safeRun('initEventDelegation', initEventDelegation);
        safeRun('initThemeToggle', initThemeToggle);
        safeRun('initSettingsPanel', initSettingsPanel);
        safeRun('initAvatarUpload', initAvatarUpload);
        safeRun('initTheme', initTheme);
        safeRun('initFontSize', initFontSize);
        safeRun('loadCustomCharsIntoConfig', loadCustomCharsIntoConfig);
        safeRun('processContent', processContent);
        safeRun('renderCacheCharList', renderCacheCharList);
        safeRun('renderChatCharList', renderChatCharList);
      }

      // 脚本在 body 末尾执行时，body 必然已存在；多数 iframe srcdoc 场景 readyState 已是
      // 'interactive' 或 'complete'。即使是 'loading'，也直接跑（document.body 已可用），
      // 同时保留 DOMContentLoaded 监听作为兜底（避免被某些环境提前触发又错过监听）。
      rbBoot();
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', rbBoot);
      }
    </script>
  </body>
</html>
