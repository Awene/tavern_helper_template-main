          { pattern: /咒法\[(\d+)\]/g, label: '咒法', icon: 'fa-solid fa-scroll' },
          { pattern: /幻术\[(\d+)\]/g, label: '幻术', icon: 'fa-solid fa-mask' },
          { pattern: /阵法\[(\d+)\]/g, label: '阵法', icon: 'fa-solid fa-diagram-project' },
          { pattern: /神识\[(\d+)\]/g, label: '神识', icon: 'fa-solid fa-eye' },
          { pattern: /炼体\[(\d+)\]/g, label: '炼体', icon: 'fa-solid fa-person' },
        ];
        attrMappings.forEach(({ pattern, label, icon }) => {
          html = html.replace(pattern, (m, val) => `<span class="stat-label"><i class="${icon}"></i> ${label}${val}</span>`);
        });
        html = html.replace(/五行:\s*([金木水火土])\s*vs\s*([金木水火土])/g, (m, e1, e2) => {
          const t1 = `<span class="tag tag-element"><i class="fa-solid fa-circle"></i> ${e1}</span>`;
          const t2 = `<span class="tag tag-element"><i class="fa-solid fa-circle"></i> ${e2}</span>`;
          return `五行: ${t1} vs ${t2}`;
        });
        ['渡劫', '大乘', '合体', '分神', '元神', '化神', '炼虚', '炼神', '金丹', '筑基', '练气'].forEach(realm => {
          html = html.replace(
            new RegExp(`${realm}([L×\\d]|\\s|$)`, 'g'),
            (m, suffix) => `<span class="tag tag-realm"><i class="fa-solid fa-crown"></i> ${realm}</span>${suffix}`,
          );
        });
        ['人物', '法宝', '灵兽', '傀儡', '阵法'].forEach(type => {
          html = html.replace(
            new RegExp(`(${type})([A-Z]|集群)`, 'g'),
            `<span class="tag tag-unit-type"><i class="fa-solid fa-users"></i> $1$2</span>`,
          );
        });
        html = html.replace(/结阵中/g, `<span class="tag tag-formation"><i class="fa-solid fa-circle-notch"></i> 结阵中</span>`);
        html = html.replace(/已结阵/g, `<span class="tag tag-formation"><i class="fa-solid fa-check-circle"></i> 已结阵</span>`);
        return html;
      }

      function beautifyCharRow(row) {
        let html = _.escape(row);
        ['凡', '黄', '玄', '地', '天'].forEach(q => {
          html = html.replace(new RegExp(`品质:\\s*${q}`, 'g'), `<span class="field-label">品质:</span> <span class="tag">${q}</span>`);
        });
        ['火', '水', '木', '金', '土', '阴', '阳'].forEach(elem => {
          html = html.replace(new RegExp(`五行:\\s*\\[${elem}\\]`, 'g'), `<span class="field-label">五行:</span> <span class="tag">[${elem}]</span>`);
          html = html.replace(new RegExp(`灵根五行:\\s*\\[${elem}\\]`, 'g'), `<span class="field-label">灵根五行:</span> <span class="tag">[${elem}]</span>`);
        });
        ['渡劫', '大乘', '合体', '分神', '元神', '化神', '炼虚', '炼神', '金丹', '筑基', '练气'].forEach(realm => {
          html = html.replace(new RegExp(`境界:\\s*${realm}`, 'g'), `<span class="field-label">境界:</span> <span class="tag">${realm}</span>`);
        });
        ['心法', '攻击', '咒法', '幻术', '神识', '身法', '护体', '阵法', '法宝', '护甲', '饰品', '工具', '符箓', '丹药', '秘籍', '素材', '傀儡', '灵兽'].forEach(type => {
          html = html.replace(new RegExp(`类型:\\s*${type}`, 'g'), `<span class="field-label">类型:</span> <span class="tag">${type}</span>`);
        });
        html = html.replace(/使用中:\s*(true|false)/g, (m, val) => {
          const status = val === 'true' ? '✓ 使用中' : '✗ 未使用';
          return `<span class="field-label">使用中:</span> <span class="tag">${status}</span>`;
        });
        return html;
      }

      function beautifyItemRow(row) {
        let html = _.escape(row);
        ['凡', '黄', '玄', '地', '天'].forEach(q => {
          html = html.replace(
            new RegExp(`品质:\\s*${q}`, 'g'),
            `<span class="field-label">品质:</span> <span class="tag tag-quality-${q}"><i class="fa-solid fa-star"></i> ${q}</span>`,
          );
        });
        ['物品', '功法', '法宝', '护甲', '饰品', '傀儡', '灵兽', '秘籍', '配方', '符箓', '丹药', '素材', '工具'].forEach(t => {
          html = html.replace(
            new RegExp(`类型:\\s*${t}`, 'g'),
            `<span class="field-label">类型:</span> <span class="tag tag-type"><i class="fa-solid fa-tag"></i> ${t}</span>`,
          );
        });
        html = html.replace(/攻击力:\s*(\d+)/g, (m, val) => `<span class="field-label">攻击力:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/防御力:\s*(\d+)/g, (m, val) => `<span class="field-label">防御力:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/遁速:\s*(\d+)/g, (m, val) => `<span class="field-label">遁速:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/气血:\s*(\d+)/g, (m, val) => `<span class="field-label">气血:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/灵气:\s*(\d+)/g, (m, val) => `<span class="field-label">灵气:</span> <span class="stat-value">${val}</span>`);
        html = html.replace(/\[([^\]]+)\]/g, (m, tag) => `<span class="tag tag-attr"><i class="fa-solid fa-bookmark"></i> ${tag}</span>`);
        html = html.replace(/效果:\s*([^|]+)/g, (m, effect) => `<span class="field-label">效果:</span> <span class="effect-text">${effect.trim()}</span>`);
        return html;
      }

      // —— 渲染各 panel 为 HTML 字符串（不操作 DOM，便于嵌入占位符流程） ——
      function renderActionHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          const config = RB_PANEL_CONFIG_ACTION[section.title] || { type: 'battle', icon: 'fa-solid fa-scroll' };
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyActionRow(row)}</div>`; });
          html += `<div class="action-panel ${config.type}"><div class="panel-header"><i class="panel-icon ${config.icon}"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;
        });
        return html;
      }

      function renderBattleHtml(panel) {
        let html = '';
        _.forEach(panel.sections, section => {
          const icon = RB_PANEL_CONFIG_BATTLE[section.title] || 'fa-solid fa-scroll';
          let rowsHtml = '';
          _.forEach(section.rows, row => { rowsHtml += `<div class="data-row">${beautifyBattleRow(row)}</div>`; });
          html += `<div class="battle-panel"><div class="panel-header"><i class="panel-icon ${icon}"></i><span class="panel-title">${_.escape(section.title)}</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div><div class="panel-content">${rowsHtml}</div></div>`;
        });
        return html;
      }

      // —— 角色卡(名片)分类映射 —— //
      // header 字段: 抽到顶部用,不进 tab (身份不再进 header,改入 背景 tab 显示为标签)
      const CHAR_HEADER_FIELDS = ['姓名', '名字', '名号', '道号', '种族', '性别'];
      // 直接隐藏的 section 标题 / scalar key (NPC 名片不展示这些;但 header 仍会从中抽境界)
      const CHAR_HIDE_FIELDS = ['修炼进度', '境界'];
      // 各 tab 的归属(scalar/multiline/section/list-section 共用):前面优先匹配
      const CHAR_TAB_DEFS = [
        { key: '资料', label: '资料', match: ['寿元', '灵根', '体质', '技艺', '资源池', '状态', '状态效果'] },
        { key: '功法', label: '功法', match: ['功法'] },
        { key: '储物', label: '储物', match: ['储物', '物品', '装备', '灵石', '傀儡', '灵兽'] },
        { key: '形象', label: '形象', match: ['性格', '外貌', '着装', '气质', '言行'] },
        { key: '背景', label: '背景', match: ['身份', '背景', '背景故事', '经历', '简介', '出身', '家世', '过往'] },
        { key: '关系', label: '关系', match: ['关系', '人际', '亲属', '师承', '道侣', '好感度'] },
      ];
      function classifyCharItem(item) {
        const probe = (item.kind === 'section' || item.kind === 'list-section') ? item.title : item.key;
        if (!probe) return '背景';
        // 精确匹配优先
        for (const tab of CHAR_TAB_DEFS) {
          if (tab.match.includes(probe)) return tab.key;
        }
        // 退化:子串匹配
        for (const tab of CHAR_TAB_DEFS) {
          if (tab.match.some(m => probe.includes(m))) return tab.key;
        }
        return '背景'; // 未分类的兜底丢入 背景 tab,不再单独有"其他"
      }

      // —— 仅对 value 上色:根据 key 决定怎样渲染(返回 HTML 片段) —— //
      function beautifyCharValue(key, value) {
        if (value == null || value === '') return '';
        const v = String(value).trim();
        // 品质
        if (key === '品质' && ['凡', '黄', '玄', '地', '天'].includes(v)) {
          return `<span class="tag tag-quality-${v}">${v}</span>`;
        }
        // 五行 / 灵根五行 — 支持 [水]/[水, 木]/水 各种写法
        if (key === '五行' || key === '灵根五行') {
          const m = v.match(/^\[(.+)\]$/);
          const elems = m ? m[1].split(/[,，\s]+/).filter(Boolean) : [v];
          return elems.map(e => `<span class="tag">${_.escape(e)}</span>`).join(' ');
        }
        // 境界 / 类型 / 品阶
        if (['境界', '类型', '品阶'].includes(key)) {
          return `<span class="tag">${_.escape(v)}</span>`;
        }
        // 布尔字段:使用中 / 道侣 / 在场 / 元阴 / 元阳
        if (['使用中', '道侣', '在场', '元阴', '元阳'].includes(key)) {
          const lc = v.toLowerCase();
          if (lc === 'true' || v === '是') return `<span class="tag tag-success">✓ 是</span>`;
          if (lc === 'false' || v === '否') return `<span class="tag">✗ 否</span>`;
        }
        // 默认转义后输出
        return _.escape(v);
      }

      // —— 渲染单个 item 为 HTML —— //
      function renderCharScalar(item) {
        return `<div class="char-card-field"><span class="char-card-field-key">${_.escape(item.key)}</span><span class="char-card-field-val">${beautifyCharValue(item.key, item.value)}</span></div>`;
      }
      function renderCharMultiline(item) {
        const text = item.value || '';
        const keyHtml = item.key ? `<div class="char-card-section-title">${_.escape(item.key)}</div>` : '';
        return `${keyHtml}<div class="char-card-text">${_.escape(text)}</div>`;
      }
      // 这些 section 每条都是较长的描述,单列展示更舒服
      const CHAR_NARRATIVE_SECTIONS = ['功法', '物品', '装备', '傀儡', '灵兽', '关系'];
      // —— 资源池 / 状态:气血/灵气 进度条,遁速 数字 —— //
      function renderCharResourcePool(item) {
        const raw = item.raw || [];
        let html = `<div class="char-card-section char-card-section--resource"><div class="char-card-section-title">${_.escape(item.title)}</div>`;
        for (const node of raw) {
          if (node.children && node.children.length) {
            // 现值/上限 → 进度条
            const sub = {};
            for (const c of node.children) sub[c.key] = c.value;
            const cur = Number(sub['现值'] ?? 0);
            const max = Number(sub['上限'] ?? cur);
            const pct = max > 0 ? Math.max(0, Math.min(100, (cur / max) * 100)) : 0;
            const cls = node.key === '气血' ? 'stat-hp' : node.key === '灵气' ? 'stat-mp' : 'stat-other';
            html += `<div class="char-card-stat ${cls}">` +
              `<span class="char-card-stat-label">${_.escape(node.key)}</span>` +
              `<div class="char-card-stat-bar"><div class="char-card-stat-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>` +
              `<span class="char-card-stat-value">${cur} / ${max}</span>` +
              `</div>`;
          } else {
            // 标量(遁速等) → 简单展示
            html += `<div class="char-card-stat char-card-stat--simple">` +
              `<span class="char-card-stat-label">${_.escape(node.key)}</span>` +
              `<span class="char-card-stat-value">${_.escape(String(node.value))}</span>` +
              `</div>`;
          }
        }
        html += `</div>`;
        return html;
      }

      // —— 技艺:过滤零值,只显示已修习的技艺 —— //
      function renderCharSkills(item) {
        const raw = item.raw || [];
        let html = `<div class="char-card-section char-card-section--skills"><div class="char-card-section-title">${_.escape(item.title)}</div>`;
        for (const group of raw) {
          if (!group.children || !group.children.length) continue;
          const nonzero = group.children.filter(s => Number(s.value) > 0);
          html += `<div class="char-card-skill-group">` +
            `<span class="char-card-skill-group-title">${_.escape(group.key)}</span>`;
          if (nonzero.length === 0) {
            html += `<span class="char-card-skill-empty">未习</span>`;
          } else {
            html += `<div class="char-card-skill-list">`;
            for (const s of nonzero) {
              html += `<span class="char-card-skill-pill">` +
                `<span class="char-card-skill-name">${_.escape(s.key)}</span>` +
                `<span class="char-card-skill-value">${_.escape(s.value)}</span>` +
                `</span>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
        return html;
      }

      // —— 体质:名称头 + 三维一行 + 描述 + 效果块 —— //
      function renderCharPhysique(item) {
        const raw = item.raw || [];
        const map = {};
        for (const n of raw) map[n.key] = n;
        const name = map['名称'] ? map['名称'].value : '';
        const desc = map['描述'] ? map['描述'].value : '';
        const wuxing = map['悟性'] ? map['悟性'].value : '';
        const gengu = map['根骨'] ? map['根骨'].value : '';
        const qigan = map['气感'] ? map['气感'].value : '';
        const effect = map['效果'];

        let html = `<div class="char-card-section char-card-section--physique"><div class="char-card-section-title">${_.escape(item.title)}</div>`;
        html += `<div class="char-card-physique-head">`;
        if (name) html += `<span class="char-card-physique-name">${_.escape(name)}</span>`;
        html += `<div class="char-card-physique-stats">`;
        if (wuxing !== '') html += `<span class="char-card-mini-stat"><b>悟</b> ${_.escape(wuxing)}</span>`;
        if (gengu !== '') html += `<span class="char-card-mini-stat"><b>骨</b> ${_.escape(gengu)}</span>`;
        if (qigan !== '') html += `<span class="char-card-mini-stat"><b>感</b> ${_.escape(qigan)}</span>`;
        html += `</div></div>`;
        if (desc) html += `<div class="char-card-physique-desc">${_.escape(desc)}</div>`;
        if (effect) {
          if (effect.children && effect.children.length) {
            html += `<div class="char-card-item-effects">`;
            for (const e of effect.children) {
              html += `<div class="char-card-effect-row">` +
                `<span class="char-card-effect-name">${_.escape(e.key)}:</span>` +
                `<span class="char-card-effect-val">${_.escape(String(e.value))}</span>` +
                `</div>`;
            }
            html += `</div>`;
          } else if (effect.value) {
            html += `<div class="char-card-physique-effect"><b>效果:</b> ${_.escape(String(effect.value))}</div>`;
          }
        }
        html += `</div>`;
        return html;
      }

      function renderCharSection(item) {
        // 特殊渲染:资源池/状态 / 技艺 / 体质
        if (item.title === '资源池' || item.title === '状态') return renderCharResourcePool(item);
        if (item.title === '技艺') return renderCharSkills(item);
        if (item.title === '体质') return renderCharPhysique(item);

        const isNarrative = CHAR_NARRATIVE_SECTIONS.includes(item.title);
        const cls = 'char-card-section' + (isNarrative ? ' char-card-section--narrative' : '');
        let html = `<div class="${cls}"><div class="char-card-section-title">${_.escape(item.title)}</div><div class="char-card-fields">`;
        _.forEach(item.fields, f => {
          if (f.key) {
            html += `<div class="char-card-field"><span class="char-card-field-key">${_.escape(f.key)}</span><span class="char-card-field-val">${beautifyCharValue(f.key, f.value)}</span></div>`;
          } else {
            html += `<div class="char-card-field char-card-field-full"><span class="char-card-field-val">${_.escape(f.value)}</span></div>`;
          }
        });
        html += `</div></div>`;
        return html;
      }
      // —— MVU 风格的物品/功法/装备卡片 —— //
      function renderCharItemCard(name, fields, sectionTitle, raw) {
        const map = {};
        for (const f of fields) map[f.key] = f.value;
        // 原始树:用于 傀儡/灵兽 的 资源池/技能 深度渲染
        const rawMap = {};
        if (raw && Array.isArray(raw)) for (const n of raw) rawMap[n.key] = n;
        const isCombatUnit = sectionTitle === '傀儡' || sectionTitle === '灵兽';
        const qty = map['数量'];
        const using = map['使用中'];
        const quality = map['品质'];
        const realm = map['境界'];
        const type = map['类型'];
        const elem = map['五行'];
        const pos = map['位置'];
        const desc = map['描述'];
        const effects = map['效果']; // 已经被 flatten 拼成 "k: v / k2: v2" 字符串
        const tagsField = map['标签']; // 标签数组,可能是 "[]" 或 "[a, b]"
        const cost = map['消耗'];
        // 装备 攻击力/防御力 mvu 不再有顶级数字字段,统一从标签里提取
        const lookupNumFromTagStr = (s, key) => {
          if (typeof s !== 'string' || !s) return undefined;
          const m = s.match(new RegExp(`${key}\\s*[:：]\\s*(\\d+(?:\\.\\d+)?)`));
          return m ? m[1] : undefined;
        };
        // 兼容:旧数据顶级 攻击力/防御力 优先;否则从标签字符串里提
        const atk = map['攻击力'] != null && map['攻击力'] !== '' ? map['攻击力'] : lookupNumFromTagStr(tagsField, '攻击力');
        const def = map['防御力'] != null && map['防御力'] !== '' ? map['防御力'] : lookupNumFromTagStr(tagsField, '防御力');

        // head:名字 + 使用中/数量 徽章
        let headHtml = `<span class="char-card-item-name">${_.escape(name)}</span>`;
        if (using !== undefined) {
          const lv = String(using).trim().toLowerCase();
          if (lv === 'true' || using === '是') {
            headHtml += `<span class="tag tag-success char-card-item-badge">✓ 使用中</span>`;
          }
        }
        if (qty !== undefined && qty !== '' && qty !== '1' && qty !== 1) {
          headHtml += `<span class="char-card-item-qty">×${_.escape(qty)}</span>`;
        }

        // meta tags:品质/类型/境界/五行/攻防
        let metaTags = '';
        if (quality && ['凡', '黄', '玄', '地', '天'].includes(quality)) {
          metaTags += `<span class="tag tag-quality-${quality}">${quality}</span>`;
        } else if (quality) {
          metaTags += `<span class="tag">${_.escape(quality)}</span>`;
        }
        if (type) metaTags += `<span class="tag">${_.escape(type)}</span>`;
        if (realm) metaTags += `<span class="tag">${_.escape(realm)}</span>`;
        if (elem) {
          const m = String(elem).match(/^\[(.+)\]$/);
          const elems = m ? m[1].split(/[,，\s]+/).filter(Boolean) : [String(elem).trim()];
          elems.forEach(e => { if (e) metaTags += `<span class="tag">${_.escape(e)}</span>`; });
        }
        if (atk) metaTags += `<span class="tag tag-attr">攻 ${_.escape(atk)}</span>`;
        if (def) metaTags += `<span class="tag tag-attr">防 ${_.escape(def)}</span>`;
        if (cost) metaTags += `<span class="tag">耗 ${_.escape(cost)}</span>`;

        // 自定义标签(数组形式)
        let customTags = '';
        if (tagsField && tagsField !== '[]') {
          const m = String(tagsField).match(/^\[(.+)\]$/);
          const ts = m ? m[1].split(/[,，]\s*/).filter(Boolean) : [];
          ts.forEach(t => { customTags += `<span class="char-card-item-customtag">${_.escape(t.trim())}</span>`; });
        }

        // 效果
        let effHtml = '';
        if (effects) {
          // effects 是 "key: val / key2: val2"
          const parts = String(effects).split(/\s*\/\s*/).filter(Boolean);
          effHtml = `<div class="char-card-item-effects">` +
            parts.map(p => {
              const ci = p.indexOf(':');
              if (ci > 0) {
                return `<div class="char-card-effect-row"><span class="char-card-effect-name">${_.escape(p.slice(0, ci).trim())}:</span><span class="char-card-effect-val">${_.escape(p.slice(ci + 1).trim())}</span></div>`;
              }
              return `<div class="char-card-effect-row">${_.escape(p)}</div>`;
            }).join('') +
            `</div>`;
        }

        // —— 傀儡/灵兽 的资源池 mini bars —— //
        let resourceHtml = '';
        if (isCombatUnit && rawMap['资源池'] && rawMap['资源池'].children) {
          resourceHtml = `<div class="char-card-unit-resources">`;
          for (const r of rawMap['资源池'].children) {
            if (r.children && r.children.length) {
              const sub = {};
              for (const c of r.children) sub[c.key] = c.value;
              const cur = Number(sub['现值'] ?? 0);
              const mx = Number(sub['上限'] ?? cur);
              const pct = mx > 0 ? Math.max(0, Math.min(100, (cur / mx) * 100)) : 0;
              const cls = r.key === '气血' ? 'stat-hp' : r.key === '灵气' ? 'stat-mp' : 'stat-other';
              resourceHtml += `<div class="char-card-unit-stat ${cls}">` +
                `<span class="char-card-unit-stat-label">${_.escape(r.key)}</span>` +
                `<div class="char-card-unit-stat-bar"><div class="char-card-unit-stat-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>` +
                `<span class="char-card-unit-stat-value">${cur}/${mx}</span>` +
                `</div>`;
            } else if (r.value) {
              resourceHtml += `<div class="char-card-unit-stat-simple"><span class="char-card-unit-stat-label">${_.escape(r.key)}</span><span class="char-card-unit-stat-value">${_.escape(String(r.value))}</span></div>`;
            }
          }
          resourceHtml += `</div>`;
        }

        // —— 傀儡/灵兽 的技能列表 —— //
        let skillsHtml = '';
        if (isCombatUnit && rawMap['技能'] && rawMap['技能'].children && rawMap['技能'].children.length) {
          skillsHtml = `<div class="char-card-unit-skills"><div class="char-card-unit-skills-title">技能</div>`;
          for (const sk of rawMap['技能'].children) {
            const skMap = {};
            if (sk.children) for (const c of sk.children) skMap[c.key] = c;
            const skAtk = skMap['攻击力'] ? skMap['攻击力'].value : '';
            const skCost = skMap['消耗'] ? skMap['消耗'].value : '';
            const skEff = skMap['效果'];
            skillsHtml += `<div class="char-card-unit-skill">` +
              `<div class="char-card-unit-skill-head">` +
                `<span class="char-card-unit-skill-name">${_.escape(sk.key)}</span>` +
                (skAtk ? `<span class="tag tag-attr">攻 ${_.escape(skAtk)}</span>` : '') +
                (skCost ? `<span class="tag">耗 ${_.escape(skCost)}</span>` : '') +
              `</div>`;
            if (skEff) {
              if (skEff.children && skEff.children.length) {
                skillsHtml += `<div class="char-card-unit-skill-effects">`;
                for (const e of skEff.children) {
                  skillsHtml += `<div class="char-card-effect-row">` +
                    `<span class="char-card-effect-name">${_.escape(e.key)}:</span>` +
                    `<span class="char-card-effect-val">${_.escape(String(e.value))}</span>` +
                    `</div>`;
                }
                skillsHtml += `</div>`;
              } else if (skEff.value) {
                skillsHtml += `<div class="char-card-unit-skill-effects"><div class="char-card-effect-row"><span class="char-card-effect-val">${_.escape(String(skEff.value))}</span></div></div>`;
              }
            }
            skillsHtml += `</div>`;
          }
          skillsHtml += `</div>`;
        }

        let html = `<div class="char-card-item${isCombatUnit ? ' char-card-item--unit' : ''}">`;
        html += `<div class="char-card-item-head">${headHtml}</div>`;
        if (metaTags) html += `<div class="char-card-item-meta">${metaTags}</div>`;
        if (customTags) html += `<div class="char-card-item-tagrow">${customTags}</div>`;
        if (resourceHtml) html += resourceHtml;
        if (effHtml) html += effHtml;
        if (skillsHtml) html += skillsHtml;
        if (desc) html += `<div class="char-card-item-desc">${_.escape(desc)}</div>`;
        if (pos) html += `<div class="char-card-item-loc"><i class="fa-solid fa-location-dot"></i> ${_.escape(pos)}</div>`;
        html += `</div>`;
        return html;
      }

      function renderCharListSection(item) {
        let html = `<div class="char-card-section char-card-section--items"><div class="char-card-section-title">${_.escape(item.title)}</div><div class="char-card-items">`;
        for (const it of item.items) {
          html += renderCharItemCard(it.name, it.fields, item.title, it.raw);
        }
        html += `</div></div>`;
        return html;
      }

      // —— 身份 拆分:健壮处理 逗号/中文逗号/分号/顿号/竖线/斜杠/换行/列表破折号 等多种分隔符 —— //
      function splitIdentity(value) {
        if (value == null) return [];
        const s = String(value).trim();
        if (!s) return [];
        // 处理 [a, b] 数组语法 或 (a; b) 括号语法
        const m = s.match(/^[\[\(\【](.*)[\]\)\】]$/s);
        const inner = m ? m[1] : s;
        return inner
          .split(/[,，;；、|｜\/／\n\r]+/)
          .map(t => t.replace(/^[\s\-•·*‣◦‧]+/, '').replace(/[\s。.]+$/, '').trim())
          .filter(Boolean);
      }
      // —— 身份 渲染:无论 scalar/section/multiline 都拍成 tag 列表 —— //
      function renderCharIdentity(item) {
        let parts = [];
        if (item.kind === 'scalar' || item.kind === 'multiline') {
          parts = splitIdentity(item.value);
        } else if (item.kind === 'section') {
          // section 子节点的 key 即一条身份;若 key 为空但 value 有,退化用 value
          for (const f of (item.fields || [])) {
            const piece = (f.key && f.key.trim()) || (f.value && String(f.value).trim()) || '';
            if (piece) {
              // 单条 key 内仍可能含 "/" 等分隔,继续 split
              splitIdentity(piece).forEach(p => parts.push(p));
            }
          }
        } else if (item.kind === 'list-section') {
          for (const it of (item.items || [])) {
            if (it.name) splitIdentity(it.name).forEach(p => parts.push(p));
          }
        }
        // 去重(保序)
        const seen = new Set();
        parts = parts.filter(p => (seen.has(p) ? false : (seen.add(p), true)));
        if (!parts.length) return '';
        const tagsHtml = parts.map(p =>
          `<span class="tag char-id-tag">${_.escape(p)}</span>`
        ).join('');
        return `<div class="char-card-section char-card-section--identity">` +
                 `<div class="char-card-section-title">身份</div>` +
                 `<div class="char-card-id-tags">${tagsHtml}</div>` +
               `</div>`;
      }

      function renderCharItem(item) {
        // 身份 特殊渲染:tag 列表(健壮处理多种分隔符)
        const probe = (item.kind === 'section' || item.kind === 'list-section') ? item.title : item.key;
        if (probe === '身份') return renderCharIdentity(item);
        if (item.kind === 'scalar') return renderCharScalar(item);
        if (item.kind === 'multiline') return renderCharMultiline(item);
        if (item.kind === 'section') return renderCharSection(item);
        if (item.kind === 'list-section') return renderCharListSection(item);
        return '';
      }

      // —— 唯一 panel id (用于 tab data-target 配对,避免多面板互相干扰) —— //
      let _charPanelCounter = 0;

      function renderCharHtml(charData) {
        const items = charData.items || [];
        if (!items.length) return '';

        // 1) 提取 header 用的 scalar + 过滤 hide 字段
        const headerMap = {};
        const remaining = [];
        for (const item of items) {
          if (item.kind === 'scalar' && CHAR_HEADER_FIELDS.includes(item.key) && item.value) {
            headerMap[item.key] = item.value;
            continue;
          }
          // 元阳/元阴 → 直接进 header,不再在 资料 tab 重复显示
          if (item.kind === 'scalar' && (item.key === '元阳' || item.key === '元阴')) {
            headerMap[item.key] = item.value;
            continue;
          }
          // hide:不进 tab 也不在内容显示(但 header tag 仍可从这些 section 抽 境界/天谴)
          const probe = (item.kind === 'section' || item.kind === 'list-section') ? item.title : item.key;
          if (probe && CHAR_HIDE_FIELDS.includes(probe)) {
            // 抽 header 用的境界:支持 修炼进度.境界 / 境界.当前境界 / 境界.境界 几种写法
            if (item.kind === 'section' && (item.title === '修炼进度' || item.title === '境界')) {
              const fr = item.fields.find(x => x.key === '境界' || x.key === '当前境界');
              if (fr && fr.value && !headerMap['_境界']) headerMap['_境界'] = fr.value;
              const ft = item.fields.find(x => x.key === '天谴');
              if (ft && ft.value !== undefined && headerMap['_天谴'] === undefined) headerMap['_天谴'] = ft.value;
            }
            continue;
          }
          // 顶级 scalar 形式的 境界(如 `境界: 筑基初期`)也抽到 header
          if (item.kind === 'scalar' && (item.key === '境界' || item.key === '当前境界') && item.value) {
            if (!headerMap['_境界']) headerMap['_境界'] = item.value;
            continue;
          }
          // 顶级 scalar 形式的 天谴 也抽到 header
          if (item.kind === 'scalar' && item.key === '天谴') {
            if (headerMap['_天谴'] === undefined) headerMap['_天谴'] = item.value;
            continue;
          }
          remaining.push(item);
        }

        // 2) 构造 header
        const name = headerMap['姓名'] || headerMap['名字'] || headerMap['名号'] || headerMap['道号'] || '佚名';
        // 身份不再放 header sub-line,改入 背景 tab 显示为标签
        const avatarChar = (() => {
          const m = String(name).match(/^([^\s【\[]+)/);
          return (m ? m[1] : name).slice(0, 1);
        })();
        const headerTags = [];
        if (headerMap['种族']) headerTags.push(`<span class="tag">${_.escape(headerMap['种族'])}</span>`);
        if (headerMap['性别']) headerTags.push(`<span class="tag">${_.escape(headerMap['性别'])}</span>`);
        // 从 remaining 抽 灵根 名称
        for (const it of remaining) {
          if (it.kind === 'section' && it.title === '灵根') {
            const f = it.fields.find(x => x.key === '名称');
            if (f && f.value) headerTags.push(`<span class="tag">${_.escape(f.value)}</span>`);
          }
        }
        // 境界(从被 hide 的 修炼进度 抽出来)
        if (headerMap['_境界']) headerTags.push(`<span class="tag">${_.escape(headerMap['_境界'])}</span>`);

        // 元阳/元阴:勾叉表达;按 schema,角色只会存在其中之一(性别决定)
        for (const k of ['元阳', '元阴']) {
          if (headerMap[k] === undefined) continue;
          const v = String(headerMap[k]).trim().toLowerCase();
          const isIntact = v === 'true' || v === '是';
          const cls = isIntact ? 'char-header-purity-intact' : 'char-header-purity-broken';
          const label = isIntact ? `${k} ✓` : `${k} ✗`;
          headerTags.push(`<span class="tag ${cls}">${_.escape(label)}</span>`);
        }

        // 天谴:>0 才显示(红色,危险感)
        if (headerMap['_天谴'] !== undefined && Number(headerMap['_天谴']) > 0) {
          headerTags.push(`<span class="tag char-header-tribulation">天谴 ${_.escape(headerMap['_天谴'])}</span>`);
        }

        // 3) 按 tab 分组 remaining
        const groups = {};
        for (const it of remaining) {
          const cat = classifyCharItem(it);
          (groups[cat] = groups[cat] || []).push(it);
        }
        // 资料 tab 内重排:资源池/状态 提前(它们最重要)
        const TAB_PRIORITY_资料 = ['资源池', '状态', '寿元', '灵根', '体质', '技艺'];
        if (groups['资料']) {
          const pri = (it) => {
            const probe = (it.kind === 'section' || it.kind === 'list-section') ? it.title : it.key;
            const idx = TAB_PRIORITY_资料.indexOf(probe || '');
            return idx === -1 ? 99 : idx;
          };
          groups['资料'].sort((a, b) => pri(a) - pri(b));
        }
        // 按 CHAR_TAB_DEFS 顺序保留只非空的 tab
        const activeTabs = CHAR_TAB_DEFS.filter(t => groups[t.key] && groups[t.key].length > 0);
        if (!activeTabs.length) {
          // 啥也没分到,把全部塞进"资料"
          groups['资料'] = remaining;
          activeTabs.push({ key: '资料', label: '资料' });
        }

        // 4) 拼 HTML
        const panelId = `rb-char-${++_charPanelCounter}`;
        const tabsHtml = activeTabs.length > 1
          ? `<div class="char-card-tabs" data-panel="${panelId}">${activeTabs.map((t, idx) =>
              `<button type="button" class="char-card-tab${idx === 0 ? ' active' : ''}" data-tab="${t.key}">${_.escape(t.label)}</button>`
            ).join('')}</div>`
          : '';
        const contentsHtml = activeTabs.map((t, idx) => {
          const inner = (groups[t.key] || []).map(renderCharItem).join('');
          return `<div class="char-card-tab-content${idx === 0 ? ' active' : ''}" data-tab="${t.key}">${inner}</div>`;
        }).join('');

        const headerHtml =
          `<div class="char-card-header">` +
            `<div class="char-card-avatar">${_.escape(avatarChar)}</div>` +
            `<div class="char-card-meta">` +
              `<div class="char-card-name">${_.escape(name)}</div>` +
              (headerTags.length ? `<div class="char-card-tags">${headerTags.join('')}</div>` : '') +
            `</div>` +
          `</div>`;

        return `<div class="char-panel" data-panel-id="${panelId}">` +
          `<div class="panel-header"><i class="panel-icon fa-solid fa-id-card"></i><span class="panel-title">${_.escape(name)} · 角色卡</span><i class="panel-toggle fa-solid fa-chevron-down"></i></div>` +
          `<div class="panel-content">${headerHtml}${tabsHtml}${contentsHtml}</div>` +
          `</div>`;
      }

      // —— item_info 名片化渲染 —— //
      // 类型 → fontawesome 图标(用作卡片左侧"配图")
      const ITEM_TYPE_ICON = {
        心法: 'fa-solid fa-yin-yang',
        攻击: 'fa-solid fa-bolt',
        咒法: 'fa-solid fa-hat-wizard',
        幻术: 'fa-solid fa-eye',
        神识: 'fa-solid fa-brain',
        身法: 'fa-solid fa-feather',
        护体: 'fa-solid fa-shield',
        阵法: 'fa-solid fa-circle-nodes',
        法宝: 'fa-solid fa-khanda',
        护甲: 'fa-solid fa-shield-halved',
        饰品: 'fa-solid fa-gem',
        工具: 'fa-solid fa-screwdriver-wrench',
        丹药: 'fa-solid fa-prescription-bottle',
        符箓: 'fa-solid fa-scroll',
        秘籍: 'fa-solid fa-book',
        配方: 'fa-solid fa-flask',
        素材: 'fa-solid fa-cubes-stacked',
        傀儡: 'fa-solid fa-robot',
        灵兽: 'fa-solid fa-dragon',
      };
      const ITEM_EL_COLOR = {
        金: '#d6c474', 木: '#7ec47b', 水: '#5d9cd4', 火: '#d46b50',
        土: '#b48a5e', 阴: '#7a4f7a', 阳: '#d4a85e', 混沌: '#888',
      };

      function _splitRowKv(row) {
        const result = [];
        const parts = String(row).split(/\s*\|\s*/);
        for (const part of parts) {
          if (!part.trim()) continue;
          const colonIdx = part.indexOf(':');
          const colonIdx2 = part.indexOf('：');
          const idx = colonIdx === -1 ? colonIdx2 : (colonIdx2 === -1 ? colonIdx : Math.min(colonIdx, colonIdx2));
          if (idx > 0) {
            result.push({ key: part.slice(0, idx).trim(), value: part.slice(idx + 1).trim() });
          } else {
            result.push({ key: '', value: part.trim() });
          }
        }
        return result;
      }

      // 把 效果 字段值解析成 {name: desc} 字典(兼容三种格式)
      function _parseEffectValue(value) {
        const out = {};
        const v = String(value || '').trim();
        if (!v) return out;
        // 1) [name: desc][name2: desc2] 多条括号
        const effs = v.match(/\[([^\]]+)\]/g);
        if (effs && effs.length) {
          for (const e of effs) {
            const inner = e.slice(1, -1);
            const ci = inner.search(/[:：]/);
            if (ci > 0) out[inner.slice(0, ci).trim()] = inner.slice(ci + 1).trim();
            else out[inner.trim()] = '';
          }
          return out;
        }
        // 2) "name: desc" 单条 K:V
        const ci = v.search(/[:：]/);
        if (ci > 0) {
          out[v.slice(0, ci).trim()] = v.slice(ci + 1).trim();
          return out;
        }
        // 3) 纯描述,无 name → 用 "效果" 作 key
        out['效果'] = v;
        return out;
      }

      // 检测一行的语义类型(资源/防御/技能/普通字段),用于 AI 把所有字段扁平写在主段时仍能正确归类
      function _classifyItemRow(row) {
        const r = String(row).trim();
        // 气血/灵气 双值: "气血: 现值200 / 上限200" 或 "气血: 200/200"
        const m_hp = r.match(/^(气血|灵气)\s*[:：]\s*(?:现值\s*)?\[?(\d+)\]?\s*\/\s*(?:上限\s*)?\[?(\d+)\]?/);
        if (m_hp) return { type: 'resource', res: { name: m_hp[1], cur: +m_hp[2], max: +m_hp[3] } };
        // 遁速 单值
        const m_dun = r.match(/^遁速\s*[:：]\s*\[?(\d+)\]?/);
        if (m_dun) return { type: 'resource', res: { name: '遁速', cur: +m_dun[1] } };
        // 防御力 顶级
        const m_def = r.match(/^防御力\s*[:：]\s*\[?(\d+)\]?/);
        if (m_def) return { type: 'defense', value: m_def[1] };

        // 技能行: 多 | 段且首段是裸名(无冒号) 且 后续段含 攻击力/消耗/效果 关键字
        const parts = r.split(/\s*\|\s*/);
        if (parts.length >= 2) {
          const first = parts[0].trim();
          const firstHasColon = /[:：]/.test(first);
          const restHasSkillKeys = parts.slice(1).some(p => /^(攻击力|消耗|效果)\s*[:：]/.test(p.trim()));
          if (!firstHasColon && first && restHasSkillKeys) {
            const skill = { name: first.replace(/[\[\]]/g, '').trim(), 效果: {} };
            for (const p of parts.slice(1)) {
              const m = p.match(/^([^:：]+)\s*[:：]\s*(.+)$/);
              if (!m) continue;
              const k = m[1].trim();
              const v = m[2].trim();
              if (k === '攻击力') skill.攻击力 = v.replace(/[\[\]]/g, '');
              else if (k === '消耗') skill.消耗 = v.replace(/[\[\]]/g, '');
              else if (k === '效果') Object.assign(skill.效果, _parseEffectValue(v));
            }
            return { type: 'skill', skill };
          }
        }

        // 默认: 普通 K:V 行(可能含多对)
        return { type: 'fields', kvs: _splitRowKv(r) };
      }

      // 把 panel.sections 拆成 一张 或 多张 item card
      // 顶层 section = 一张卡片;子段 {资源池}/{防御}/{技能} 归到当前卡片;
      // 容错: AI 直接把所有字段(包括气血/灵气/遁速/防御力/技能行)扁平写在主段时,_classifyItemRow 会自动归类
      function _flattenItemSections(panel) {
        const SUB_TITLES = new Set(['资源池', '防御', '技能']);
        const cards = [];
        let cur = null;
        function newCard(name) {
          return {
            name,
            fields: {},
            标签: [],
            效果: {},
            inlineResources: [],   // 主段内识别出的 资源池 行
            inline防御力: '',       // 主段内识别出的 防御力
            inlineSkills: [],      // 主段内识别出的 技能 行
            subs: {},              // 子段原始 rows (资源池/防御/技能)
          };
        }
        for (const section of panel.sections) {
          if (SUB_TITLES.has(section.title) && cur) {
            cur.subs[section.title] = section.rows;
            continue;
          }
          if (cur) cards.push(cur);
          cur = newCard(section.title);
          for (const row of section.rows) {
            const cls = _classifyItemRow(row);
            if (cls.type === 'resource') {
              cur.inlineResources.push(cls.res);
            } else if (cls.type === 'defense') {
              cur.inline防御力 = cls.value;
            } else if (cls.type === 'skill') {
              cur.inlineSkills.push(cls.skill);
            } else {
              // fields:可能含多对 K:V
              for (const { key, value } of cls.kvs) {
                if (!key) continue;
                if (key === '标签') {
                  const matches = String(value).match(/\[([^\]]+)\]/g) || [];
                  if (matches.length) {
                    for (const m of matches) cur.标签.push(m.slice(1, -1).trim());
                  } else if (value.trim()) {
                    for (const t of value.split(/[,，、]+/)) {
                      const tt = t.trim();
                      if (tt) cur.标签.push(tt);
                    }
                  }
                } else if (key === '效果') {
                  Object.assign(cur.效果, _parseEffectValue(value));
                } else {
                  cur.fields[key] = value;
                }
              }
            }
          }
        }
        if (cur) cards.push(cur);
        return cards;
      }

      function renderItemCard(card) {
        const f = card.fields;
        const 品质 = (f.品质 || '凡').replace(/\[|\]/g, '').trim();
        const 类型 = (f.类型 || '').replace(/\[|\]/g, '').trim();
        const 境界 = (f.境界 || '').replace(/\[|\]/g, '').trim();
        const 五行 = (f.五行 || '').replace(/\[|\]/g, '').trim();
        const 消耗 = (f.消耗 || '').replace(/\[|\]/g, '').trim();
        const 描述 = (f.描述 || '').replace(/^\[|\]$/g, '').trim();
        const 位置 = (f.位置 || '').replace(/\[|\]/g, '').trim();
        const 数量 = (f.数量 || '').replace(/\[|\]/g, '').trim();
        const 完整度 = (f.完整度 || '').replace(/\[|\]/g, '').trim();
        const 阅读进度 = (f.阅读进度 || '').replace(/\[|\]/g, '').trim();
        const iconCls = ITEM_TYPE_ICON[类型] || 'fa-solid fa-box';

        // 数值标签 K:V vs 描述性标签
        const numStats = [];
        const descTags = [];
        for (const tag of card.标签) {
          const m = tag.match(/^([^:：]+)\s*[:：]\s*(.+)$/);
          if (m) numStats.push({ label: m[1].trim(), value: m[2].trim() });
          else descTags.push(tag);
        }

        // 资源池: 优先用 inline,后兜底子段
        const resources = [...(card.inlineResources || [])];
        if (!resources.length && card.subs['资源池']) {
          for (const row of card.subs['资源池']) {
            const cls = _classifyItemRow(row);
            if (cls.type === 'resource') resources.push(cls.res);
          }
        }
        // 防御力: inline 优先
        let 防御力 = card.inline防御力 || '';
        if (!防御力 && card.subs['防御']) {
          for (const row of card.subs['防御']) {
            const cls = _classifyItemRow(row);
            if (cls.type === 'defense') { 防御力 = cls.value; break; }
          }
        }
        // 技能: inline 优先
        const skills = [...(card.inlineSkills || [])];
        if (!skills.length && card.subs['技能']) {
          for (const row of card.subs['技能']) {
            const cls = _classifyItemRow(row);
            if (cls.type === 'skill') skills.push(cls.skill);
          }
        }

        // —— HTML 拼装 ——
        const qCls = `ic-q-${品质 || '凡'}`;
        const elColor = ITEM_EL_COLOR[五行] || '#888';

        let metaHtml = '';
        if (品质) metaHtml += `<span class="ic-pill ic-quality ${qCls}"><i class="fa-solid fa-star"></i> ${_.escape(品质)}品</span>`;
        if (类型) metaHtml += `<span class="ic-pill ic-type"><i class="${iconCls}"></i> ${_.escape(类型)}</span>`;
        if (境界) metaHtml += `<span class="ic-pill ic-realm">${_.escape(境界)}</span>`;
        if (五行) metaHtml += `<span class="ic-element" style="--el:${elColor}">${_.escape(五行 === '混沌' ? '混' : 五行)}</span>`;
        if (数量 && /^\d+$/.test(数量) && +数量 > 1) metaHtml += `<span class="ic-pill ic-qty">×${_.escape(数量)}</span>`;
        if (完整度) metaHtml += `<span class="ic-pill ic-meta-mini">${_.escape(完整度)}</span>`;
        if (阅读进度) metaHtml += `<span class="ic-pill ic-meta-mini">进度 ${_.escape(阅读进度)}</span>`;

        // 数值 chips
        let statsHtml = '';
        for (const s of numStats) {
          const sCls = `ic-stat-${s.label}`;
          statsHtml += `<span class="ic-stat ${sCls}">${_.escape(s.label)} <b>${_.escape(s.value)}</b></span>`;
        }
        if (防御力) statsHtml += `<span class="ic-stat ic-stat-防御力">防 <b>${_.escape(防御力)}</b></span>`;

        // 资源池 bars
        let resourceHtml = '';
        if (resources.length) {
          resourceHtml = '<div class="ic-resources">';
          for (const r of resources) {
            if (r.name === '遁速') {
              resourceHtml += `<div class="ic-bar ic-bar-solo"><span class="ic-bar-label">遁</span><b class="ic-bar-num-solo">${r.cur}</b></div>`;
            } else {
              const max = Math.max(1, r.max || r.cur || 1);
              const pct = Math.max(0, Math.min(100, (r.cur / max) * 100));
              const cls = r.name === '气血' ? 'hp' : 'mp';
              resourceHtml += `<div class="ic-bar"><span class="ic-bar-label">${r.name}</span><span class="ic-bar-track"><span class="ic-bar-fill ${cls}" style="width:${pct.toFixed(1)}%"></span></span><span class="ic-bar-num">${r.cur}/${max}</span></div>`;
            }
          }
          resourceHtml += '</div>';
        }

        // 描述性标签
        let descTagsHtml = '';
        if (descTags.length) {
          descTagsHtml = '<div class="ic-tagrow">' +
            descTags.map(t => `<span class="ic-tag-desc">${_.escape(t)}</span>`).join('') +
            '</div>';
        }

        // 效果块
        let effHtml = '';
        const effKeys = Object.keys(card.效果);
        if (effKeys.length) {
          effHtml = '<div class="ic-effects">' +
            effKeys.map(k => `<div class="ic-effect-row"><span class="ic-effect-name">${_.escape(k)}</span><span class="ic-effect-val">${_.escape(card.效果[k])}</span></div>`).join('') +
            '</div>';
        }

        // 技能列表
        let skillsHtml = '';
        if (skills.length) {
          skillsHtml = '<div class="ic-skills"><div class="ic-skills-head"><i class="fa-solid fa-bolt"></i> 技能</div>';
          for (const s of skills) {
            skillsHtml += `<div class="ic-skill"><div class="ic-skill-head"><span class="ic-skill-name">${_.escape(s.name)}</span>` +
              (s.攻击力 ? `<span class="ic-stat ic-stat-攻击力">攻 <b>${_.escape(s.攻击力)}</b></span>` : '') +
              (s.消耗 ? `<span class="ic-skill-cost">耗 ${_.escape(s.消耗)}</span>` : '') +
              '</div>';
            const sk = s.效果 || {};
            for (const k of Object.keys(sk)) {
              skillsHtml += `<div class="ic-effect-row"><span class="ic-effect-name">${_.escape(k)}</span><span class="ic-effect-val">${_.escape(sk[k])}</span></div>`;
            }
            skillsHtml += '</div>';
          }
          skillsHtml += '</div>';
        }

        // 描述
        const descHtml = 描述 ? `<div class="ic-desc">${_.escape(描述)}</div>` : '';

        // 底栏:消耗 / 位置
        let footHtml = '';
        if (消耗 && 消耗 !== '无') footHtml += `<span class="ic-foot-item"><i class="fa-solid fa-droplet"></i> ${_.escape(消耗)}</span>`;
        if (位置) footHtml += `<span class="ic-foot-item"><i class="fa-solid fa-location-dot"></i> ${_.escape(位置)}</span>`;
        if (footHtml) footHtml = `<div class="ic-foot">${footHtml}</div>`;

        return `<div class="item-card ic-q-bg-${品质 || '凡'}">` +
                 `<div class="ic-head">` +
                   `<div class="ic-icon"><i class="${iconCls}"></i></div>` +
                   `<div class="ic-headinfo">` +
                     `<div class="ic-name">${_.escape(card.name)}</div>` +
                     (metaHtml ? `<div class="ic-meta">${metaHtml}</div>` : '') +
                   `</div>` +
                 `</div>` +
                 (statsHtml ? `<div class="ic-stats">${statsHtml}</div>` : '') +
                 resourceHtml +
                 descTagsHtml +
                 effHtml +
                 skillsHtml +
                 descHtml +
                 footHtml +
               `</div>`;
      }

      function renderItemHtml(panel) {
        const cards = _flattenItemSections(panel);
        return cards.map(renderItemCard).join('');
      }

      // —— time_info 报纸风渲染 —— //
      // 目标:把 时间推进/人物推演/文明演进/世界变迁 等 sections 渲染成"修仙日报"
      function _isPersonHeader(row) {
        // "阿文 (炼气中期 / 年龄17/寿命95)" 类的人物头行
        const r = String(row).trim();
        if (!r) return false;
        if (/[:：]/.test(r.split('(')[0] || r.split('（')[0] || '')) return false;
        return /^[^:：(（]+[(（][^)）]+[)）]\s*$/.test(r);
      }
      function _parsePersonRow(row) {
        const m = String(row).match(/^\s*([^(（]+?)\s*[(（]([^)）]+)[)）]\s*$/);
        return m ? { name: m[1].trim(), meta: m[2].trim() } : { name: String(row).trim(), meta: '' };
      }
      function _groupPeople(rows) {
        const people = [];
        let cur = null;
        for (const row of rows) {
          if (_isPersonHeader(row)) {
            if (cur) people.push(cur);
            const h = _parsePersonRow(row);
            cur = { name: h.name, meta: h.meta, rows: [] };
          } else if (cur) {
            cur.rows.push(row);
          } else {
            // 没人物头但有数据行 → 暂存到一个"未署名"项,避免丢失
            cur = { name: '佚', meta: '', rows: [row] };
          }
        }
        if (cur) people.push(cur);
        return people;
      }
      function _classifyTimeSection(title) {
        const t = String(title || '');
        if (!t) return 'unknown';
        if (/时间|推进|跨度/.test(t)) return 'span';
        if (/人物|推演|动向/.test(t)) return 'people';
        if (/文明|王朝|国度|演进/.test(t)) return 'civ';
        if (/世界|变迁|地域|势力/.test(t)) return 'world';
        if (/传闻|逸闻|奇闻/.test(t)) return 'rumor';
        return 'other';
      }

      // 把一行 "k: v | k2: v2" 拆成多个键值对(纯字符串)
      function _splitTimeRowFields(row) {
        const segs = String(row).split(/\s*\|\s*/).map(s => s.trim()).filter(Boolean);
        return segs.map(seg => {
          const m = seg.match(/^([^:：]+)\s*[:：]\s*(.+)$/);
          return m ? { k: m[1].trim(), v: m[2].trim() } : { k: '', v: seg };
        });
      }
      function _renderPersonRowsAsList(rows) {
        let html = '';
        for (const row of rows) {
          const fields = _splitTimeRowFields(row);
          if (fields.length === 1 && !fields[0].k) {
            html += `<li class="tp-person-line"><span class="tp-line-text">${_.escape(fields[0].v)}</span></li>`;
          } else {
            html += '<li class="tp-person-line">';
            for (const f of fields) {
              if (f.k) {
                html += `<span class="tp-line-key">${_.escape(f.k)}:</span> <span class="tp-line-val">${_.escape(f.v)}</span> `;
              } else if (f.v) {
                html += `<span class="tp-line-val">${_.escape(f.v)}</span> `;
              }
            }
            html += '</li>';
          }
        }
        return html;
      }
      function _renderNewsList(rows) {
        let html = '<ul class="tp-news-list">';
        for (const row of rows) {
          const fields = _splitTimeRowFields(row);
          html += '<li class="tp-news-item">';
          // 第一个段落: 用作 标题(地点/国度名 等);其余拼接为正文
          if (fields.length === 1 && !fields[0].k) {
            html += `<span class="tp-news-text">${_.escape(fields[0].v)}</span>`;
          } else if (fields[0] && fields[0].k) {
            html += `<span class="tp-news-tag">${_.escape(fields[0].k)}</span>`;
            html += `<span class="tp-news-text">${_.escape(fields[0].v)}</span>`;
            for (let i = 1; i < fields.length; i++) {
              const f = fields[i];
              html += ` · <span class="tp-news-extra">${f.k ? _.escape(f.k) + ': ' : ''}${_.escape(f.v)}</span>`;
            }
          } else {
            for (const f of fields) {
              html += f.k
                ? `<span class="tp-news-tag">${_.escape(f.k)}</span><span class="tp-news-text">${_.escape(f.v)}</span> `
                : `<span class="tp-news-text">${_.escape(f.v)}</span> `;
            }
          }
          html += '</li>';
        }
        html += '</ul>';
        return html;
      }

      function renderTimeHtml(panel) {
        const sections = (panel && panel.sections) || [];
        let span = '';
        let people = [];
        const buckets = { civ: [], world: [], rumor: [], other: [] };
        // 容错:若 sections 全部无 title(AI 漏了 {} 头),把所有 rows 合并尝试自动归类
        const allUntitled = sections.length && sections.every(s => !s.title);
        if (allUntitled) {
          const allRows = [].concat(...sections.map(s => s.rows));
          // 1) 先抓 跨度
          const remaining = [];
          for (const row of allRows) {
            const m = String(row).match(/^跨度\s*[:：]\s*(.+)$/);
            if (m && !span) span = m[1].trim();
            else remaining.push(row);
          }
          // 2) 剩余按"人物头"切组,其余作为新闻
          const personRows = [];
          const otherRows = [];
          let inPerson = false;
          for (const row of remaining) {
            if (_isPersonHeader(row)) inPerson = true;
            (inPerson ? personRows : otherRows).push(row);
          }
          if (personRows.length) people = _groupPeople(personRows);
          if (otherRows.length) buckets.other.push({ title: '', rows: otherRows });
        } else {
          for (const section of sections) {
            const cat = _classifyTimeSection(section.title);
            if (cat === 'span') {
              for (const row of section.rows) {
                const m = String(row).match(/^跨度\s*[:：]\s*(.+)$/);
                if (m) { span = m[1].trim(); break; }
              }
            } else if (cat === 'people') {
              people = _groupPeople(section.rows);
            } else if (cat === 'civ' || cat === 'world' || cat === 'rumor' || cat === 'other' || cat === 'unknown') {
              const targetKey = (cat === 'unknown' || cat === 'other') ? 'other' : cat;
              buckets[targetKey].push({ title: section.title || '其他', rows: section.rows });
            }
          }
        }

        // —— 拼 HTML ——
        let html = '<div class="time-paper">';
        html += '<div class="tp-masthead">';
        html += '<div class="tp-paper-title">修 真 月 报</div>';
        html += '<div class="tp-paper-rule"></div>';
        if (span) html += `<div class="tp-paper-sub"><i class="fa-solid fa-hourglass-half"></i> 时光流转 · ${_.escape(span)}</div>`;
        else html += '<div class="tp-paper-sub"><i class="fa-solid fa-hourglass-half"></i> 时光流转</div>';
        html += '</div>';

        if (people.length) {
          html += '<section class="tp-section tp-section-people">';
          html += '<h3 class="tp-section-title"><i class="fa-solid fa-user-group"></i> 人物动向</h3>';
          html += '<div class="tp-people-grid">';
          for (const p of people) {
            html += '<article class="tp-person">';
            html += `<header class="tp-person-head"><span class="tp-person-name">${_.escape(p.name)}</span>`;
            if (p.meta) html += `<span class="tp-person-meta">${_.escape(p.meta)}</span>`;
            html += '</header>';
            html += '<ul class="tp-person-events">';
            html += _renderPersonRowsAsList(p.rows);
            html += '</ul>';
            html += '</article>';
          }
          html += '</div></section>';
        }

        const titleMap = { civ: '王朝消息', world: '世事变迁', rumor: '江湖传闻', other: '余讯' };
        for (const cat of ['civ', 'world', 'rumor', 'other']) {
          if (!buckets[cat].length) continue;
          for (const sec of buckets[cat]) {
            if (!sec.rows || !sec.rows.length) continue;
            const headerTitle = sec.title || titleMap[cat];
            const iconCls = ({ civ: 'fa-landmark', world: 'fa-globe', rumor: 'fa-feather', other: 'fa-newspaper' })[cat];
            html += `<section class="tp-section tp-section-${cat}">`;
            html += `<h3 class="tp-section-title"><i class="fa-solid ${iconCls}"></i> ${_.escape(headerTitle)}</h3>`;
            html += _renderNewsList(sec.rows);
            html += '</section>';
          }
        }

        html += '</div>';
        return html;
      }

      // 渲染失败时的兜底:把原始内容裹一个红色"解析失败"条回退,避免整段 processContent 崩溃
      function renderPanelFallback(label, rawInner) {
        const safe = (typeof escapeHtml === 'function' ? escapeHtml : (s => String(s)))(String(rawInner || '').slice(0, 800));
        return `<div class="rb-fallback"><span class="rb-fallback-tag">${escapeHtml(label)} 解析失败</span>${safe}</div>`;
      }

      // 安全调用面板解析 + 渲染:任何抛错都吞掉返回 fallback
      function safeRenderPanel(label, parseFn, renderFn, inner) {
        try {
          const trimmed = String(inner || '').trim();
          if (!trimmed) return ''; // 空面板直接丢弃
          const parsed = parseFn(trimmed);
          // 没有任何 section/items 时直接丢弃,不渲染空壳
          const empty = !parsed || (
            (!parsed.sections || !parsed.sections.length) &&
            (!parsed.items || !parsed.items.length)
          );
          if (empty) return '';
          const html = renderFn(parsed);
          return html || '';
        } catch (e) {
          console.warn(`[正文美化] ${label} 渲染异常:`, e);
          return renderPanelFallback(label, inner);
        }
      }

      // —— 时空栏 <tp> 渲染:把 "修仙历X年-Y月-Z日-时辰 @ 世界-地域-地点| 天气" 转成漂亮 header —— //
      function renderTimeSpaceHeader(inner) {
        const text = String(inner || '').trim();
        if (!text) return '';
        // 解析:<时间> @ <地点> | <天气>
        let timePart = '', placePart = '', weatherPart = '';
        const m = text.match(/^([^@|]+?)(?:\s*@\s*([^|]+?))?(?:\s*\|\s*([\s\S]+))?$/);
        if (m) {
          timePart = (m[1] || '').trim();
          placePart = (m[2] || '').trim();
          weatherPart = (m[3] || '').trim();
        } else {
          timePart = text;
        }
        // 把 "-" 分隔符换成 "·" 并清理空白
        const beautify = s => s.replace(/\s*-\s*/g, ' · ').replace(/\s+/g, ' ').trim();
        timePart = beautify(timePart);
        placePart = beautify(placePart);

        let html = `<div class="rb-tp">`;
        if (timePart) {
          html += `<div class="rb-tp-cell rb-tp-cell--time">` +
            `<i class="fa-regular fa-calendar rb-tp-icon"></i>` +
            `<span class="rb-tp-text">${_.escape(timePart)}</span>` +
            `</div>`;
        }
        if (placePart) {
          html += `<div class="rb-tp-cell rb-tp-cell--place">` +
            `<i class="fa-solid fa-location-dot rb-tp-icon"></i>` +
            `<span class="rb-tp-text">${_.escape(placePart)}</span>` +
            `</div>`;
        }
        if (weatherPart) {
          html += `<div class="rb-tp-cell rb-tp-cell--weather">` +
            `<i class="fa-solid fa-cloud-sun rb-tp-icon"></i>` +
            `<span class="rb-tp-text">${_.escape(weatherPart)}</span>` +
            `</div>`;
        }
        html += `</div>`;
        return html;
      }

      // —— 小总结 <details><summary>title</summary>body</details> 渲染 —— //
      function renderSummaryCard(title, body) {
        // body 内可能含残留 HTML(如 <br> 或孤儿 tag),先剥
        let cleanBody = String(body || '')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/?(?:p|div|li|h[1-6])[^>]*>/gi, '\n')
          .replace(/<[^>]+>/g, '')
          .replace(/&nbsp;/g, ' ')
          .trim();

        const lines = cleanBody.split(/\n+/).map(l => l.trim()).filter(Boolean);
        const allBullets = lines.length > 0 && lines.every(l => /^[-•·*]\s/.test(l));

        let bodyHtml;
        if (allBullets) {
          bodyHtml = '<ul class="rb-summary-list">' +
            lines.map(l => `<li>${_.escape(l.replace(/^[-•·*]\s*/, ''))}</li>`).join('') +
            '</ul>';
        } else {
          bodyHtml = `<div class="rb-summary-text">${_.escape(cleanBody)}</div>`;
        }

        const titleEsc = _.escape(String(title || '小总结').trim() || '小总结');
        return `<details class="rb-summary" open>` +
          `<summary class="rb-summary-head">` +
            `<span class="rb-summary-icon">📜</span>` +
            `<span class="rb-summary-title">${titleEsc}</span>` +
            `<span class="rb-summary-toggle"><span class="rb-summary-toggle-text" data-close="▸ 展开" data-open="▾ 收起"></span></span>` +
          `</summary>` +
          `<div class="rb-summary-body">${bodyHtml}</div>` +
        `</details>`;
      }

      // —— 行动选项 <options>/<action_options> 渲染:解析 "1. xxx / 2. xxx / ..." 列表为可点击编号卡片 —— //
      // 点击会把选项文本追加到酒馆输入框,不自动发送、不替换原有输入
      function renderActionOptions(inner) {
        const text = String(inner || '')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/?(?:p|div|li|ol|ul|h[1-6])[^>]*>/gi, '\n')
          .replace(/<[^>]+>/g, '')
          .replace(/&nbsp;/g, ' ')
          .trim();
        if (!text) return '';

        const lines = text.split(/\n+/).map(l => l.trim()).filter(Boolean);
        const options = [];
        for (const line of lines) {
          const m = line.match(/^(\d+)\s*[.、)\]:]\s*(.+)$/);
          if (m) {
            options.push({ idx: m[1], text: m[2].trim() });
          } else if (options.length > 0) {
            options[options.length - 1].text += '\n' + line;
          } else {
            // 行首没有编号且没有已有项 -> 视为整段说明,直接归入第 0 项
            options.push({ idx: '·', text: line });
          }
        }

        let body;
        if (options.length === 0) {
          body = `<div class="rb-options-item" data-option-text="${_.escape(text)}"><span class="rb-options-text">${_.escape(text)}</span></div>`;
        } else {
          body = options.map(o =>
            `<div class="rb-options-item" data-option-text="${_.escape(o.text)}" title="点击填入输入框">` +
              `<span class="rb-options-num">${_.escape(o.idx)}</span>` +
              `<span class="rb-options-text">${_.escape(o.text)}</span>` +
            `</div>`
          ).join('');
        }

        return `<div class="rb-options">` +
          `<div class="rb-options-head">` +
            `<i class="rb-options-icon fa-solid fa-compass-drafting"></i>` +
            `<span class="rb-options-title">行动方略</span>` +
            `<span class="rb-options-hint">点击填入输入框</span>` +
          `</div>` +
          `<div class="rb-options-body">${body}</div>` +
        `</div>`;
      }

      // 把 raw 中的 5 类面板抽走、留 placeholder（避免被 paragraph splitter 切碎）
      // 顺序：内层（item/char/realm/battle）先于外层（action）；按 prompt 设计本不应嵌套
      function extractPanels(raw, stash) {
        const wrap = html => (html ? '\n\n' + stash(html) + '\n\n' : '\n\n');
        raw = raw.replace(/<item_info>([\s\S]*?)<\/item_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('item_info', parseTablePanel, renderItemHtml, inner)),
        );
        raw = raw.replace(/<char_info>([\s\S]*?)<\/char_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('char_info', parseCharIndentedPanel, renderCharHtml, inner)),
        );
        raw = raw.replace(/<battle_info>([\s\S]*?)<\/battle_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('battle_info', parseTablePanel, renderBattleHtml, inner)),
        );
        raw = raw.replace(/<action_info>([\s\S]*?)<\/action_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('action_info', parseTablePanel, renderActionHtml, inner)),
        );
        raw = raw.replace(/<time_info>([\s\S]*?)<\/time_info>/gi, (m, inner) =>
          wrap(safeRenderPanel('time_info', parseTablePanel, renderTimeHtml, inner)),
        );
        // 清理任何未配对的孤儿标签(AI 截断、写漏闭合等)
        raw = raw.replace(
          /<\/?(?:action_info|battle_info|char_info|item_info|time_info)\b[^>]*>?/gi,
          '',
        );
        return raw;
      }

      // 折叠点击事件委托（只挂一次）
      let _rbPanelDelegated = false;
      function ensurePanelClickDelegation() {
        if (_rbPanelDelegated) return;
        try {
          if (typeof $ === 'undefined') return;
          _rbPanelDelegated = true;
          $('#readingContent').on(
            'click',
            '.action-panel > .panel-header, .battle-panel > .panel-header, .char-panel > .panel-header, .item-panel > .panel-header',
            function () {
              $(this).toggleClass('collapsed');
              $(this).next('.panel-content').toggleClass('collapsed');
            },
          );
          // 角色卡 tab 切换:点 .char-card-tab 时切到对应内容
          $('#readingContent').on(
            'click',
            '.char-panel .char-card-tab',
            function (e) {
              e.stopPropagation();
              const $btn = $(this);
              if ($btn.hasClass('active')) return;
              const targetKey = $btn.attr('data-tab');
              const $tabs = $btn.closest('.char-card-tabs');
              const $panel = $tabs.closest('.char-panel');
              $tabs.find('.char-card-tab').removeClass('active');
              $btn.addClass('active');
              $panel
                .find('> .panel-content > .char-card-tab-content')
                .removeClass('active')
                .filter(`[data-tab="${targetKey}"]`)
                .addClass('active');
            },
          );
          // 行动选项点击 -> 把选项文本追加到酒馆输入框,不自动发送、不替换原值
          $('#readingContent').on(
            'click',
            '.rb-options-item',
            function () {
              const text = $(this).attr('data-option-text') || $(this).find('.rb-options-text').text() || '';
              if (!text.trim()) return;
              fillSendTextarea(text);
              const el = this;
              el.classList.remove('is-sent');
              // force reflow 触发动画重新播放
              void el.offsetWidth;
              el.classList.add('is-sent');
              setTimeout(() => el.classList.remove('is-sent'), 700);
            },
          );
        } catch (e) {
          console.warn('[正文美化] 折叠委托绑定失败:', e);
        }
      }

      // 把选项文本追加到酒馆输入框 #send_textarea
      // 优先尝试同 document(预设是嵌入页) -> 再尝试 window.parent(被 iframe 时)
      function fillSendTextarea(text) {
        if (!text) return;
        const candidates = [];
        try { if (document) candidates.push(document); } catch (e) { /* ignore */ }
        try { if (window.parent && window.parent !== window) candidates.push(window.parent.document); } catch (e) { /* cross-origin: ignore */ }
        try { if (window.top && window.top !== window) candidates.push(window.top.document); } catch (e) { /* ignore */ }

        let inputArea = null;
        for (const doc of candidates) {
          if (!doc) continue;
          inputArea = doc.querySelector('#send_textarea') || doc.querySelector('textarea#send_textarea');
          if (inputArea) break;
        }
        if (!inputArea) {
          console.warn('[正文美化] 未找到 #send_textarea, 选项无法填入');
          return;
        }
        const cur = inputArea.value || '';
        const sep = cur.length === 0 ? '' : (cur.endsWith('\n') ? '' : '\n');
        inputArea.value = cur + sep + text;
        try {
          inputArea.dispatchEvent(new Event('input', { bubbles: true }));
          inputArea.dispatchEvent(new Event('change', { bubbles: true }));
        } catch (e) { /* ignore */ }
        try { inputArea.focus(); } catch (e) { /* ignore */ }
        // 自动滚动到末尾
        try {
          inputArea.selectionStart = inputArea.selectionEnd = inputArea.value.length;
          inputArea.scrollTop = inputArea.scrollHeight;
        } catch (e) { /* ignore */ }
      }

      /** 主渲染：把原始文本切分为旁白 / 对话块 */
      function processContent() {
        const container = document.getElementById('readingContent');
        if (!container) return;
        let raw = container.innerHTML;
        if (!raw) return;

        // 1) 先解码实体（让 &lt;action_info&gt; 之类还原成真实标签）
        raw = decodeEntities(raw);

        // 1.5) 剥离 HTML 注释 <!-- ... --> （AI 把子思维链放在注释里）
        raw = raw.replace(/<!--[\s\S]*?-->/g, '');
        // 顺手清理孤儿的 --> 或 <!-- 标记字符串（仅当它们是行首/行尾的独立 token，避免误伤正文）
        raw = raw.replace(/^\s*-->\s*$/gm, '');
        raw = raw.replace(/^\s*<!--\s*$/gm, '');

        // 1.6) 删除系统元数据块(变量更新、disclaimer 英文诗) - 用户不应看到
        raw = raw.replace(/<UpdateVariable\b[^>]*>[\s\S]*?<\/UpdateVariable>/gi, '');
        raw = raw.replace(/<disclaimer\b[^>]*>[\s\S]*?<\/disclaimer>/gi, '');
        raw = raw.replace(/<\/?(?:UpdateVariable|disclaimer)\b[^>]*>?/gi, '');

        // 1.7) 剥离纯容器标签 <now_plot>/<gametxt> 仅去标签保留内层
        raw = raw.replace(/<\/?(?:now_plot|gametxt)\b[^>]*>?/gi, '');

        // 2) 抽取 5 类面板，留 U+2063 包裹的 placeholder（不会被 escape/trim/split 破坏）
        const panelMap = new Map();
        let panelCounter = 0;
        const stashPanel = htmlFragment => {
          const token = `⁣RB_PANEL_${panelCounter++}⁣`;
          panelMap.set(token, htmlFragment);
          return token;
        };
        // 2.1) 抽取 <tp> 时空栏(在面板抽取前,因为它一般在正文开头)
        try {
          raw = raw.replace(/<tp>([\s\S]*?)<\/tp>/gi, (m, inner) =>
            '\n\n' + stashPanel(renderTimeSpaceHeader(inner.trim())) + '\n\n'
          );
          // 清理孤儿 <tp>/<\/tp> 标签(AI 截断或写漏)
          raw = raw.replace(/<\/?tp\b[^>]*>?/gi, '');
        } catch (e) {
          console.warn('[正文美化] <tp> 抽取失败:', e);
        }

        // 2.2) 抽取小总结:
        //   - 旧格式 <details><summary>title</summary>body</details>
        //   - 新格式 <summary>body</summary> (独立标签,无 <details> 包裹)
        try {
          raw = raw.replace(/<details\b[^>]*>([\s\S]*?)<\/details>/gi, (m, inner) => {
            const sm = inner.match(/<summary[^>]*>([\s\S]*?)<\/summary>([\s\S]*)/i);
            const title = sm ? sm[1].trim() : '小总结';
            const body = sm ? sm[2].trim() : inner.trim();
            return '\n\n' + stashPanel(renderSummaryCard(title, body)) + '\n\n';
          });
          // 独立 <summary>...</summary>(<details> 已被上一行剥离，剩下的就是新格式)
          raw = raw.replace(/<summary\b[^>]*>([\s\S]*?)<\/summary>/gi, (m, inner) =>
            '\n\n' + stashPanel(renderSummaryCard('小总结', inner.trim())) + '\n\n'
          );
          // 清理孤儿 <details>/<summary> 标签
          raw = raw.replace(/<\/?(?:details|summary)\b[^>]*>?/gi, '');
        } catch (e) {
          console.warn('[正文美化] <details>/<summary> 抽取失败:', e);
        }

        // 2.3) 抽取 <options>/<action_options> 行动选项 (两种命名兼容)
        try {
          raw = raw.replace(/<(?:action_)?options\b[^>]*>([\s\S]*?)<\/(?:action_)?options>/gi, (m, inner) =>
            '\n\n' + stashPanel(renderActionOptions(inner.trim())) + '\n\n'
          );
          raw = raw.replace(/<\/?(?:action_)?options\b[^>]*>?/gi, '');
        } catch (e) {
          console.warn('[正文美化] <options> 抽取失败:', e);
        }

        try {
          raw = extractPanels(raw, stashPanel);
        } catch (e) {
          console.warn('[正文美化] 面板抽取失败:', e);
        }

        // 3) 继续原有的标签剥离 & 空白规整
        raw = raw
          .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
          .replace(/<br\s*\/?>/gi, '\n')
          .replace(/<\/(?:p|div|li|h[1-6]|blockquote)>/gi, '\n')
          .replace(/<(?:hr)\s*\/?>/gi, '\n\n')
          .replace(
            /<\/?(?:div|span|p|ul|ol|li|strong|em|b|i|h[1-6]|a|br|hr|blockquote|pre|code|table|thead|tbody|tr|td|th)[^>]*>/gi,
            '',
          )
          .replace(/[\t ]+\n/g, '\n')
          .replace(/\n{3,}/g, '\n\n');

        // 全是面板（无文本）也要继续，否则面板渲染不到
        if (!raw.trim() && panelMap.size === 0) return;

        const lines = raw
          .split(/\n+/)
          .map(s => s.trim())
          .filter(Boolean);

        const out = [];
        let pending = null;

        const flush = () => {
          if (!pending) return;
          out.push(renderDialogue(pending.rawName, pending.lines.join('\n\n')));
          pending = null;
        };

        const braceFmt = /^\s*\{([^}]+)\}\s*([\s\S]+)$/;
        const panelTokenRe = /^⁣RB_PANEL_\d+⁣$/;

        for (const line of lines) {
          // 面板占位符：直接放入，不裹 narration 容器
          if (panelTokenRe.test(line)) {
            flush();
            out.push(line);
            continue;
          }

          // 双花括号包裹的情绪 / 动作标记按旁白输出
          if (/^\{\{.*\}\}/.test(line)) {
            flush();
            const html = renderNarration(line);
            if (html) out.push(html);
            continue;
          }

          const m = line.match(braceFmt);
          if (m) {
            const rawName = m[1].trim();
            const content = m[2].trim();
            const normName = normalizeDisplayName(rawName);
            const config = CHARACTER_CONFIG[normName];
            if (config) {
              if (pending && pending.normName === normName) {
                pending.lines.push(content);
              } else {
                flush();
                pending = { rawName, normName, lines: [content] };
              }
              continue;
            }
            flush();
            const html = renderNarration(content);
            if (html) out.push(html);
            continue;
          }

          flush();
          const html = renderNarration(line);
          if (html) out.push(html);
        }
        flush();

        // 4) 还原 placeholder 为真实面板 HTML
        let finalHtml = out.join('');
        panelMap.forEach((html, token) => {
          finalHtml = finalHtml.split(token).join(html);
        });
        container.innerHTML = finalHtml;

        // 5) 单次绑定折叠点击委托
        ensurePanelClickDelegation();
      }

      // ============== 主题切换 ==============
      function applyTheme(theme) {
        const t = theme === 'light' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        try {
          localStorage.setItem(THEME_KEY, t);
        } catch (e) {
          /* ignore */
        }
        const btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = t === 'dark' ? '🌙 夜' : '☀ 日';
      }
      function initTheme() {
        let saved = 'dark';
        try {
          saved = localStorage.getItem(THEME_KEY) || 'dark';
        } catch (e) {
          /* ignore */
        }
        applyTheme(saved);
      }

      // ============== 字号 ==============
      function adjustFontSize(delta) {
        const root = document.querySelector('.rb-content');
        if (!root) return;
        const cur = parseInt(getComputedStyle(root).fontSize) || 17;
        const next = Math.max(13, Math.min(24, cur + delta));
        root.style.setProperty('--rb-reading-font', next + 'px');
        root.style.fontSize = next + 'px';
        try {
          localStorage.setItem(FONT_SIZE_KEY, String(next));
        } catch (e) {
          /* ignore */
        }
      }
      window.adjustFontSize = adjustFontSize;
      function initFontSize() {
        try {
          const saved = parseInt(localStorage.getItem(FONT_SIZE_KEY) || '17');
          const root = document.querySelector('.rb-content');
          if (root && saved >= 13 && saved <= 24) {
            root.style.fontSize = saved + 'px';
          }
        } catch (e) {
          /* ignore */
        }
      }

      // ============== Toast ==============
      function showToast(msg) {
        const el = document.createElement('div');
        el.className = 'rb-toast';
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
      }

      // ============== 角色管理 UI ==============
      let _pendingAvatar = '';

      window.switchCharTab = function (tab) {
        const isCache = tab === 'cache';
        document.getElementById('tabBtnCache').classList.toggle('active', isCache);
        document.getElementById('tabBtnChat').classList.toggle('active', !isCache);
        document.getElementById('tabCache').classList.toggle('active', isCache);
        document.getElementById('tabChat').classList.toggle('active', !isCache);
        if (isCache) renderCacheCharList();
        else renderChatCharList();
      };

      function renderCacheCharList() {
        const list = document.getElementById('cacheCharList');
        if (!list) return;
        const cached = getAllCachedChars();
        const mvuList = getDialogueBeautifyList();
        const names = Object.keys(cached);
        if (!names.length) {
          list.innerHTML = '<div class="rb-char-empty">缓存库为空，点下方新建</div>';
          return;
        }
        let html = '';
        names.forEach(name => {
          const info = cached[name] || {};
          const av = getAvatarFromCache(name);
          const safeName = escapeHtml(name);
          const avHtml = av
            ? `<img class="rb-char-avatar-small" src="${av}" alt="${safeName}">`
            : `<div class="rb-char-avatar-placeholder-small">👤</div>`;
          const dot = info.color ? `<span class="rb-color-dot" style="background:${info.color}"></span>` : '';
          const inMvu = mvuList.includes(name);
          const writeBtn = inMvu
            ? `<span class="rb-char-action in-chat">已写入</span>`
            : `<button class="rb-char-action" data-action="write-chat" data-arg="${safeName}">写入</button>`;
          html +=
            `<div class="rb-char-item">${avHtml}${dot}` +
            `<span class="rb-char-name">${safeName}</span>` +
            `${writeBtn}` +
            `<button class="rb-char-delete" data-action="del-cache" data-arg="${safeName}" title="从缓存删除">✕</button>` +
            `</div>`;
        });
        list.innerHTML = html;
      }

      function renderChatCharList() {
        const list = document.getElementById('chatCharList');
        if (!list) return;
        const mvuList = getDialogueBeautifyList();
        if (!mvuList.length) {
          list.innerHTML = '<div class="rb-char-empty">当前聊天暂无写入的角色</div>';
          return;
        }
        let html = '';
        mvuList.forEach(name => {
          const isBuiltin = BUILTIN_CHAR_NAMES.includes(name);
          const cfg = CHARACTER_CONFIG[name];
          const av = (cfg && cfg.avatar) || getAvatarFromCache(name);
          const safeName = escapeHtml(name);
          const avHtml = av
            ? `<img class="rb-char-avatar-small" src="${av}" alt="${safeName}">`
            : `<div class="rb-char-avatar-placeholder-small">👤</div>`;
          const dot = !isBuiltin && cfg && cfg.color ? `<span class="rb-color-dot" style="background:${cfg.color}"></span>` : '';
          const trailing = isBuiltin
            ? '<span class="rb-char-builtin">内置</span>'
            : `<button class="rb-char-delete" data-action="del-chat" data-arg="${safeName}" title="从当前聊天移除">✕</button>`;
          html +=
            `<div class="rb-char-item">${avHtml}${dot}` +
            `<span class="rb-char-name">${safeName}</span>` +
            `${trailing}</div>`;
        });
        list.innerHTML = html;
      }

      window.showAddCustomCharForm = function () {
        document.getElementById('customCharForm').classList.add('active');
        document.getElementById('customCharAddBtn').style.display = 'none';
        document.getElementById('customCharNameInput').value = '';
        document.getElementById('customCharColorInput').value = '#a89968';
        const preview = document.getElementById('customCharAvatarPreview');
        preview.style.display = 'none';
        preview.src = '';
        _pendingAvatar = '';
        document.getElementById('customCharUploadBtn').textContent = '📷 上传头像';
      };

      window.cancelAddCustomChar = function () {
        document.getElementById('customCharForm').classList.remove('active');
        document.getElementById('customCharAddBtn').style.display = 'block';
        _pendingAvatar = '';
      };

      window.confirmAddCustomChar = function () {
        const name = document.getElementById('customCharNameInput').value.trim();
        if (!name) return showToast('请输入角色名称');
        if (BUILTIN_CHAR_NAMES.includes(name)) return showToast('不能与内置角色同名');
        const cached = getAllCachedChars();
        if (cached[name]) return showToast('缓存中已存在该角色');
        const color = document.getElementById('customCharColorInput').value || '#a89968';
        if (_pendingAvatar) saveAvatarToCache(name, _pendingAvatar);
        cached[name] = { color };
        saveCachedChars(cached);
        // 注册到内存配置
        CHARACTER_CONFIG[name] = {
          color,
          avatar: _pendingAvatar || '',
          given_name: name,
          aliases: [name],
          _custom: true,
        };
        injectCharCSS(name, color);
        renderCacheCharList();
        cancelAddCustomChar();
        showToast(`已保存「${name}」到缓存库`);
      };

      window.writeCacheCharToChat = function (name) {
        const cached = getAllCachedChars();
        const info = cached[name];
        if (!info) return showToast('缓存中未找到该角色');
        const list = getDialogueBeautifyList();
        if (!list.includes(name)) {
          list.push(name);
          const ok = setDialogueBeautifyList(list);
          if (!ok) return showToast('MVU 写入失败：未连通 Mvu');
        }
        // 注册到当前页内存
        const av = getAvatarFromCache(name);
        CHARACTER_CONFIG[name] = {
          color: info.color || '#a89968',
          avatar: av || '',
          given_name: name,
          aliases: [name],
          _custom: true,
        };
        if (info.color) injectCharCSS(name, info.color);
        renderCacheCharList();
        showToast(`已将「${name}」写入当前聊天`);
      };

      window.deleteCacheChar = function (name) {
        if (BUILTIN_CHAR_NAMES.includes(name)) return;
        const cached = getAllCachedChars();
        delete cached[name];
        saveCachedChars(cached);
        removeAvatarFromCache(name);
        // MVU 同步
        const list = getDialogueBeautifyList();
        if (list.includes(name)) setDialogueBeautifyList(list.filter(n => n !== name));
        delete CHARACTER_CONFIG[name];
        const styleEl = document.getElementById('rb-char-css-' + name);
        if (styleEl) styleEl.remove();
        renderCacheCharList();
        showToast(`已从缓存删除「${name}」`);
      };

      window.removeChatChar = function (name) {
