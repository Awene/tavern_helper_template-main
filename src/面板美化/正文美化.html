<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正文美化 · 修真叙事</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================== 主题变量 ================== */
      :root,
      [data-theme='dark'] {
        --rb-bg: #1a1a2e;
        --rb-paper: linear-gradient(180deg, rgba(45, 40, 60, 0.95) 0%, rgba(30, 25, 45, 0.98) 100%);
        --rb-paper-flat: rgba(45, 40, 60, 0.92);
        --rb-text: #e8d5b7;
        --rb-text-muted: #a89888;
        --rb-text-soft: #c5b696;
        --rb-accent: #a89968;
        --rb-accent-glow: rgba(168, 153, 104, 0.45);
        --rb-border: #a89968;
        --rb-border-soft: rgba(168, 153, 104, 0.4);
        --rb-narration-bg: rgba(255, 255, 255, 0.03);
        --rb-narration-border: rgba(168, 153, 104, 0.18);
        --rb-toolbar-bg: rgba(20, 15, 35, 0.92);
        --rb-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
        --rb-shadow-soft: 0 4px 16px rgba(0, 0, 0, 0.25);
        --rb-bubble-bg: linear-gradient(135deg, rgba(70, 60, 90, 0.65) 0%, rgba(50, 40, 70, 0.85) 100%);
        --rb-bubble-border: rgba(168, 153, 104, 0.55);
      }

      [data-theme='light'] {
        --rb-bg: #f5efe1;
        --rb-paper: linear-gradient(180deg, #fffef9 0%, #f7f1e3 100%);
        --rb-paper-flat: #fffef9;
        --rb-text: #2a2520;
        --rb-text-muted: #8b8275;
        --rb-text-soft: #5a5249;
        --rb-accent: #a07f48;
        --rb-accent-glow: rgba(160, 127, 72, 0.35);
        --rb-border: #c9a96e;
        --rb-border-soft: rgba(201, 169, 110, 0.45);
        --rb-narration-bg: rgba(201, 169, 110, 0.08);
        --rb-narration-border: rgba(201, 169, 110, 0.3);
        --rb-toolbar-bg: rgba(247, 241, 227, 0.95);
        --rb-shadow: 0 6px 24px -8px rgba(42, 37, 32, 0.22);
        --rb-shadow-soft: 0 2px 8px rgba(42, 37, 32, 0.12);
        --rb-bubble-bg: linear-gradient(135deg, #faf5e8 0%, #f0e7d0 100%);
        --rb-bubble-border: rgba(201, 169, 110, 0.6);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
        color: var(--rb-text);
        background: var(--rb-bg);
        min-height: 100vh;
        line-height: 1.9;
        font-size: 16px;
        transition:
          background 0.25s ease,
          color 0.25s ease;
      }

      /* ================== 顶部工具栏 ================== */
      .rb-toolbar {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        background: var(--rb-toolbar-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--rb-border-soft);
      }
      .rb-logo {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.1em;
        letter-spacing: 3px;
        color: var(--rb-accent);
        flex: 1;
      }
      .rb-logo .rb-logo-icon {
        margin-right: 6px;
      }
      .rb-controls {
        display: flex;
        gap: 6px;
      }
      .rb-btn {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text);
        padding: 4px 12px;
        border-radius: 16px;
        cursor: pointer;
        font-size: 13px;
        letter-spacing: 1px;
        transition: all 0.18s ease;
      }
      .rb-btn:hover {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }
      .rb-btn.active {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }

      /* ================== 设置面板 ================== */
      .rb-settings {
        position: fixed;
        top: 56px;
        right: 14px;
        width: min(92vw, 340px);
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        background: var(--rb-paper-flat);
        border: 1px solid var(--rb-border);
        border-radius: 10px;
        padding: 14px;
        box-shadow: var(--rb-shadow);
        display: none;
        z-index: 60;
      }
      .rb-settings.active {
        display: block;
      }
      .rb-settings-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed var(--rb-border-soft);
      }
      .rb-settings-row:last-of-type {
        border-bottom: none;
      }
      .rb-settings-label {
        flex: 1;
        font-size: 13px;
        color: var(--rb-text-soft);
        letter-spacing: 1px;
      }
      .rb-toggle {
        width: 36px;
        height: 20px;
        background: var(--rb-border-soft);
        border-radius: 10px;
        position: relative;
        cursor: pointer;
        transition: background 0.2s ease;
      }
      .rb-toggle.active {
        background: var(--rb-accent);
      }
      .rb-toggle::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: var(--rb-paper-flat);
        border-radius: 50%;
        transition: transform 0.2s ease;
      }
      .rb-toggle.active::after {
        transform: translateX(16px);
      }

      .rb-section-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 13px;
        letter-spacing: 3px;
        color: var(--rb-accent);
        padding: 12px 0 6px;
        border-bottom: 1px solid var(--rb-border-soft);
        margin-bottom: 6px;
      }

      /* —— 角色管理 —— */
      .rb-char-tabs {
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.06);
        border-radius: 8px;
        margin-bottom: 8px;
      }
      [data-theme='dark'] .rb-char-tabs {
        background: rgba(255, 255, 255, 0.04);
      }
      .rb-char-tab {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--rb-text-muted);
        padding: 6px;
        font-size: 12px;
        letter-spacing: 1px;
        border-radius: 6px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.18s ease;
      }
      .rb-char-tab.active {
        background: var(--rb-accent);
        color: var(--rb-bg);
      }
      .rb-char-content {
        display: none;
      }
      .rb-char-content.active {
        display: block;
      }
      .rb-char-hint {
        font-size: 11px;
        color: var(--rb-text-muted);
        margin-bottom: 6px;
        line-height: 1.6;
      }
      .rb-char-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 200px;
        overflow-y: auto;
      }
      .rb-char-empty {
        font-size: 11.5px;
        color: var(--rb-text-muted);
        text-align: center;
        padding: 8px 0;
      }
      .rb-char-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border: 1px solid var(--rb-border-soft);
        border-radius: 6px;
        background: var(--rb-narration-bg);
      }
      .rb-char-avatar-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--rb-border-soft);
      }
      .rb-char-avatar-placeholder-small {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--rb-narration-bg);
        border: 1px dashed var(--rb-border-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--rb-text-muted);
        font-size: 14px;
      }
      .rb-color-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 1px solid var(--rb-border-soft);
      }
      .rb-char-name {
        flex: 1;
        font-size: 13px;
        color: var(--rb-text);
      }
      .rb-char-action {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text-soft);
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        cursor: pointer;
        font-family: inherit;
      }
      .rb-char-action:hover {
        background: var(--rb-accent);
        color: var(--rb-bg);
        border-color: var(--rb-accent);
      }
      .rb-char-action.in-chat {
        background: var(--rb-accent-glow);
        color: var(--rb-text);
        cursor: default;
      }
      .rb-char-builtin {
        font-size: 10.5px;
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(168, 153, 104, 0.2);
        color: var(--rb-accent);
      }
      .rb-char-delete {
        background: transparent;
        border: none;
        color: var(--rb-text-muted);
        font-size: 14px;
        cursor: pointer;
        padding: 0 4px;
      }
      .rb-char-delete:hover {
        color: #c53030;
      }

      .rb-char-form {
        background: var(--rb-narration-bg);
        border: 1px dashed var(--rb-border);
        border-radius: 8px;
        padding: 10px;
        margin-top: 6px;
        display: none;
      }
      .rb-char-form.active {
        display: block;
      }
      .rb-char-form input[type='text'] {
        width: 100%;
        background: var(--rb-paper-flat);
        border: 1px solid var(--rb-border-soft);
        border-radius: 6px;
        padding: 6px 8px;
        color: var(--rb-text);
        font-family: inherit;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .rb-char-form input[type='text']:focus {
        border-color: var(--rb-accent);
        outline: none;
      }
      .rb-form-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      .rb-form-row label {
        font-size: 11.5px;
        color: var(--rb-text-muted);
      }
      .rb-form-row input[type='color'] {
        width: 36px;
        height: 24px;
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        border-radius: 4px;
        cursor: pointer;
      }
      .rb-avatar-preview {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px dashed var(--rb-border-soft);
        display: none;
      }
      .rb-upload-btn {
        background: transparent;
        border: 1px solid var(--rb-border-soft);
        color: var(--rb-text);
        padding: 4px 10px;
        font-size: 11.5px;
        border-radius: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      .rb-upload-btn:hover {
        border-color: var(--rb-accent);
        color: var(--rb-accent);
      }
      .rb-form-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      .rb-form-actions .rb-btn {
        font-size: 11.5px;
        padding: 4px 12px;
      }
      .rb-add-btn {
        width: 100%;
        margin-top: 8px;
        background: transparent;
        border: 1px dashed var(--rb-border);
        color: var(--rb-accent);
        padding: 6px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 1px;
      }
      .rb-add-btn:hover {
        background: var(--rb-narration-bg);
      }

      /* ================== 正文容器 ================== */
      .rb-container {
        max-width: 880px;
        margin: 22px auto;
        padding: 0 14px;
      }
      .rb-content {
        background: var(--rb-paper);
        border: 2px solid var(--rb-border);
        border-radius: 14px;
        padding: 28px 32px;
        box-shadow: var(--rb-shadow);
        position: relative;
        font-size: var(--rb-reading-font, 17px);
      }
      .rb-content::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, var(--rb-accent), transparent);
      }

      /* ================== 面板美化（毛玻璃 + 动效，合并自 5 个独立美化器） ================== */

      /* —— 5 类面板共享的"卡片"样式 —— */
      .action-panel,
      .battle-panel,
      .char-panel,
      .item-panel {
        position: relative;
        margin: 12px 0;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(155deg,
          rgba(20, 16, 32, 0.78) 0%,
          rgba(28, 22, 44, 0.72) 60%,
          rgba(20, 16, 32, 0.82) 100%);
        backdrop-filter: blur(18px) saturate(180%);
        -webkit-backdrop-filter: blur(18px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 14px 44px rgba(0, 0, 0, 0.42),
          0 1px 0 rgba(255, 255, 255, 0.06) inset,
          0 -1px 0 rgba(0, 0, 0, 0.25) inset;
        color: #e8d5b7;
        animation: rb-panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }
      .action-panel:hover,
      .battle-panel:hover,
      .char-panel:hover,
      .item-panel:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.16);
        box-shadow:
          0 22px 56px rgba(0, 0, 0, 0.5),
          0 0 0 1px var(--rb-panel-accent, #a89968) inset,
          0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      @keyframes rb-panel-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* —— 顶部光带（带流光动画） —— */
      .action-panel::before,
      .battle-panel::before,
      .char-panel::before,
      .item-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          var(--rb-panel-accent, #a89968) 30%,
          color-mix(in srgb, var(--rb-panel-accent, #a89968) 70%, white) 50%,
          var(--rb-panel-accent, #a89968) 70%,
          transparent 100%);
        background-size: 250% 100%;
        animation: rb-panel-shimmer 6s ease-in-out infinite;
      }
      @keyframes rb-panel-shimmer {
        0%, 100% { background-position: 0% 0; }
        50% { background-position: 100% 0; }
      }

      /* —— 强调色（每个 panel 类型 + 6 种 action 子类） —— */
      .action-panel { --rb-panel-accent: #fc8181; }
      .action-panel.battle { --rb-panel-accent: #fc8181; }
      .action-panel.craft { --rb-panel-accent: #68d391; }
      .action-panel.cultivation { --rb-panel-accent: #90cdf4; }
      .action-panel.breakthrough { --rb-panel-accent: #f6ad55; }
      .action-panel.insight { --rb-panel-accent: #b794f4; }
      .action-panel.judge { --rb-panel-accent: #63b3ed; }
      .battle-panel { --rb-panel-accent: #fc8181; }
      .char-panel { --rb-panel-accent: #d4af37; }
      .item-panel { --rb-panel-accent: #f6e27a; }

      /* —— 头部 —— */
      .action-panel .panel-header,
      .battle-panel .panel-header,
      .char-panel .panel-header,
      .item-panel .panel-header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 14px;
        cursor: pointer;
        user-select: none;
        background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.02) 50%,
          rgba(255, 255, 255, 0.06) 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        transition: background 0.25s ease;
      }
      .action-panel .panel-header:hover,
      .battle-panel .panel-header:hover,
      .char-panel .panel-header:hover,
      .item-panel .panel-header:hover {
        background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.08) 0%,
          rgba(255, 255, 255, 0.04) 50%,
          rgba(255, 255, 255, 0.10) 100%);
      }
      .action-panel .panel-icon,
      .battle-panel .panel-icon,
      .char-panel .panel-icon,
      .item-panel .panel-icon {
        font-size: 1.05em;
        color: var(--rb-panel-accent);
        filter: drop-shadow(0 0 10px color-mix(in srgb, var(--rb-panel-accent) 60%, transparent));
      }
      .action-panel .panel-title,
      .battle-panel .panel-title,
      .char-panel .panel-title,
      .item-panel .panel-title {
        flex: 1;
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 0.98em;
        font-weight: 700;
        letter-spacing: 1.2px;
        color: var(--rb-panel-accent);
        text-shadow: 0 0 14px color-mix(in srgb, var(--rb-panel-accent) 35%, transparent);
        word-break: break-word;
      }
      .action-panel .panel-toggle,
      .battle-panel .panel-toggle,
      .char-panel .panel-toggle,
      .item-panel .panel-toggle {
        color: var(--rb-panel-accent);
        opacity: 0.7;
        transition: transform 0.3s ease, opacity 0.2s ease;
      }
      .action-panel .panel-header:hover .panel-toggle,
      .battle-panel .panel-header:hover .panel-toggle,
      .char-panel .panel-header:hover .panel-toggle,
      .item-panel .panel-header:hover .panel-toggle { opacity: 1; }
      .action-panel .panel-header.collapsed .panel-toggle,
      .battle-panel .panel-header.collapsed .panel-toggle,
      .char-panel .panel-header.collapsed .panel-toggle,
      .item-panel .panel-header.collapsed .panel-toggle { transform: rotate(-90deg); }

      /* —— 内容区 —— */
      .action-panel .panel-content,
      .battle-panel .panel-content,
      .char-panel .panel-content,
      .item-panel .panel-content {
        padding: 10px 13px;
        transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
        overflow: hidden;
        color: #e8d5b7; /* 显式设色,避免在 light 主题下被父级覆盖成黑色 */
      }
      .action-panel .panel-content.collapsed,
      .battle-panel .panel-content.collapsed,
      .char-panel .panel-content.collapsed,
      .item-panel .panel-content.collapsed { max-height: 0; padding: 0 16px; opacity: 0; }

      /* —— 数据行 —— */
      .action-panel .data-row,
      .battle-panel .data-row,
      .item-panel .data-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px 8px;
        padding: 5px 10px;
        margin-bottom: 4px;
        font-size: 0.86em;
        line-height: 1.5;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-left: 3px solid color-mix(in srgb, var(--rb-panel-accent) 60%, transparent);
        color: #e8d5b7;
        transition: background 0.18s ease, border-left-color 0.18s ease, transform 0.18s ease;
      }
      .action-panel .data-row:last-child,
      .battle-panel .data-row:last-child,
      .item-panel .data-row:last-child { margin-bottom: 0; }
      .action-panel .data-row:hover,
      .battle-panel .data-row:hover,
      .item-panel .data-row:hover {
        background: rgba(255, 255, 255, 0.05);
        border-left-color: var(--rb-panel-accent);
        transform: translateX(2px);
      }
      /* char_info 用紧凑样式(无背景) */
      .char-panel .data-row {
        padding: 2px 0;
        font-size: 0.86em;
        line-height: 1.5;
        color: #e8d5b7;
      }

      /* —— 标签:统一 pill 设计 —— */
      .action-panel .tag,
      .battle-panel .tag,
      .item-panel .tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 1px 9px;
        border-radius: 999px;
        font-size: 0.8em;
        font-weight: 600;
        white-space: normal;
        word-break: break-word;
        max-width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #e8d5b7;
        vertical-align: middle;
        transition: transform 0.15s ease, box-shadow 0.18s ease;
      }
      .action-panel .tag:hover,
      .battle-panel .tag:hover,
      .item-panel .tag:hover { transform: translateY(-1px); }
      .char-panel .tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        font-size: 0.78em;
        font-weight: 600;
        margin: 0 2px;
        background: rgba(168, 153, 104, 0.18);
        color: #d4af37;
        border: 1px solid rgba(168, 153, 104, 0.4);
        vertical-align: middle;
      }

      /* —— field-label 强调 —— */
      .action-panel .field-label,
      .battle-panel .field-label,
      .char-panel .field-label,
      .item-panel .field-label {
        color: var(--rb-panel-accent);
        font-weight: 700;
        margin-right: 4px;
        letter-spacing: 0.3px;
      }

      /* —— 品质标签:渐变 + 发光 —— */
      .tag-quality-凡 { background: linear-gradient(135deg, #4a5568, #2d3748) !important; color: #e2e8f0 !important; border-color: rgba(255,255,255,0.1) !important; }
      .tag-quality-黄 { background: linear-gradient(135deg, #d69e2e, #b7791f) !important; color: #fff !important; border-color: rgba(255,255,255,0.18) !important; box-shadow: 0 0 14px rgba(214, 158, 46, 0.4); }
      .tag-quality-玄 { background: linear-gradient(135deg, #4299e1, #2c5282) !important; color: #fff !important; border-color: rgba(255,255,255,0.18) !important; box-shadow: 0 0 14px rgba(49, 130, 206, 0.45); }
      .tag-quality-地 { background: linear-gradient(135deg, #9f7aea, #553c9a) !important; color: #fff !important; border-color: rgba(255,255,255,0.2) !important; box-shadow: 0 0 16px rgba(128, 90, 213, 0.55); }
      .tag-quality-天 { background: linear-gradient(135deg, #f56565, #9b2c2c) !important; color: #fff !important; border-color: rgba(255,255,255,0.25) !important; box-shadow: 0 0 18px rgba(245, 101, 101, 0.7); animation: rb-tag-pulse 2.6s ease-in-out infinite; }
      @keyframes rb-tag-pulse {
        0%, 100% { box-shadow: 0 0 18px rgba(245, 101, 101, 0.7); }
        50% { box-shadow: 0 0 28px rgba(245, 101, 101, 1); }
      }

      /* —— 结果 —— */
      .tag-success { background: linear-gradient(135deg, #38a169, #276749) !important; color: #fff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-fail { background: linear-gradient(135deg, #e53e3e, #9b2c2c) !important; color: #fff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-critical-success { background: linear-gradient(135deg, #f6e05e, #d69e2e) !important; color: #1a202c !important; font-weight: 800 !important; border-color: rgba(255,255,255,0.3) !important; box-shadow: 0 0 18px rgba(246, 224, 94, 0.7); animation: rb-tag-pulse-gold 2.4s ease-in-out infinite; }
      @keyframes rb-tag-pulse-gold {
        0%, 100% { box-shadow: 0 0 18px rgba(246, 224, 94, 0.7); }
        50% { box-shadow: 0 0 32px rgba(246, 224, 94, 1); }
      }
      .tag-critical-fail { background: linear-gradient(135deg, #b794f4, #553c9a) !important; color: #fff !important; border-color: rgba(255,255,255,0.2) !important; }

      /* —— 通用类型/属性 —— */
      .tag-type { background: linear-gradient(135deg, #805ad5, #44337a) !important; color: #faf5ff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-attr { background: linear-gradient(135deg, #4299e1, #2c5282) !important; color: #fff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-effect { background: linear-gradient(135deg, #9f7aea, #44337a) !important; color: #faf5ff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-label { background: linear-gradient(135deg, #4a5568, #2d3748) !important; color: #e2e8f0 !important; border-color: rgba(255,255,255,0.1) !important; }
      .tag-realm { background: linear-gradient(135deg, #b794f4, #553c9a) !important; color: #fff !important; border-color: rgba(255,255,255,0.18) !important; }
      .tag-element { background: linear-gradient(135deg, #f6ad55, #c05621) !important; color: #fff !important; border-color: rgba(255,255,255,0.18) !important; }
      .tag-status { background: linear-gradient(135deg, #4fd1c5, #285e61) !important; color: #fff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-unit-type { background: linear-gradient(135deg, #4299e1, #2a4365) !important; color: #fff !important; border-color: rgba(255,255,255,0.15) !important; }
      .tag-formation { background: linear-gradient(135deg, #d69e2e, #744210) !important; color: #fff !important; border-color: rgba(255,255,255,0.18) !important; }

      /* —— 战斗专用辅助 —— */
      .tree-indent { display: inline-block; color: #a0aec0; margin-right: 4px; font-family: monospace; opacity: 0.85; }
      .unit-name { color: #fbd38d; font-weight: 700; }
      .stat-label { color: #90cdf4; font-weight: 600; }
      .sequence-arrow { color: #68d391; margin: 0 4px; font-weight: 700; }
      .stat-value { color: #fbd38d; font-weight: 700; }
      .effect-text { color: #cbd5e0; font-style: italic; }
      .description-text { color: #cbd5e0; line-height: 1.6; }
      .description-box { background: rgba(212, 175, 55, 0.06); border-left: 3px solid #d4af37; padding: 10px 12px; margin-top: 8px; border-radius: 6px; color: #cbd5e0; line-height: 1.6; }

      /* —— 时光流转(time-paper):报纸风版面 —— */
      .time-paper {
        margin: 14px 0;
        padding: 16px 18px 14px;
        border: 1.5px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 38%, transparent);
        border-radius: 4px;
        background:
          repeating-linear-gradient(90deg,
            color-mix(in srgb, var(--rb-panel-bg, #1f1810) 95%, var(--rb-panel-accent, #a07f48) 5%) 0,
            color-mix(in srgb, var(--rb-panel-bg, #1f1810) 95%, var(--rb-panel-accent, #a07f48) 5%) 2px,
            color-mix(in srgb, var(--rb-panel-bg, #1f1810) 92%, var(--rb-panel-accent, #a07f48) 8%) 2px,
            color-mix(in srgb, var(--rb-panel-bg, #1f1810) 92%, var(--rb-panel-accent, #a07f48) 8%) 4px);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.22), 0 0 0 1px rgba(0, 0, 0, 0.18) inset;
        font-family: 'Noto Serif SC', 'Songti SC', serif;
        position: relative;
      }
      .time-paper::before,
      .time-paper::after {
        content: '';
        position: absolute;
        left: 6px;
        right: 6px;
        height: 0;
        border-top: 1px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 30%, transparent);
      }
      .time-paper::before { top: 4px; }
      .time-paper::after { bottom: 4px; }

      .time-paper .tp-masthead {
        text-align: center;
        padding: 6px 0 14px;
        border-bottom: 3px double color-mix(in srgb, var(--rb-panel-accent, #a07f48) 50%, transparent);
        margin-bottom: 14px;
      }
      .time-paper .tp-paper-title {
        font-family: 'Cinzel', 'Noto Serif SC', 'Songti SC', serif;
        font-size: 1.7em;
        font-weight: 900;
        letter-spacing: 14px;
        text-indent: 14px;  /* 抵消 letter-spacing 让标题视觉居中 */
        color: var(--rb-panel-accent, #a07f48);
        text-shadow: 0 0 14px color-mix(in srgb, var(--rb-panel-accent, #a07f48) 32%, transparent);
        line-height: 1.2;
      }
      .time-paper .tp-paper-rule {
        margin: 6px auto 4px;
        width: 88%;
        height: 0;
        border-top: 1px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 50%, transparent);
        position: relative;
      }
      .time-paper .tp-paper-rule::after {
        content: '◆';
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: var(--rb-panel-accent, #a07f48);
        background: color-mix(in srgb, var(--rb-panel-bg, #1f1810) 92%, var(--rb-panel-accent, #a07f48) 8%);
        padding: 0 6px;
      }
      .time-paper .tp-paper-sub {
        font-size: 0.92em;
        color: #cbb988;
        letter-spacing: 4px;
        margin-top: 4px;
      }
      .time-paper .tp-paper-sub i { margin-right: 6px; opacity: 0.85; }

      .time-paper .tp-section {
        margin-bottom: 14px;
        padding: 0 4px;
      }
      .time-paper .tp-section:last-child { margin-bottom: 0; }
      .time-paper .tp-section-title {
        margin: 0 0 8px;
        padding: 0 0 4px;
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1em;
        font-weight: 700;
        letter-spacing: 4px;
        color: var(--rb-panel-accent, #a07f48);
        border-bottom: 1px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 28%, transparent);
        position: relative;
      }
      .time-paper .tp-section-title i {
        margin-right: 8px;
        font-size: 0.92em;
      }
      .time-paper .tp-section-title::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 28px;
        height: 2px;
        background: var(--rb-panel-accent, #a07f48);
      }

      /* 人物动向: 报纸双栏 */
      .time-paper .tp-people-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 720px) {
        .time-paper .tp-people-grid { grid-template-columns: 1fr 1fr; column-gap: 22px; }
      }
      .time-paper .tp-person {
        padding: 8px 12px;
        background: color-mix(in srgb, var(--rb-panel-bg, #1f1810) 70%, var(--rb-panel-accent, #a07f48) 6%);
        border: 1px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 18%, transparent);
        border-left: 3px solid var(--rb-panel-accent, #a07f48);
        border-radius: 2px;
        position: relative;
      }
      .time-paper .tp-person-head {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
        padding-bottom: 4px;
        margin-bottom: 5px;
        border-bottom: 1px dotted color-mix(in srgb, var(--rb-panel-accent, #a07f48) 22%, transparent);
      }
      .time-paper .tp-person-name {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.1em;
        font-weight: 700;
        color: var(--rb-panel-accent, #a07f48);
        letter-spacing: 1px;
      }
      .time-paper .tp-person-meta {
        font-size: 0.78em;
        color: #a89888;
        opacity: 0.9;
      }
      .time-paper .tp-person-events {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .time-paper .tp-person-line {
        margin: 2px 0;
        padding: 1px 0 1px 14px;
        font-size: 0.86em;
        line-height: 1.62;
        color: #d4c8b0;
        position: relative;
      }
      .time-paper .tp-person-line::before {
        content: '·';
        position: absolute;
        left: 4px;
        top: 0;
        color: var(--rb-panel-accent, #a07f48);
        font-weight: 700;
      }
      .time-paper .tp-line-key {
        font-weight: 700;
        color: var(--rb-panel-accent, #a07f48);
      }
      .time-paper .tp-line-val { color: #e0d4b8; }
      .time-paper .tp-line-text { color: #d4c8b0; }

      /* 文明/世界/传闻: 单栏新闻 */
      .time-paper .tp-news-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .time-paper .tp-news-item {
        padding: 5px 8px 5px 14px;
        margin-bottom: 4px;
        border-left: 2px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 32%, transparent);
        background: color-mix(in srgb, var(--rb-panel-bg, #1f1810) 78%, var(--rb-panel-accent, #a07f48) 4%);
        font-size: 0.88em;
        line-height: 1.6;
        color: #d4c8b0;
        border-radius: 0 2px 2px 0;
      }
      .time-paper .tp-news-item:last-child { margin-bottom: 0; }
      .time-paper .tp-news-tag {
        display: inline-block;
        padding: 1px 7px;
        margin-right: 6px;
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 0.85em;
        font-weight: 700;
        color: var(--rb-panel-bg, #1f1810);
        background: var(--rb-panel-accent, #a07f48);
        border-radius: 2px;
        letter-spacing: 0.5px;
      }
      .time-paper .tp-news-text { color: #e0d4b8; }
      .time-paper .tp-news-extra {
        margin-left: 4px;
        font-size: 0.92em;
        color: #a89888;
        opacity: 0.92;
      }

      /* 日间模式覆盖 */
      [data-theme='light'] .time-paper {
        background:
          repeating-linear-gradient(90deg,
            #f9f1e0 0,
            #f9f1e0 2px,
            #f4ead4 2px,
            #f4ead4 4px);
        border-color: rgba(160, 127, 72, 0.55);
        box-shadow: 0 4px 18px rgba(89, 65, 33, 0.14), 0 0 0 1px rgba(89, 65, 33, 0.08) inset;
      }
      [data-theme='light'] .time-paper::before,
      [data-theme='light'] .time-paper::after {
        border-top-color: rgba(160, 127, 72, 0.5);
      }
      [data-theme='light'] .time-paper .tp-paper-title {
        color: #6e4f1d;
        text-shadow: 0 0 8px rgba(212, 175, 55, 0.18);
      }
      [data-theme='light'] .time-paper .tp-paper-rule { border-top-color: rgba(160, 127, 72, 0.55); }
      [data-theme='light'] .time-paper .tp-paper-rule::after { background: #f9f1e0; color: #8a6a36; }
      [data-theme='light'] .time-paper .tp-paper-sub { color: #6a5a36; }
      [data-theme='light'] .time-paper .tp-section-title { color: #6e4f1d; border-bottom-color: rgba(160, 127, 72, 0.4); }
      [data-theme='light'] .time-paper .tp-section-title::after { background: #a07f48; }
      [data-theme='light'] .time-paper .tp-person {
        background: rgba(255, 252, 244, 0.55);
        border-color: rgba(160, 127, 72, 0.32);
        border-left-color: #a07f48;
      }
      [data-theme='light'] .time-paper .tp-person-name { color: #6e4f1d; }
      [data-theme='light'] .time-paper .tp-person-meta { color: #5a4a36; }
      [data-theme='light'] .time-paper .tp-person-line { color: #4a3d2c; }
      [data-theme='light'] .time-paper .tp-person-line::before { color: #a07f48; }
      [data-theme='light'] .time-paper .tp-line-key { color: #6e4f1d; }
      [data-theme='light'] .time-paper .tp-line-val { color: #2a2018; }
      [data-theme='light'] .time-paper .tp-news-item {
        background: rgba(255, 252, 244, 0.45);
        border-left-color: rgba(160, 127, 72, 0.45);
        color: #4a3d2c;
      }
      [data-theme='light'] .time-paper .tp-news-tag { color: #fff; background: #a07f48; }
      [data-theme='light'] .time-paper .tp-news-text { color: #2a2018; }
      [data-theme='light'] .time-paper .tp-news-extra { color: #5a4a36; }

      /* —— 物品名片(item-card):品质边框 + 类型图标 + 数值/资源条/技能/效果 —— */
      .item-card {
        position: relative;
        margin: 8px 0;
        padding: 0;
        border: 1px solid color-mix(in srgb, var(--rb-panel-accent, #a07f48) 20%, transparent);
        border-radius: 10px;
        background: color-mix(in srgb, var(--rb-panel-bg, #1f1810) 92%, var(--rb-panel-accent, #a07f48) 8%);
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
      }
      /* 按品质给左侧色带 */
      .item-card.ic-q-bg-凡 { border-left: 4px solid #b8b0a3; }
      .item-card.ic-q-bg-黄 { border-left: 4px solid #d4af37; box-shadow: 0 0 14px rgba(212, 175, 55, 0.10); }
      .item-card.ic-q-bg-玄 { border-left: 4px solid #6b6f7a; }
      .item-card.ic-q-bg-地 { border-left: 4px solid #a06439; }
      .item-card.ic-q-bg-天 {
        border-left: 4px solid #e6c34a;
        box-shadow: 0 0 18px rgba(230, 195, 74, 0.18), 0 2px 12px rgba(0, 0, 0, 0.2);
      }

      .item-card .ic-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        background: linear-gradient(135deg,
          color-mix(in srgb, var(--rb-panel-accent, #a07f48) 14%, transparent),
          transparent);
        border-bottom: 1px dashed color-mix(in srgb, var(--rb-panel-accent, #a07f48) 22%, transparent);
      }
      .item-card .ic-icon {
        flex: 0 0 38px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg,
          color-mix(in srgb, var(--rb-panel-accent, #a07f48) 60%, #1a0f00),
          color-mix(in srgb, var(--rb-panel-accent, #a07f48) 26%, #0a0500));
        border: 1.5px solid var(--rb-panel-accent, #a07f48);
        color: #fff;
        font-size: 15px;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        box-shadow: 0 0 10px color-mix(in srgb, var(--rb-panel-accent, #a07f48) 35%, transparent);
      }
      .item-card .ic-headinfo {
        flex: 1;
        min-width: 0;
      }
      .item-card .ic-name {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.05em;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: var(--rb-panel-accent, #a07f48);
        text-shadow: 0 0 8px color-mix(in srgb, var(--rb-panel-accent, #a07f48) 22%, transparent);
        line-height: 1.3;
      }
      .item-card .ic-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 3px;
      }

      .item-card .ic-pill {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 1px 7px;
        font-size: 0.74em;
        line-height: 1.5;
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.05);
        color: #cbd5e0;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .item-card .ic-pill.ic-quality.ic-q-凡 { background: linear-gradient(135deg, #6b6356, #4a443a); color: #e0d8c8; }
      .item-card .ic-pill.ic-quality.ic-q-黄 { background: linear-gradient(135deg, #d4af37, #8b6914); color: #fff; border-color: #b58938; }
      .item-card .ic-pill.ic-quality.ic-q-玄 { background: linear-gradient(135deg, #6b6f7a, #3d4046); color: #fff; }
      .item-card .ic-pill.ic-quality.ic-q-地 { background: linear-gradient(135deg, #a06439, #6b3c1a); color: #fff; }
      .item-card .ic-pill.ic-quality.ic-q-天 {
        background: linear-gradient(135deg, #f4d472, #b58938);
        color: #2a1f00;
        border-color: #8b6914;
        box-shadow: 0 0 8px rgba(244, 212, 114, 0.35);
      }
      .item-card .ic-pill.ic-type {
        background: rgba(125, 100, 220, 0.18);
        color: #b8a8ff;
        border-color: rgba(125, 100, 220, 0.35);
      }
      .item-card .ic-pill.ic-realm {
        background: rgba(94, 156, 100, 0.16);
        color: #a8d4ad;
        border-color: rgba(94, 156, 100, 0.32);
      }
      .item-card .ic-pill.ic-qty {
        background: rgba(214, 158, 46, 0.14);
        color: #d6b06a;
      }
      .item-card .ic-element {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--el, #888);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }

      /* 数值 chip */
      .item-card .ic-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 6px 12px 2px;
      }
      .item-card .ic-stat {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 1px 9px;
        border-radius: 4px;
        font-size: 0.78em;
        line-height: 1.55;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #d8c8a8;
      }
      .item-card .ic-stat b {
        font-weight: 700;
        color: #fff;
      }
      .item-card .ic-stat.ic-stat-攻击力 {
        background: linear-gradient(135deg, rgba(229, 62, 62, 0.16), rgba(197, 48, 48, 0.08));
        border-color: rgba(229, 62, 62, 0.35);
        color: #ff8a8a;
      }
      .item-card .ic-stat.ic-stat-防御力 {
        background: linear-gradient(135deg, rgba(66, 153, 225, 0.16), rgba(44, 82, 130, 0.08));
        border-color: rgba(66, 153, 225, 0.35);
        color: #8ec3f0;
      }
      .item-card .ic-stat.ic-stat-命中,
      .item-card .ic-stat.ic-stat-闪避 {
        background: rgba(214, 158, 46, 0.12);
        border-color: rgba(214, 158, 46, 0.30);
        color: #e6c478;
      }
      .item-card .ic-stat.ic-stat-修行速度,
      .item-card .ic-stat.ic-stat-恢复 {
        background: rgba(159, 122, 234, 0.14);
        border-color: rgba(159, 122, 234, 0.32);
        color: #b8a4f0;
      }
      .item-card .ic-stat.ic-stat-灵气消耗,
      .item-card .ic-stat.ic-stat-灵气受击,
      .item-card .ic-stat.ic-stat-灵气容量 {
        background: rgba(99, 179, 237, 0.12);
        border-color: rgba(99, 179, 237, 0.30);
        color: #93c5e9;
      }
      .item-card .ic-stat.ic-stat-加成,
      .item-card .ic-stat.ic-stat-减免%,
      .item-card .ic-stat.ic-stat-穿透% {
        background: rgba(72, 187, 120, 0.12);
        border-color: rgba(72, 187, 120, 0.30);
        color: #93dca5;
      }

      /* 资源池 bars (傀儡/灵兽) */
      .item-card .ic-resources {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 4px 12px;
      }
      .item-card .ic-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.82em;
      }
      .item-card .ic-bar-label {
        flex: 0 0 auto;
        min-width: 36px;
        color: #a89888;
        font-weight: 600;
        white-space: nowrap;
        letter-spacing: 0.5px;
      }
      .item-card .ic-bar-track {
        flex: 1;
        height: 6px;
        background: rgba(0, 0, 0, 0.32);
        border-radius: 3px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .item-card .ic-bar-fill {
        display: block;
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s ease;
      }
      .item-card .ic-bar-fill.hp {
        background: linear-gradient(90deg, #8a2828, #d05858);
        box-shadow: 0 0 6px rgba(208, 88, 88, 0.4);
      }
      .item-card .ic-bar-fill.mp {
        background: linear-gradient(90deg, #3d5a8a, #6f9bd0);
        box-shadow: 0 0 6px rgba(111, 155, 208, 0.4);
      }
      .item-card .ic-bar-num {
        flex: 0 0 auto;
        font-size: 0.92em;
        color: #cbd5e0;
        font-variant-numeric: tabular-nums;
      }
      .item-card .ic-bar-solo {
        gap: 6px;
      }
      .item-card .ic-bar-num-solo {
        font-weight: 700;
        color: #d6b06a;
      }

      /* 描述性标签 */
      .item-card .ic-tagrow {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        padding: 4px 12px 2px;
      }
      .item-card .ic-tag-desc {
        padding: 1px 7px;
        font-size: 0.74em;
        border-radius: 8px;
        background: rgba(168, 153, 104, 0.12);
        border: 1px dashed rgba(168, 153, 104, 0.32);
        color: #a89888;
      }

      /* 效果块 */
      .item-card .ic-effects {
        margin: 4px 12px;
        padding: 5px 9px;
        background: rgba(168, 153, 104, 0.06);
        border-left: 2px solid var(--rb-panel-accent, #a07f48);
        border-radius: 0 4px 4px 0;
        font-size: 0.82em;
        line-height: 1.55;
      }
      .item-card .ic-effect-row {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .item-card .ic-effect-name {
        color: var(--rb-panel-accent, #a07f48);
        font-weight: 700;
        flex-shrink: 0;
      }
      .item-card .ic-effect-name::after { content: ":"; }
      .item-card .ic-effect-val {
        color: #d8c8a8;
        flex: 1 1 auto;
      }

      /* 技能列表 (傀儡/灵兽) */
      .item-card .ic-skills {
        margin: 6px 12px 2px;
        padding: 6px 9px;
        background: rgba(160, 127, 72, 0.08);
        border-left: 2px solid var(--rb-panel-accent, #a07f48);
        border-radius: 0 4px 4px 0;
      }
      .item-card .ic-skills-head {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 0.78em;
        letter-spacing: 1.5px;
        color: var(--rb-panel-accent, #a07f48);
        margin-bottom: 4px;
      }
      .item-card .ic-skill {
        margin-bottom: 4px;
      }
      .item-card .ic-skill:last-child { margin-bottom: 0; }
      .item-card .ic-skill-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 5px;
        font-size: 0.85em;
      }
      .item-card .ic-skill-name {
        font-weight: 700;
        color: #d8c8a8;
      }
      .item-card .ic-skill-cost {
        font-size: 0.85em;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(99, 179, 237, 0.12);
        color: #93c5e9;
      }

      /* 描述 + 底栏 */
      .item-card .ic-desc {
        padding: 5px 12px;
        font-size: 0.82em;
        line-height: 1.6;
        color: #a89888;
        font-style: italic;
        border-top: 1px dashed rgba(168, 153, 104, 0.12);
      }
      .item-card .ic-foot {
        padding: 4px 12px 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 0.74em;
        color: #8a8070;
      }
      .item-card .ic-foot-item {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }

      /* 日间模式覆盖 */
      [data-theme='light'] .item-card {
        background: linear-gradient(135deg, #f9f3e6, #f0e6d2);
        border-color: rgba(160, 127, 72, 0.35);
        box-shadow: 0 2px 12px rgba(89, 65, 33, 0.10);
      }
      [data-theme='light'] .item-card .ic-head {
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.10), transparent);
        border-bottom-color: rgba(160, 127, 72, 0.18);
      }
      [data-theme='light'] .item-card .ic-name {
        color: #6e4f1d;
        text-shadow: 0 0 4px rgba(212, 175, 55, 0.18);
      }
      [data-theme='light'] .item-card .ic-pill {
        background: rgba(160, 127, 72, 0.08);
        color: #5a4a36;
        border-color: rgba(160, 127, 72, 0.22);
      }
      [data-theme='light'] .item-card .ic-stat {
        background: rgba(160, 127, 72, 0.06);
        color: #4a3d2c;
      }
      [data-theme='light'] .item-card .ic-stat b { color: #2a2018; }
      [data-theme='light'] .item-card .ic-bar-num { color: #5a4a36; }
      [data-theme='light'] .item-card .ic-bar-label { color: #5a4a36; }
      [data-theme='light'] .item-card .ic-effect-val,
      [data-theme='light'] .item-card .ic-skill-name,
      [data-theme='light'] .item-card .ic-tag-desc {
        color: #4a3d2c;
      }
      [data-theme='light'] .item-card .ic-desc {
        color: #6a5a46;
      }

      /* —— 角色卡(名片)布局:头像 + 姓名 + tag + 横向 tab —— */
      .char-panel .char-card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 10px;
        margin-bottom: 8px;
        border-bottom: 1px dashed rgba(168, 153, 104, 0.22);
      }
      .char-panel .char-card-avatar {
        flex-shrink: 0;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: linear-gradient(135deg,
          color-mix(in srgb, var(--rb-panel-accent) 60%, #2a1f10),
          color-mix(in srgb, var(--rb-panel-accent) 28%, #0f0a05));
        border: 2px solid var(--rb-panel-accent);
        box-shadow: 0 0 16px color-mix(in srgb, var(--rb-panel-accent) 35%, transparent),
                    0 0 0 1px rgba(0, 0, 0, 0.2) inset;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.5em;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
      }
      .char-panel .char-card-meta { flex: 1; min-width: 0; }
      .char-panel .char-card-name {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.18em;
        font-weight: 700;
        letter-spacing: 0.8px;
        color: var(--rb-panel-accent);
        text-shadow: 0 0 12px color-mix(in srgb, var(--rb-panel-accent) 28%, transparent);
        line-height: 1.25;
      }
      .char-panel .char-card-sub {
        font-size: 0.82em;
        margin-top: 2px;
        color: #cbd5e0;
        opacity: 0.85;
      }
      .char-panel .char-card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 5px;
      }

      /* —— 横向 tab 条 —— */
      .char-panel .char-card-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        padding: 3px;
        margin: 0 0 9px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .char-panel .char-card-tab {
        flex: 1 1 auto;
        min-width: 48px;
        padding: 5px 10px;
        border-radius: 6px;
        background: transparent;
        border: none;
        color: var(--rb-text-soft, #a89888);
        font-family: inherit;
        font-size: 0.85em;
        font-weight: 600;
        letter-spacing: 0.4px;
        cursor: pointer;
        transition: background 0.18s ease, color 0.18s ease, transform 0.15s ease;
      }
      .char-panel .char-card-tab:hover {
        color: #e8d5b7;
        background: rgba(255, 255, 255, 0.05);
      }
      .char-panel .char-card-tab.active {
        background: var(--rb-panel-accent);
        color: #1a0f00;
        font-weight: 700;
        box-shadow: 0 2px 10px color-mix(in srgb, var(--rb-panel-accent) 38%, transparent);
      }

      .char-panel .char-card-tab-content { display: none; }
      .char-panel .char-card-tab-content.active {
        display: block;
        animation: rb-tab-fade 0.25s ease-out;
      }
      @keyframes rb-tab-fade {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* —— tab 内的内容(scalar / multiline / section) —— */
      .char-panel .char-card-section {
        margin-bottom: 7px;
        padding-bottom: 4px;
        border-bottom: 1px dashed rgba(168, 153, 104, 0.16);
      }
      .char-panel .char-card-section:last-child {
        margin-bottom: 0;
        padding-bottom: 0;
        border-bottom: none;
      }
      .char-panel .char-card-section-title {
        color: var(--rb-panel-accent);
        font-weight: 700;
        font-size: 0.88em;
        margin-bottom: 3px;
        padding-bottom: 2px;
        border-bottom: 1px solid color-mix(in srgb, var(--rb-panel-accent) 28%, transparent);
        letter-spacing: 0.3px;
      }
      /* fields 用 grid 自适应多列,信息密度更高 */
      .char-panel .char-card-fields {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0px 12px;
      }
      /* 功法/物品/装备等"每条都是长描述"的 section,改单列(避免长串被挤裂行) */
      .char-panel .char-card-section--narrative .char-card-fields {
        grid-template-columns: 1fr;
      }
      .char-panel .char-card-section--narrative .char-card-field {
        padding: 3px 0;
        border-bottom: 1px dashed rgba(168, 153, 104, 0.10);
      }
      .char-panel .char-card-section--narrative .char-card-field:last-child {
        border-bottom: none;
      }
      .char-panel .char-card-section--narrative .char-card-field-key {
        min-width: 5em;
      }

      /* —— 身份标签:把身份字符串拆成 pill 列表 —— */
      .char-panel .char-card-section--identity {
        margin-top: 6px;
      }
      .char-panel .char-card-section--identity .char-card-section-title {
        margin-bottom: 6px;
      }
      .char-panel .char-card-id-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .char-panel .char-id-tag {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        font-size: 0.82em;
        line-height: 1.55;
        border-radius: 11px;
        background: color-mix(in srgb, var(--rb-panel-accent) 16%, transparent);
        border: 1px solid color-mix(in srgb, var(--rb-panel-accent) 40%, transparent);
        color: color-mix(in srgb, var(--rb-panel-accent) 90%, white 5%);
        letter-spacing: 0.4px;
        white-space: nowrap;
      }
      [data-theme='light'] .char-panel .char-id-tag {
        background: color-mix(in srgb, var(--rb-panel-accent) 12%, white 80%);
        border-color: color-mix(in srgb, var(--rb-panel-accent) 50%, transparent);
        color: color-mix(in srgb, var(--rb-panel-accent) 90%, black 10%);
      }

      /* —— 资源池:气血/灵气/遁速 进度条 —— */
      .char-panel .char-card-section--resource .char-card-section-title {
        margin-bottom: 5px;
      }
      .char-panel .char-card-stat {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 0;
        font-size: 0.85em;
      }
      .char-panel .char-card-stat-label {
        flex-shrink: 0;
        min-width: 2.5em;
        font-weight: 700;
        color: color-mix(in srgb, var(--rb-panel-accent) 80%, white);
      }
      .char-panel .char-card-stat-bar {
        flex: 1;
        height: 8px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        position: relative;
      }
      .char-panel .char-card-stat-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.4s ease;
      }
      .char-panel .stat-hp .char-card-stat-bar-fill {
        background: linear-gradient(90deg, #f56565 0%, #c53030 100%);
        box-shadow: 0 0 8px rgba(245, 101, 101, 0.5);
      }
      .char-panel .stat-mp .char-card-stat-bar-fill {
        background: linear-gradient(90deg, #4299e1 0%, #2c5282 100%);
        box-shadow: 0 0 8px rgba(66, 153, 225, 0.5);
      }
      .char-panel .stat-other .char-card-stat-bar-fill {
        background: linear-gradient(90deg, #68d391 0%, #2f855a 100%);
      }
      .char-panel .char-card-stat-value {
        flex-shrink: 0;
        min-width: 5em;
        text-align: right;
        font-family: 'Cinzel', monospace;
        color: #e8d5b7;
        font-size: 0.9em;
      }
      .char-panel .char-card-stat--simple {
        gap: 8px;
      }
      .char-panel .char-card-stat--simple .char-card-stat-value {
        text-align: left;
      }

      /* —— 技艺:仅显示非零值 pill —— */
      .char-panel .char-card-section--skills .char-card-skill-group {
        display: flex;
        gap: 8px;
        align-items: baseline;
        padding: 3px 0;
        font-size: 0.85em;
        flex-wrap: wrap;
      }
      .char-panel .char-card-skill-group-title {
        flex-shrink: 0;
        font-weight: 700;
        color: color-mix(in srgb, var(--rb-panel-accent) 78%, white);
        min-width: 4em;
      }
      .char-panel .char-card-skill-empty {
        color: #a0aec0;
        opacity: 0.6;
        font-size: 0.85em;
      }
      .char-panel .char-card-skill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .char-panel .char-card-skill-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 1px 9px;
        border-radius: 999px;
        background: linear-gradient(135deg, color-mix(in srgb, var(--rb-panel-accent) 20%, transparent), color-mix(in srgb, var(--rb-panel-accent) 35%, transparent));
        border: 1px solid color-mix(in srgb, var(--rb-panel-accent) 35%, transparent);
        font-size: 0.92em;
      }
      .char-panel .char-card-skill-name {
        color: #e8d5b7;
        font-weight: 500;
      }
      .char-panel .char-card-skill-value {
        color: var(--rb-panel-accent);
        font-weight: 700;
        font-family: 'Cinzel', monospace;
      }

      /* —— 体质:三维一行 + 描述 + 效果 —— */
      .char-panel .char-card-physique-head {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 4px 0 6px;
      }
      .char-panel .char-card-physique-name {
        color: var(--rb-panel-accent);
        font-weight: 700;
        font-size: 0.95em;
        letter-spacing: 0.4px;
      }
      .char-panel .char-card-physique-stats {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .char-panel .char-card-mini-stat {
        display: inline-flex;
        gap: 4px;
        align-items: baseline;
        padding: 1px 9px;
        border-radius: 4px;
        background: rgba(168, 153, 104, 0.10);
        border: 1px solid rgba(168, 153, 104, 0.22);
        font-size: 0.83em;
      }
      .char-panel .char-card-mini-stat b {
        color: color-mix(in srgb, var(--rb-panel-accent) 78%, white);
        font-weight: 600;
      }
      .char-panel .char-card-physique-desc {
        font-size: 0.84em;
        line-height: 1.6;
        color: #cbd5e0;
        opacity: 0.88;
        padding: 4px 0;
      }
      .char-panel .char-card-physique-effect {
        font-size: 0.84em;
        margin-top: 4px;
      }
      .char-panel .char-card-physique-effect b {
        color: color-mix(in srgb, var(--rb-panel-accent) 80%, white);
      }

      /* —— MVU 风格的 物品/功法/装备/傀儡/灵兽 卡片 —— */
      .char-panel .char-card-items {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 8px;
      }
      .char-panel .char-card-item {
        position: relative;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-left: 3px solid color-mix(in srgb, var(--rb-panel-accent) 60%, transparent);
        transition: background 0.18s ease, border-left-color 0.18s ease, transform 0.15s ease;
      }
      .char-panel .char-card-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-left-color: var(--rb-panel-accent);
        transform: translateX(2px);
      }
      .char-panel .char-card-item-head {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .char-panel .char-card-item-name {
        color: var(--rb-panel-accent);
        font-weight: 700;
        font-size: 0.95em;
        letter-spacing: 0.3px;
      }
      .char-panel .char-card-item-qty {
        color: #cbd5e0;
        font-size: 0.82em;
        opacity: 0.8;
      }
      .char-panel .char-card-item-badge {
        font-size: 0.75em !important;
        padding: 0 6px !important;
      }
      .char-panel .char-card-item-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 3px 4px;
        margin-bottom: 5px;
      }
      .char-panel .char-card-item-tagrow {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-bottom: 5px;
      }
      .char-panel .char-card-item-customtag {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 4px;
        background: rgba(168, 153, 104, 0.15);
        color: color-mix(in srgb, var(--rb-panel-accent) 75%, white);
        border: 1px dashed rgba(168, 153, 104, 0.35);
        font-size: 0.78em;
        font-weight: 500;
      }
      .char-panel .char-card-item-effects {
        background: rgba(168, 153, 104, 0.06);
        border-left: 2px solid color-mix(in srgb, var(--rb-panel-accent) 50%, transparent);
        padding: 5px 8px;
        border-radius: 0 4px 4px 0;
        margin: 4px 0 5px;
        font-size: 0.82em;
        line-height: 1.5;
      }
      .char-panel .char-card-effect-row {
        display: flex;
        gap: 4px;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .char-panel .char-card-effect-row:not(:last-child) {
        margin-bottom: 2px;
      }
      .char-panel .char-card-effect-name {
        color: color-mix(in srgb, var(--rb-panel-accent) 80%, white);
        font-weight: 600;
        flex-shrink: 0;
      }
      .char-panel .char-card-effect-val {
        color: #cbd5e0;
        flex: 1;
      }
      .char-panel .char-card-item-desc {
        color: #cbd5e0;
        font-size: 0.82em;
        line-height: 1.5;
        margin-top: 3px;
        opacity: 0.85;
      }
      .char-panel .char-card-item-loc {
        color: var(--rb-panel-accent);
        font-size: 0.78em;
        margin-top: 4px;
        opacity: 0.75;
      }
      .char-panel .char-card-item-loc .fa-location-dot {
        margin-right: 3px;
      }

      /* —— 傀儡/灵兽 单位卡片:资源池 mini bars —— */
      .char-panel .char-card-item--unit {
        grid-column: 1 / -1; /* 单位卡片占满整行,内容多需要更宽空间 */
      }
      .char-panel .char-card-unit-resources {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 5px 8px;
        margin: 4px 0 5px;
        background: rgba(0, 0, 0, 0.18);
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .char-panel .char-card-unit-stat,
      .char-panel .char-card-unit-stat-simple {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78em;
      }
      .char-panel .char-card-unit-stat-label {
        flex-shrink: 0;
        min-width: 2.4em;
        font-weight: 600;
        color: color-mix(in srgb, var(--rb-panel-accent) 75%, white);
      }
      .char-panel .char-card-unit-stat-bar {
        flex: 1;
        height: 6px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 3px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .char-panel .char-card-unit-stat-bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.4s ease;
      }
      .char-panel .char-card-unit-stat.stat-hp .char-card-unit-stat-bar-fill { background: linear-gradient(90deg, #f56565, #c53030); }

      /* —— <tp> 时空栏:正文最前的时间/地点/天气优雅卷轴 —— */
      .rb-tp {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 18px;
        margin: 0 0 14px;
        padding: 10px 16px;
        background: linear-gradient(135deg,
          rgba(168, 153, 104, 0.12) 0%,
          rgba(168, 153, 104, 0.04) 50%,
          rgba(168, 153, 104, 0.10) 100%);
        border: 1px solid rgba(168, 153, 104, 0.30);
        border-radius: 10px;
        overflow: hidden;
        animation: rb-panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
      }
      /* 顶部金线 */
      .rb-tp::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1.5px;
        background: linear-gradient(90deg,
          transparent,
          var(--rb-accent, #a89968) 30%,
          color-mix(in srgb, var(--rb-accent, #a89968) 70%, white) 50%,
          var(--rb-accent, #a89968) 70%,
          transparent);
        background-size: 200% 100%;
        animation: rb-panel-shimmer 8s ease-in-out infinite;
      }
      .rb-tp-cell {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-size: 0.92em;
        line-height: 1.5;
      }
      .rb-tp-icon {
        flex-shrink: 0;
        color: var(--rb-accent, #a89968);
        opacity: 0.85;
        font-size: 0.92em;
      }
      .rb-tp-text {
        color: var(--rb-text);
      }
      .rb-tp-cell--time .rb-tp-text {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-weight: 700;
        letter-spacing: 0.6px;
        color: var(--rb-accent, #a89968);
      }
      .rb-tp-cell--place .rb-tp-text {
        letter-spacing: 0.4px;
        font-weight: 600;
      }
      .rb-tp-cell--weather .rb-tp-text {
        color: var(--rb-text-soft, #c5b696);
        font-style: italic;
      }
      /* 单元格之间的细线分隔(伪元素) */
      .rb-tp-cell + .rb-tp-cell::before {
        content: '┃';
        color: rgba(168, 153, 104, 0.35);
        margin-right: 14px;
        margin-left: -10px;
        font-size: 0.85em;
      }
      @media (max-width: 600px) {
        .rb-tp { gap: 4px 0; padding: 9px 12px; }
        .rb-tp-cell { font-size: 0.85em; flex-basis: 100%; }
        .rb-tp-cell + .rb-tp-cell::before { display: none; }
      }

      /* light 主题:暖纸感 */
      [data-theme='light'] .rb-tp {
        background: linear-gradient(135deg,
          rgba(168, 153, 104, 0.16) 0%,
          rgba(168, 153, 104, 0.06) 50%,
          rgba(168, 153, 104, 0.16) 100%);
        border-color: rgba(160, 127, 72, 0.32);
      }
      [data-theme='light'] .rb-tp-cell--time .rb-tp-text {
        color: color-mix(in srgb, var(--rb-accent, #a07f48) 75%, #1a0f00);
      }
      [data-theme='light'] .rb-tp-cell--weather .rb-tp-text {
        color: #5a4a36;
      }

      /* —— 小总结卷轴(<details><summary>X</summary>...</details>) —— */
      .rb-summary {
        position: relative;
        margin: 14px 0;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(155deg,
          rgba(20, 16, 32, 0.78) 0%,
          rgba(28, 22, 44, 0.72) 60%,
          rgba(20, 16, 32, 0.82) 100%);
        backdrop-filter: blur(18px) saturate(180%);
        -webkit-backdrop-filter: blur(18px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 14px 44px rgba(0, 0, 0, 0.42),
          0 1px 0 rgba(255, 255, 255, 0.06) inset,
          0 -1px 0 rgba(0, 0, 0, 0.25) inset;
        color: #e8d5b7;
        animation: rb-panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) backwards;
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }
      .rb-summary:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.16);
        box-shadow:
          0 22px 56px rgba(0, 0, 0, 0.5),
          0 0 0 1px var(--rb-accent, #a89968) inset,
          0 1px 0 rgba(255, 255, 255, 0.08) inset;
      }
      .rb-summary::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          var(--rb-accent, #a89968) 30%,
          color-mix(in srgb, var(--rb-accent, #a89968) 70%, white) 50%,
          var(--rb-accent, #a89968) 70%,
          transparent 100%);
        background-size: 250% 100%;
        animation: rb-panel-shimmer 6s ease-in-out infinite;
        z-index: 1;
        pointer-events: none;
      }

      .rb-summary-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
        background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0.02) 50%,
          rgba(255, 255, 255, 0.06) 100%);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        list-style: none;

      // ============== MVU 接入层 ==============
      const mvuState = { ready: false, mvu: null };
      function checkMvu() {
        try {
          const win = window.parent || window;
          if (typeof win.Mvu === 'object' && typeof win.Mvu.getMvuData === 'function') {
            mvuState.mvu = win.Mvu;
            mvuState.ready = true;
            return true;
          }
        } catch (e) {
          /* ignore */
        }
        mvuState.ready = false;
        mvuState.mvu = null;
        return false;
      }

      function fetchLatestMvuData() {
        let data = {};
        try {
          if (mvuState.ready || checkMvu()) {
            const m = mvuState.mvu.getMvuData({ type: 'message', message_id: 'latest' });
            if (m && m.stat_data && Object.keys(m.stat_data).length) {
              data = m.stat_data;
            } else {
              const c = mvuState.mvu.getMvuData({ type: 'chat' });
              if (c && c.stat_data) data = c.stat_data;
            }
          }
        } catch (e) {
          console.warn('[正文美化] MVU 读取失败:', e);
        }
        return data;
      }

      function writeMvuPath(path, value) {
        try {
          if (!mvuState.ready && !checkMvu()) return false;
          const data = mvuState.mvu.getMvuData({ type: 'message', message_id: 'latest' });
          if (!data || !data.stat_data) return false;
          const parts = path.split('/').filter(Boolean);
          let obj = data.stat_data;
          for (let i = 0; i < parts.length - 1; i++) {
            if (!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
            obj = obj[parts[i]];
          }
          obj[parts[parts.length - 1]] = value;
          mvuState.mvu.replaceMvuData(data, { type: 'message', message_id: 'latest' });
          return true;
        } catch (e) {
          console.warn('[正文美化] MVU 写入失败:', e);
          return false;
        }
      }

      // ============== 名称规整化 ==============
      function normalizeDisplayName(raw) {
        const s = String(raw || '')
          .trim()
          .replace(/^[\s"'""''「」『』《》〈〉()（）【】\[\]]+|[\s"'""''「」『』《》〈〉()（）【】\[\]]+$/g, '')
          .trim();
        if (CHARACTER_CONFIG[s]) return s;
        for (const k of Object.keys(CHARACTER_CONFIG)) {
          const c = CHARACTER_CONFIG[k];
          if (c.aliases && c.aliases.includes(s)) return k;
        }
        return s;
      }

      // ============== 内容渲染 ==============
      // 注意：SillyTavern 在把 iframe srcdoc 注入前会 HTML-decode 实体（&amp; → &），
      // 因此源码里不能出现裸的实体字面量；用 & (`&` 的 Unicode 转义) 把 '&' 隔开
      // 避开扫描器，JS 引擎仍会得到正确的 '&amp;' 等字符串。
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '\u0026amp;')
          .replace(/</g, '\u0026lt;')
          .replace(/>/g, '\u0026gt;')
          .replace(/"/g, '\u0026quot;')
          .replace(/'/g, '\u0026#39;');
      }

      function decodeEntities(text) {
        if (!text || text.indexOf('&') === -1) return text;
        const ta = document.createElement('textarea');
        let cur = text;
        for (let i = 0; i < 4; i++) {
          ta.innerHTML = cur;
          const next = ta.value;
          if (next === cur) break;
          cur = next;
          if (cur.indexOf('&') === -1) break;
        }
        return cur;
      }

          `<span class="rb-dlg-name-initial">${escapeHtml(first)}</span>` +
          `<span>${escapeHtml(rest)}</span>`

      }

      // 表格语法解析：{标题} + |行|（action/battle/item/realm 共用）
      function parseTablePanel(content) {
        const lines = _.chain(content).split('\n').map(_.trim).compact().value();
        const sections = [];
        let currentSection = null;
        _.forEach(lines, line => {
          const titleMatch = line.match(/^\{(.+?)\}$/);
          if (titleMatch) {
            // 标准 {标题} 行
            if (currentSection) sections.push(currentSection);
            currentSection = { title: titleMatch[1], rows: [] };
          } else if (_.startsWith(line, '|') && _.endsWith(line, '|')) {
            // | 数据 | 行;若上方没有 section 头,自动建一个匿名 section 兜底
            if (!currentSection) currentSection = { title: '', rows: [] };
            const rowContent = line.slice(1, -1).trim();
            if (rowContent) currentSection.rows.push(rowContent);
          } else {
            // 纯文本行:仅当尚无 section 时,视为 section 标题
            // (容错 AI 不带 {} 直接写名称,如 item_info 第一行写"赤铜残刀"而非"{赤铜残刀}")
            // 已有 section 时忽略此类行(避免 action_info 中"(若是静态判定:)"这种括号注释被误当标题)
            if (!currentSection) {
              currentSection = { title: line, rows: [] };
            }
          }
        });
        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      // char_info 缩进式语法（一级标题无缩进、二级标题缩进 2 空格以冒号结尾）
      // 解析 char_info: 用栈构建任意深度的树,然后转成 items
      // 关键:先做"基础缩进归一化",AI 整段缩进时(<char_info> 内的内容套了 N 个空格)也能正确识别顶级
      function parseCharIndentedPanel(content) {
        const rawLines = content.split('\n');
        // 基础缩进:取所有非空行最小缩进,然后从每行减去
        let base = Infinity;
        for (const l of rawLines) {
          if (l.trim()) base = Math.min(base, l.search(/\S/));
        }
        if (!isFinite(base)) base = 0;

        // 用栈构建树:每个节点 { key, value, children, multiline? }
        const root = { children: [] };
        const stack = [{ node: root, indent: -1 }];

        for (let i = 0; i < rawLines.length; i++) {
          const line = rawLines[i];
          if (!line.trim()) continue;
          const rawIndent = line.search(/\S/);
          const indent = rawIndent - base;
          const trimmed = line.trim();

          // 弹栈直到栈顶 indent 严格小于当前 indent
          while (stack.length > 1 && stack[stack.length - 1].indent >= indent) {
            stack.pop();
          }
          const parent = stack[stack.length - 1].node;
          parent.children = parent.children || [];

          const colonIdx = trimmed.indexOf(':');
          let key, value;
          if (colonIdx > 0) {
            key = trimmed.slice(0, colonIdx).trim();
            value = trimmed.slice(colonIdx + 1).trim();
          } else {
            key = trimmed;
            value = '';
          }

          // 多行字符串 (key: |)
          if (value === '|') {
            const buf = [];
            let j = i + 1;
            // 收集后续 indent>当前 的所有行(去掉相对缩进)
            const childMinIndent = (() => {
              let m = Infinity;
              for (let k = i + 1; k < rawLines.length; k++) {
                const nl = rawLines[k];
                if (!nl.trim()) continue;
                const ni = nl.search(/\S/) - base;
                if (ni <= indent) break;
                if (ni < m) m = ni;
              }
              return isFinite(m) ? m : indent + 2;
            })();
            while (j < rawLines.length) {
              const nl = rawLines[j];
              if (!nl.trim()) { buf.push(''); j++; continue; }
              const ni = nl.search(/\S/) - base;
              if (ni <= indent) break;
              const sliceFrom = base + childMinIndent;
              buf.push(nl.length > sliceFrom ? nl.slice(sliceFrom) : nl.trim());
              j++;
            }
            const node = { key, value: buf.join('\n').replace(/\s+$/, ''), children: [], multiline: true };
            parent.children.push(node);
            i = j - 1;
            continue;
          }

          const node = { key, value, children: [] };
          parent.children.push(node);

          // 空 value 表示后续可能有子节点
          if (value === '') {
            stack.push({ node, indent });
          }
        }

        // 树 → items(向后兼容旧渲染流程)
        const items = treeToCharItems(root.children);
        return { items, tree: root.children };
      }

      // 这些 section 的子节点视为"卡片化的物件"(每个子节点是一个 item),走 list-section 渲染
      const CHAR_LIST_SECTIONS = ['物品', '装备', '功法', '傀儡', '灵兽'];

      // 把树节点转成扁平 items 序列(每个顶级节点 → 一个 item)
      function treeToCharItems(nodes) {
        return nodes.map(n => {
          if (n.multiline) {
            return { kind: 'multiline', key: n.key, value: n.value };
          }
          if (!n.children || n.children.length === 0) {
            return { kind: 'scalar', key: n.key, value: n.value };
          }
          // 显式列出的"物件型" section 才走 list-section,且确认子节点确实是嵌套对象
          if (CHAR_LIST_SECTIONS.includes(n.key)) {
            const allNested = n.children.every(c =>
              (c.value === '' || c.value == null) && c.children && c.children.length > 0
            );
            if (allNested) {
              return {
                kind: 'list-section',
                title: n.key,
                items: n.children.map(c => ({
                  name: c.key,
                  fields: flattenCharFields(c.children),
                  raw: c.children, // 保留原始子树供 item-card 深度渲染(资源池/技能 等)
                })),
              };
            }
          }
          // 其他即便嵌套也走 section,fields 自动拍平,但保留 raw tree 给特殊渲染器用
          return { kind: 'section', title: n.key, fields: flattenCharFields(n.children), raw: n.children };
        });
      }

      // 把子节点拍平成 [{key, value}](三级以上的嵌套对象简短拼接成字符串)
      function flattenCharFields(children) {
        return children.map(c => {
          if ((c.value === '' || c.value == null) && c.children && c.children.length > 0) {
            // 嵌套对象 — 拼成 "k1: v1 / k2: v2"
            const sub = c.children.map(cc =>
              cc.key + (cc.value ? ': ' + cc.value : '')
            ).join(' / ');
            return { key: c.key, value: sub };
          }
          return { key: c.key, value: c.value };
        });
      }

      // —— 5 个 beautifyRow（行内文本高亮，每个 panel 独立规则） ——
      function beautifyActionRow(row) {
        let html = _.escape(row);
        ['凡', '黄', '玄', '地', '天'].forEach(q => {
          html = html.replace(
            new RegExp(`品质:\\s*${q}`, 'g'),
            `<span class="field-label">品质:</span> <span class="tag tag-quality-${q}"><i class="fa-solid fa-star"></i> ${q}</span>`,
          );
        });
        html = html.replace(/结果:\s*大成功/g, `<span class="field-label">结果:</span> <span class="tag tag-critical-success"><i class="fa-solid fa-star"></i> 大成功</span>`);
        html = html.replace(/结果:\s*成功/g, `<span class="field-label">结果:</span> <span class="tag tag-success"><i class="fa-solid fa-check"></i> 成功</span>`);
        html = html.replace(/结果:\s*失败/g, `<span class="field-label">结果:</span> <span class="tag tag-fail"><i class="fa-solid fa-times"></i> 失败</span>`);
        html = html.replace(/结果:\s*大失败/g, `<span class="field-label">结果:</span> <span class="tag tag-critical-fail"><i class="fa-solid fa-skull"></i> 大失败</span>`);
        html = html.replace(/状态:\s*制作成功/g, `<span class="field-label">状态:</span> <span class="tag tag-success"><i class="fa-solid fa-check"></i> 制作成功</span>`);
        html = html.replace(/状态:\s*制作失败/g, `<span class="field-label">状态:</span> <span class="tag tag-fail"><i class="fa-solid fa-times"></i> 制作失败</span>`);
        const tagMappings = [
          { pattern: /类型:\s*([^|]+)/g, label: '类型', icon: 'fa-solid fa-tag', className: 'tag-type' },
          { pattern: /方法:\s*([^|]+)/g, label: '方法', icon: 'fa-solid fa-wand-magic-sparkles', className: 'tag-type' },
          { pattern: /检定类型:\s*([^|]+)/g, label: '检定类型', icon: 'fa-solid fa-tag', className: 'tag-type' },
          { pattern: /难度:\s*([^|]+)/g, label: '难度', icon: 'fa-solid fa-chart-line', className: 'tag-attr' },
          { pattern: /当前境界:\s*([^|]+)/g, label: '当前境界', icon: 'fa-solid fa-crown', className: 'tag-attr' },
          { pattern: /目标境界:\s*([^|]+)/g, label: '目标境界', icon: 'fa-solid fa-crown', className: 'tag-attr' },
          { pattern: /攻方:\s*([^|]+)/g, label: '攻方', icon: 'fa-solid fa-hand-fist', className: 'tag-attr' },
          { pattern: /守方:\s*([^|]+)/g, label: '守方', icon: 'fa-solid fa-shield', className: 'tag-attr' },
          { pattern: /投入物:\s*([^|]+)/g, label: '投入物', icon: 'fa-solid fa-boxes-stacked', className: 'tag-attr' },
          { pattern: /产出:\s*([^|]+)/g, label: '产出', icon: 'fa-solid fa-box-open', className: 'tag-attr' },
        ];
        tagMappings.forEach(({ pattern, label, icon, className }) => {
          html = html.replace(pattern, (m, val) => `<span class="field-label">${label}:</span> <span class="tag ${className}"><i class="${icon}"></i> ${val.trim()}</span>`);
        });
        return html;
      }

      function beautifyBattleRow(row) {
        let html = _.escape(row);
        html = html.replace(/├─/g, '<span class="tree-indent">├─</span>');
        html = html.replace(/└─/g, '<span class="tree-indent">└─</span>');
        html = html.replace(/─/g, '<span class="tree-indent">─</span>');
        html = html.replace(/\s*-&gt;\s*/g, ' <span class="sequence-arrow">→</span> '); // -> 已经被 _.escape 转成 -&gt;
        const attrMappings = [
          { pattern: /气血:\s*(\[[\d/]+\])/g, label: '气血', icon: 'fa-solid fa-heart' },
          { pattern: /灵气:\s*(\[[\d/]+\])/g, label: '灵气', icon: 'fa-solid fa-wand-magic-sparkles' },
          { pattern: /遁速\[(\d+)\]/g, label: '遁速', icon: 'fa-solid fa-wind' },
          { pattern: /御物\[(\d+)\]/g, label: '御物', icon: 'fa-solid fa-hand-sparkles' },
