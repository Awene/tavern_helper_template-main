<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>秘境信息面板美化</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', serif;
        color: #e8d5b7;
        background: #1a1a2e;
      }
      #output-container {
        max-width: 950px;
        margin: 20px auto;
        padding: 0 10px;
      }

      .realm-panel {
        background: linear-gradient(180deg, rgba(50, 35, 60, 0.95) 0%, rgba(30, 20, 45, 0.98) 100%);
        border: 2px solid #c9a961;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.7);
      }
      .realm-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, #f6ad55, transparent);
      }

      .panel-header {
        background: linear-gradient(90deg, #5a3f6c 0%, #6a4f8c 50%, #5a3f6c 100%);
        padding: 16px 20px;
        border-bottom: 1px solid #c9a961;
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
      }
      .panel-header:hover {
        background: linear-gradient(90deg, #6a4f8c 0%, #7a5f9c 50%, #6a4f8c 100%);
      }
      .panel-header i.panel-icon {
        font-size: 1.4em;
        color: #f6ad55;
        text-shadow: 0 0 12px rgba(246, 173, 85, 0.6);
      }
      .panel-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.2em;
        font-weight: 700;
        color: #f6ad55;
        text-shadow: 0 0 10px rgba(246, 173, 85, 0.4);
        letter-spacing: 2px;
        flex: 1;
      }
      .panel-toggle {
        color: #c9a961;
        transition: transform 0.3s ease;
      }
      .panel-header.collapsed .panel-toggle {
        transform: rotate(-90deg);
      }

      .panel-content {
        padding: 16px;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease,
          opacity 0.3s ease;
        overflow: hidden;
      }
      .panel-content.collapsed {
        max-height: 0;
        padding: 0 16px;
        opacity: 0;
      }

      .data-row {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(201, 169, 97, 0.3);
        border-radius: 6px;
        padding: 12px 14px;
        margin-bottom: 10px;
        font-size: 0.95em;
        line-height: 1.6;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
      }
      .data-row:last-child {
        margin-bottom: 0;
      }

      .tag {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 5px;
        font-size: 0.9em;
        font-weight: 600;
        margin: 0 2px;
        white-space: normal;
        word-break: break-word;
        max-width: 100%;
        vertical-align: middle;
      }

      .tag-difficulty-简单 {
        background: #2f855a;
        color: #fff;
      }
      .tag-difficulty-寻常 {
        background: #2c5282;
        color: #fff;
      }
      .tag-difficulty-困难 {
        background: #c05621;
        color: #fff;
      }
      .tag-difficulty-极难 {
        background: #c53030;
        color: #fff;
      }
      .tag-difficulty-绝境 {
        background: #6b21a8;
        color: #fff;
        text-shadow: 0 0 8px rgba(107, 33, 168, 0.5);
      }

      .tag-type {
        background: #553c9a;
        color: #e9d8fd;
      }
      .tag-hazard {
        background: #c53030;
        color: #fff;
      }
      .tag-reward {
        background: #2f855a;
        color: #fff;
      }

      .field-label {
        color: #f6ad55;
        font-weight: 700;
        margin-right: 4px;
      }
      .stat-value {
        color: #fbd38d;
        font-weight: 700;
      }
      .description-text {
        color: #cbd5e0;
        line-height: 1.6;
      }

      .hazard-box {
        background: rgba(197, 48, 48, 0.15);
        border-left: 4px solid #c53030;
        padding: 10px 12px;
        margin-top: 8px;
        border-radius: 3px;
        color: #fc8181;
      }

      .reward-box {
        background: rgba(47, 133, 90, 0.15);
        border-left: 4px solid #2f855a;
        padding: 10px 12px;
        margin-top: 8px;
        border-radius: 3px;
        color: #9ae6b4;
      }

      @media (max-width: 600px) {
        .panel-header {
          padding: 14px 16px;
        }
        .panel-title {
          font-size: 1.05em;
          letter-spacing: 1px;
        }
        .panel-content {
          padding: 14px;
        }
        .data-row {
          font-size: 0.9em;
          padding: 10px 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="output-container">
      <div id="content"></div>
    </div>

    <script>
      const mockRealmText = `$0`;

      function parseSecretRealmInfo(text) {
        let content = _.trim(text);
        const tagMatch = content.match(/<secret_realm_info>([\s\S]*?)<\/secret_realm_info>/);
        if (tagMatch) content = _.trim(tagMatch[1]);
        return parsePanelContent(content);
      }

      function parsePanelContent(content) {
        const lines = _.chain(content).split('\n').map(_.trim).compact().value();
        const sections = [];
        let currentSection = null;

        _.forEach(lines, line => {
          const titleMatch = line.match(/^\{(.+?)\}$/);
          if (titleMatch) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: titleMatch[1], rows: [] };
          } else if (_.startsWith(line, '|') && _.endsWith(line, '|') && currentSection) {
            const content = line.slice(1, -1).trim();
            if (content) currentSection.rows.push(content);
          }
        });

        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      function beautifyRow(row) {
        let html = _.escape(row);

        // 难度
        ['简单', '寻常', '困难', '极难', '绝境'].forEach(d => {
          html = html.replace(
            new RegExp(`难度:\\s*${d}`, 'g'),
            `<span class="field-label">难度:</span> <span class="tag tag-difficulty-${d}"><i class="fa-solid fa-skull"></i> ${d}</span>`,
          );
        });

        // 类型
        html = html.replace(
          /类型:\s*([^|]+)/g,
          (m, val) =>
            `<span class="field-label">类型:</span> <span class="tag tag-type"><i class="fa-solid fa-map"></i> ${val.trim()}</span>`,
        );

        // 危害
        html = html.replace(
          /危害:\s*([^|]+)/g,
          (m, val) =>
            `<span class="field-label">危害:</span> <span class="tag tag-hazard"><i class="fa-solid fa-exclamation"></i> ${val.trim()}</span>`,
        );

        // 奖励
        html = html.replace(
          /奖励:\s*([^|]+)/g,
          (m, val) =>
            `<span class="field-label">奖励:</span> <span class="tag tag-reward"><i class="fa-solid fa-gift"></i> ${val.trim()}</span>`,
        );

        // 数值
        html = html.replace(/(\d+)/g, (m, val) => `<span class="stat-value">${val}</span>`);

        return html;
      }

      function renderPanel(panel, containerSelector) {
        const $container = $(containerSelector);
        $container.empty();

        _.forEach(panel.sections, section => {
          const $panel = $(`
          <div class="realm-panel">
            <div class="panel-header">
              <i class="panel-icon fa-solid fa-mountain"></i>
              <span class="panel-title">${section.title}</span>
              <i class="panel-toggle fa-solid fa-chevron-down"></i>
            </div>
            <div class="panel-content"></div>
          </div>
        `);

          const $content = $panel.find('.panel-content');
          _.forEach(section.rows, row => {
            const $row = $(`<div class="data-row">${beautifyRow(row)}</div>`);
            $content.append($row);
          });

          $panel.find('.panel-header').on('click', function () {
            $(this).toggleClass('collapsed');
            $(this).next('.panel-content').toggleClass('collapsed');
          });

          $container.append($panel);
        });
      }

      $(() => {
        const panel = parseSecretRealmInfo(mockRealmText);
        renderPanel(panel, '#content');
      });
    </script>
  </body>
</html>
