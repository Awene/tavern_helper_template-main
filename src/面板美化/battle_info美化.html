<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>战斗信息美化 - battle_info</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', serif;
        color: #e8d5b7;
        background: #1a1a2e;
      }
      #output-container {
        max-width: 1000px;
        margin: 20px auto;
        padding: 0 10px;
      }

      /* 战斗面板样式 */
      .battle-panel {
        background: linear-gradient(180deg, rgba(40, 30, 50, 0.95) 0%, rgba(20, 15, 35, 0.98) 100%);
        border: 2px solid #fc8181;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        --panel-color: #fc8181;
      }
      .battle-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, #fc8181, transparent);
      }

      .panel-header {
        background: linear-gradient(
          90deg,
          rgba(60, 40, 60, 0.8) 0%,
          rgba(80, 60, 80, 0.8) 50%,
          rgba(60, 40, 60, 0.8) 100%
        );
        padding: 14px 18px;
        border-bottom: 1px solid #fc8181;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
      }
      .panel-header:hover {
        background: linear-gradient(
          90deg,
          rgba(80, 60, 80, 0.9) 0%,
          rgba(100, 80, 100, 0.9) 50%,
          rgba(80, 60, 80, 0.9) 100%
        );
      }
      .panel-header i.panel-icon {
        font-size: 1.3em;
        color: #fc8181;
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
      }
      .panel-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.15em;
        font-weight: 700;
        color: #fc8181;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
        flex: 1;
      }
      .panel-toggle {
        color: #fc8181;
        transition: transform 0.3s ease;
      }
      .panel-header.collapsed .panel-toggle {
        transform: rotate(-90deg);
      }

      .panel-content {
        padding: 14px;
        background: transparent;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease,
          opacity 0.3s ease;
        overflow: hidden;
      }
      .panel-content.collapsed {
        max-height: 0;
        padding: 0 14px;
        opacity: 0;
      }

      .data-row {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid;
        border-color: rgba(252, 129, 129, 0.3);
        border-radius: 5px;
        padding: 10px 14px;
        margin-bottom: 8px;
        font-size: 0.95em;
        line-height: 1.6;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
      }
      .data-row:last-child {
        margin-bottom: 0;
      }

      /* 树形结构缩进 */
      .tree-indent {
        display: inline-block;
        color: #888;
        margin-right: 4px;
        font-family: monospace;
      }

      .tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 0.9em;
        font-weight: 600;
        margin: 0 2px;
        white-space: normal;
        word-break: break-word;
        max-width: 100%;
        vertical-align: middle;
      }

      /* 属性标签 */
      .tag-realm {
        background: #805ad5;
        color: #fff;
      }
      .tag-element {
        background: #ed8936;
        color: #fff;
      }
      .tag-status {
        background: #38b2ac;
        color: #fff;
      }
      .tag-unit-type {
        background: #3182ce;
        color: #fff;
      }
      .tag-formation {
        background: #d69e2e;
        color: #fff;
      }

      .field-label {
        color: #fc8181;
        font-weight: 700;
        margin-right: 4px;
      }

      .unit-name {
        color: #fbd38d;
        font-weight: 700;
      }

      .stat-label {
        color: #90cdf4;
        font-weight: 600;
      }

      .sequence-arrow {
        color: #68d391;
        margin: 0 4px;
        font-weight: 700;
      }

      @media (max-width: 600px) {
        .panel-header {
          padding: 12px 14px;
        }
        .panel-title {
          font-size: 1em;
          letter-spacing: 1px;
        }
        .panel-content {
          padding: 12px;
        }
        .data-row {
          font-size: 0.9em;
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="output-container">
      <div id="content"></div>
    </div>

    <script>
      /**
       * 从文本中提取 battle_info 面板
       * @param {string} text - 包含 battle_info 标签的文本
       * @returns {Array} 面板数组
       */
      function extractBattleInfo(text) {
        const regex = /<battle_info>((?:(?!<\/?battle_info>)[\s\S])*?)<\/battle_info>/gs;
        const matches = [];
        let match;

        while ((match = regex.exec(text)) !== null) {
          const content = match[1].trim();
          matches.push(parsePanelContent(content));
        }

        return matches;
      }

      /**
       * 解析面板内容
       * @param {string} content - 面板内容
       * @returns {Object} 解析后的面板对象
       */
      function parsePanelContent(content) {
        const lines = _.chain(content).split('\n').map(_.trim).compact().value();

        const sections = [];
        let currentSection = null;

        _.forEach(lines, line => {
          const titleMatch = line.match(/^\{(.+?)\}$/);
          if (titleMatch) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: titleMatch[1], rows: [] };
          } else if (_.startsWith(line, '|') && _.endsWith(line, '|') && currentSection) {
            const rowContent = line.slice(1, -1).trim();
            if (rowContent) currentSection.rows.push(rowContent);
          }
        });

        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      /**
       * 美化单行数据
       * @param {string} row - 数据行
       * @returns {string} 美化后的 HTML
       */
      function beautifyRow(row) {
        let html = _.escape(row);

        // 处理树形结构符号
        html = html.replace(/├─/g, '<span class="tree-indent">├─</span>');
        html = html.replace(/└─/g, '<span class="tree-indent">└─</span>');
        html = html.replace(/─/g, '<span class="tree-indent">─</span>');

        // 行动序列箭头（优先处理，避免被其他规则破坏）
        html = html.replace(/\s*->\s*/g, ' <span class="sequence-arrow">→</span> ');

        // 属性标签（优先处理，避免被其他规则破坏）
        const attrMappings = [
          { pattern: /气血:\s*(\[[\d/]+\])/g, label: '气血', icon: 'fa-solid fa-heart' },
          { pattern: /灵力:\s*(\[[\d/]+\])/g, label: '灵力', icon: 'fa-solid fa-wand-magic-sparkles' },
          { pattern: /遁速\[(\d+)\]/g, label: '遁速', icon: 'fa-solid fa-wind' },
          { pattern: /御物\[(\d+)\]/g, label: '御物', icon: 'fa-solid fa-hand-sparkles' },
          { pattern: /咒法\[(\d+)\]/g, label: '咒法', icon: 'fa-solid fa-scroll' },
          { pattern: /幻术\[(\d+)\]/g, label: '幻术', icon: 'fa-solid fa-mask' },
          { pattern: /阵法\[(\d+)\]/g, label: '阵法', icon: 'fa-solid fa-diagram-project' },
          { pattern: /神识\[(\d+)\]/g, label: '神识', icon: 'fa-solid fa-eye' },
          { pattern: /炼体\[(\d+)\]/g, label: '炼体', icon: 'fa-solid fa-person' },
        ];

        attrMappings.forEach(({ pattern, label, icon }) => {
          html = html.replace(
            pattern,
            (m, val) => `<span class="stat-label"><i class="${icon}"></i> ${label}${val}</span>`,
          );
        });

        // 五行标签 - 只在特定上下文中美化（避免过度匹配）
        // 只美化 "五行: X vs Y" 格式中的五行
        html = html.replace(/五行:\s*([金木水火土])\s*vs\s*([金木水火土])/g, (m, elem1, elem2) => {
          const tag1 = `<span class="tag tag-element"><i class="fa-solid fa-circle"></i> ${elem1}</span>`;
          const tag2 = `<span class="tag tag-element"><i class="fa-solid fa-circle"></i> ${elem2}</span>`;
          return `五行: ${tag1} vs ${tag2}`;
        });

        // 境界标签 - 只在特定上下文中美化
        const realms = ['渡劫', '大乘', '合体', '分神', '元神', '化神', '炼虚', '炼神', '金丹', '筑基', '练气'];
        realms.forEach(realm => {
          // 只在 "L" 后面或作为独立词出现时美化
          html = html.replace(
            new RegExp(`${realm}([L×\\d]|\\s|$)`, 'g'),
            (m, suffix) => `<span class="tag tag-realm"><i class="fa-solid fa-crown"></i> ${realm}</span>${suffix}`,
          );
        });

        // 单位类型标签
        const unitTypes = ['人物', '法宝', '灵兽', '傀儡', '阵法'];
        unitTypes.forEach(type => {
          html = html.replace(
            new RegExp(`(${type})([A-Z]|集群)`, 'g'),
            `<span class="tag tag-unit-type"><i class="fa-solid fa-users"></i> $1$2</span>`,
          );
        });

        // 阵法状态
        html = html.replace(
          /结阵中/g,
          `<span class="tag tag-formation"><i class="fa-solid fa-circle-notch"></i> 结阵中</span>`,
        );
        html = html.replace(
          /已结阵/g,
          `<span class="tag tag-formation"><i class="fa-solid fa-check-circle"></i> 已结阵</span>`,
        );

        return html;
      }

      /**
       * 渲染面板
       * @param {Array} panels - 面板数组
       * @param {string} containerSelector - 容器选择器
       */
      function renderPanels(panels, containerSelector) {
        const $container = $(containerSelector);
        $container.empty();

        _.forEach(panels, panel => {
          _.forEach(panel.sections, section => {
            const iconMap = {
              战况总览: 'fa-solid fa-scroll',
              行动顺序: 'fa-solid fa-hourglass-half',
              攻击行动: 'fa-solid fa-crosshairs',
              伤害基准计算: 'fa-solid fa-calculator',
              结算清单: 'fa-solid fa-list-check',
              战术动作: 'fa-solid fa-chess-knight',
              战意判定: 'fa-solid fa-heart-crack',
              战斗结算: 'fa-solid fa-flag-checkered',
            };

            const icon = iconMap[section.title] || 'fa-solid fa-scroll';

            const $panel = $(`
            <div class="battle-panel">
              <div class="panel-header">
                <i class="panel-icon ${icon}"></i>
                <span class="panel-title">${section.title}</span>
                <i class="panel-toggle fa-solid fa-chevron-down"></i>
              </div>
              <div class="panel-content"></div>
            </div>
          `);

            const $content = $panel.find('.panel-content');
            _.forEach(section.rows, row => {
              const $row = $(`<div class="data-row">${beautifyRow(row)}</div>`);
              $content.append($row);
            });

            $panel.find('.panel-header').on('click', function () {
              $(this).toggleClass('collapsed');
              $(this).next('.panel-content').toggleClass('collapsed');
            });

            $container.append($panel);
          });
        });
      }

      /**
       * 主函数 - 处理文本中的所有 battle_info 面板
       * @param {string} text - 包含 battle_info 标签的文本
       */
      function processBattleInfo(text) {
        const panels = extractBattleInfo(text);
        renderPanels(panels, '#content');
      }

      // 页面加载完成后执行
      $(() => {
        // 示例文本 - 替换为实际的文本内容
        const mockText = `$0`;
        processBattleInfo(mockText);
      });
    </script>
  </body>
</html>
