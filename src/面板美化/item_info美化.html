<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>物品信息面板美化</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', serif;
        color: #e8d5b7;
        background: #1a1a2e;
      }
      #output-container {
        max-width: 900px;
        margin: 20px auto;
        padding: 0 10px;
      }

      .item-panel {
        background: linear-gradient(180deg, rgba(40, 35, 50, 0.95) 0%, rgba(25, 20, 40, 0.98) 100%);
        border: 2px solid #9d7e5d;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      .item-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
      }

      .panel-header {
        background: linear-gradient(90deg, #3d3d52 0%, #4d4d6c 50%, #3d3d52 100%);
        padding: 14px 18px;
        border-bottom: 1px solid #9d7e5d;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
      }
      .panel-header:hover {
        background: linear-gradient(90deg, #4d4d6c 0%, #5d5d7c 50%, #4d4d6c 100%);
      }
      .panel-header i.panel-icon {
        font-size: 1.3em;
        color: #d4af37;
        text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      }
      .panel-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.15em;
        font-weight: 700;
        color: #d4af37;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        letter-spacing: 2px;
        flex: 1;
      }
      .panel-toggle {
        color: #9d7e5d;
        transition: transform 0.3s ease;
      }
      .panel-header.collapsed .panel-toggle {
        transform: rotate(-90deg);
      }

      .panel-content {
        padding: 14px;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease,
          opacity 0.3s ease;
        overflow: hidden;
      }
      .panel-content.collapsed {
        max-height: 0;
        padding: 0 14px;
        opacity: 0;
      }

      .data-row {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(157, 126, 93, 0.3);
        border-radius: 5px;
        padding: 10px 14px;
        margin-bottom: 8px;
        font-size: 0.95em;
        line-height: 1.6;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px 10px;
      }
      .data-row:last-child {
        margin-bottom: 0;
      }

      .tag {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 0.9em;
        font-weight: 600;
        margin: 0 2px;
        white-space: normal;
        word-break: break-word;
        max-width: 100%;
        vertical-align: middle;
      }

      .tag-quality-凡 {
        background: #4a5568;
        color: #cbd5e0;
      }
      .tag-quality-黄 {
        background: #d69e2e;
        color: #fff;
      }
      .tag-quality-玄 {
        background: #3182ce;
        color: #fff;
      }
      .tag-quality-地 {
        background: #805ad5;
        color: #fff;
      }
      .tag-quality-天 {
        background: #c53030;
        color: #fff;
        text-shadow: 0 0 8px rgba(197, 48, 48, 0.5);
      }

      .tag-type {
        background: #553c9a;
        color: #e9d8fd;
      }
      .tag-attr {
        background: #2c5282;
        color: #bee3f8;
      }
      .tag-effect {
        background: #44337a;
        color: #e9d8fd;
      }
      .tag-label {
        background: #2d3748;
        color: #cbd5e0;
      }

      .field-label {
        color: #d4af37;
        font-weight: 700;
        margin-right: 4px;
      }
      .stat-value {
        color: #fbd38d;
        font-weight: 700;
      }
      .effect-text {
        color: #cbd5e0;
        font-style: italic;
      }

      .description-box {
        background: rgba(0, 0, 0, 0.3);
        border-left: 3px solid #d4af37;
        padding: 10px 12px;
        margin-top: 8px;
        border-radius: 3px;
        color: #cbd5e0;
        line-height: 1.6;
      }

      @media (max-width: 600px) {
        .panel-header {
          padding: 12px 14px;
        }
        .panel-title {
          font-size: 1em;
          letter-spacing: 1px;
        }
        .panel-content {
          padding: 12px;
        }
        .data-row {
          font-size: 0.9em;
          padding: 8px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="output-container">
      <div id="content"></div>
    </div>

    <script>
      const mockItemText = `$0`;

      const ItemConfig = {
        物品信息: { icon: 'fa-solid fa-box', color: '#d4af37' },
        功法信息: { icon: 'fa-solid fa-scroll', color: '#d4af37' },
        法宝信息: { icon: 'fa-solid fa-wand-magic-sparkles', color: '#d4af37' },
        傀儡信息: { icon: 'fa-solid fa-robot', color: '#d4af37' },
        灵兽信息: { icon: 'fa-solid fa-dragon', color: '#d4af37' },
      };

      function parseItemInfo(text) {
        let content = _.trim(text);
        const tagMatch = content.match(/<item_info>([\s\S]*?)<\/item_info>/);
        if (tagMatch) content = _.trim(tagMatch[1]);
        return parsePanelContent(content);
      }

      function parsePanelContent(content) {
        const lines = _.chain(content).split('\n').map(_.trim).compact().value();
        const sections = [];
        let currentSection = null;

        _.forEach(lines, line => {
          const titleMatch = line.match(/^\{(.+?)\}$/);
          if (titleMatch) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: titleMatch[1], rows: [] };
          } else if (_.startsWith(line, '|') && _.endsWith(line, '|') && currentSection) {
            const content = line.slice(1, -1).trim();
            if (content) currentSection.rows.push(content);
          }
        });

        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      function beautifyRow(row) {
        let html = _.escape(row);

        // 品质标签
        ['凡', '黄', '玄', '地', '天'].forEach(q => {
          html = html.replace(
            new RegExp(`品质:\\s*${q}`, 'g'),
            `<span class="field-label">品质:</span> <span class="tag tag-quality-${q}"><i class="fa-solid fa-star"></i> ${q}</span>`,
          );
        });

        // 类型标签
        const types = ['物品', '功法', '法宝', '傀儡', '灵兽', '秘籍', '配方', '符箓', '丹药', '素材', '武器', '工具'];
        types.forEach(t => {
          html = html.replace(
            new RegExp(`类型:\\s*${t}`, 'g'),
            `<span class="field-label">类型:</span> <span class="tag tag-type"><i class="fa-solid fa-tag"></i> ${t}</span>`,
          );
        });

        // 属性值
        html = html.replace(
          /攻击力:\s*(\d+)/g,
          (m, val) => `<span class="field-label">攻击力:</span> <span class="stat-value">${val}</span>`,
        );
        html = html.replace(
          /防御力:\s*(\d+)/g,
          (m, val) => `<span class="field-label">防御力:</span> <span class="stat-value">${val}</span>`,
        );
        html = html.replace(
          /遁速:\s*(\d+)/g,
          (m, val) => `<span class="field-label">遁速:</span> <span class="stat-value">${val}</span>`,
        );
        html = html.replace(
          /气血:\s*(\d+)/g,
          (m, val) => `<span class="field-label">气血:</span> <span class="stat-value">${val}</span>`,
        );
        html = html.replace(
          /灵气:\s*(\d+)/g,
          (m, val) => `<span class="field-label">灵气:</span> <span class="stat-value">${val}</span>`,
        );

        // 标签
        html = html.replace(
          /\[([^\]]+)\]/g,
          (m, tag) => `<span class="tag tag-attr"><i class="fa-solid fa-bookmark"></i> ${tag}</span>`,
        );

        // 效果
        html = html.replace(
          /效果:\s*([^|]+)/g,
          (m, effect) => `<span class="field-label">效果:</span> <span class="effect-text">${effect.trim()}</span>`,
        );

        return html;
      }

      function renderPanel(panel, containerSelector) {
        const $container = $(containerSelector);
        $container.empty();

        _.forEach(panel.sections, section => {
          const config = ItemConfig[section.title] || { icon: 'fa-solid fa-box', color: '#d4af37' };
          const $panel = $(`
          <div class="item-panel">
            <div class="panel-header">
              <i class="panel-icon ${config.icon}"></i>
              <span class="panel-title">${section.title}</span>
              <i class="panel-toggle fa-solid fa-chevron-down"></i>
            </div>
            <div class="panel-content"></div>
          </div>
        `);

          const $content = $panel.find('.panel-content');
          _.forEach(section.rows, row => {
            const $row = $(`<div class="data-row">${beautifyRow(row)}</div>`);
            $content.append($row);
          });

          $panel.find('.panel-header').on('click', function () {
            $(this).toggleClass('collapsed');
            $(this).next('.panel-content').toggleClass('collapsed');
          });

          $container.append($panel);
        });
      }

      $(() => {
        const panel = parseItemInfo(mockItemText);
        renderPanel(panel, '#content');
      });
    </script>
  </body>
</html>
