<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>角色信息面板美化 - char_info</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Noto Serif SC', serif;
        color: #e8d5b7;
        background: #1a1a2e;
      }
      #output-container {
        max-width: 1000px;
        margin: 20px auto;
        padding: 0 10px;
      }

      .char-panel {
        background: linear-gradient(180deg, rgba(45, 40, 60, 0.95) 0%, rgba(30, 25, 45, 0.98) 100%);
        border: 2px solid #a89968;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      }
      .char-panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, transparent, #a89968, transparent);
      }

      .panel-header {
        background: linear-gradient(
          90deg,
          rgba(60, 50, 70, 0.8) 0%,
          rgba(80, 70, 90, 0.8) 50%,
          rgba(60, 50, 70, 0.8) 100%
        );
        padding: 14px 18px;
        border-bottom: 1px solid #a89968;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s ease;
      }
      .panel-header:hover {
        background: linear-gradient(
          90deg,
          rgba(80, 70, 90, 0.9) 0%,
          rgba(100, 90, 110, 0.9) 50%,
          rgba(80, 70, 90, 0.9) 100%
        );
      }
      .panel-header i.panel-icon {
        font-size: 1.3em;
        color: #a89968;
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.5);
      }
      .panel-title {
        font-family: 'Cinzel', 'Noto Serif SC', serif;
        font-size: 1.15em;
        font-weight: 700;
        color: #a89968;
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
        flex: 1;
      }
      .panel-toggle {
        color: #a89968;
        transition: transform 0.3s ease;
      }
      .panel-header.collapsed .panel-toggle {
        transform: rotate(-90deg);
      }

      .panel-content {
        padding: 14px;
        background: transparent;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease,
          opacity 0.3s ease;
        overflow: hidden;
      }
      .panel-content.collapsed {
        max-height: 0;
        padding: 0 14px;
        opacity: 0;
      }

      .section {
        margin-bottom: 12px;
      }
      .section:last-child {
        margin-bottom: 0;
      }

      .section-title {
        color: #a89968;
        font-weight: 700;
        font-size: 1em;
        margin-bottom: 8px;
        padding-bottom: 4px;
        border-bottom: 1px solid rgba(168, 153, 104, 0.3);
      }

      .data-row {
        padding: 4px 0;
        font-size: 0.95em;
        line-height: 1.5;
        color: #e8d5b7;
      }

      .field-label {
        color: #a89968;
        font-weight: 700;
        margin-right: 4px;
      }

      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 0.85em;
        font-weight: 600;
        margin: 0 2px;
        background: rgba(168, 153, 104, 0.2);
        color: #a89968;
        border: 1px solid rgba(168, 153, 104, 0.4);
      }

      .subsection-title {
        color: #cbd5e0;
        font-weight: 600;
        margin-top: 8px;
        margin-bottom: 4px;
      }

      @media (max-width: 600px) {
        .panel-header {
          padding: 12px 14px;
        }
        .panel-title {
          font-size: 1em;
          letter-spacing: 1px;
        }
        .panel-content {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="output-container">
      <div id="content"></div>
    </div>

    <script>
      /**
       * 从文本中提取 char_info 面板
       */
      function extractCharInfo(text) {
        const regex = /<char_info>([\s\S]*?)<\/char_info>/;
        const match = text.match(regex);
        if (!match) return null;
        return parseCharContent(match[1].trim());
      }

      /**
       * 解析角色信息内容
       */
      function parseCharContent(content) {
        const lines = content.split('\n');
        const sections = [];
        let currentSection = null;

        _.forEach(lines, line => {
          if (!line.trim()) return;

          const indent = line.search(/\S/);
          const trimmed = line.trim();

          // 一级标题（无缩进）
          if (indent === 0) {
            if (currentSection) sections.push(currentSection);
            currentSection = { title: trimmed, rows: [], subsections: [] };
          } else if (currentSection) {
            // 二级标题（有缩进，以冒号结尾）
            if (indent === 2 && trimmed.endsWith(':')) {
              const subsectionTitle = trimmed.slice(0, -1);
              currentSection.subsections.push({
                title: subsectionTitle,
                rows: [],
              });
            } else if (currentSection.subsections.length > 0) {
              // 添加到最后一个子部分
              const lastSubsection = _.last(currentSection.subsections);
              lastSubsection.rows.push(trimmed);
            } else {
              // 添加到主部分
              currentSection.rows.push(trimmed);
            }
          }
        });

        if (currentSection) sections.push(currentSection);
        return { sections };
      }

      /**
       * 美化单行数据
       */
      function beautifyRow(row) {
        let html = _.escape(row);

        // 品质标签
        const qualities = ['凡', '黄', '玄', '地', '天'];
        qualities.forEach(q => {
          html = html.replace(
            new RegExp(`品质:\\s*${q}`, 'g'),
            `<span class="field-label">品质:</span> <span class="tag">${q}</span>`,
          );
        });

        // 五行标签
        const elements = ['火', '水', '木', '金', '土', '阴', '阳'];
        elements.forEach(elem => {
          html = html.replace(
            new RegExp(`五行:\\s*\\[${elem}\\]`, 'g'),
            `<span class="field-label">五行:</span> <span class="tag">[${elem}]</span>`,
          );
          html = html.replace(
            new RegExp(`灵根五行:\\s*\\[${elem}\\]`, 'g'),
            `<span class="field-label">灵根五行:</span> <span class="tag">[${elem}]</span>`,
          );
        });

        // 境界标签
        const realms = ['渡劫', '大乘', '合体', '分神', '元神', '化神', '炼虚', '炼神', '金丹', '筑基', '练气'];
        realms.forEach(realm => {
          html = html.replace(
            new RegExp(`境界:\\s*${realm}`, 'g'),
            `<span class="field-label">境界:</span> <span class="tag">${realm}</span>`,
          );
        });

        // 类型标签
        const types = ['心法', '咒法', '身法', '护体', '武器', '防具', '法宝', '符箓', '丹药'];
        types.forEach(type => {
          html = html.replace(
            new RegExp(`类型:\\s*${type}`, 'g'),
            `<span class="field-label">类型:</span> <span class="tag">${type}</span>`,
          );
        });

        // 使用中标签
        html = html.replace(/使用中:\s*(true|false)/g, (m, val) => {
          const status = val === 'true' ? '✓ 使用中' : '✗ 未使用';
          return `<span class="field-label">使用中:</span> <span class="tag">${status}</span>`;
        });

        return html;
      }

      /**
       * 渲染面板
       */
      function renderPanel(charData, containerSelector) {
        const $container = $(containerSelector);
        $container.empty();

        const $panel = $(`
        <div class="char-panel">
          <div class="panel-header">
            <i class="panel-icon fa-solid fa-user"></i>
            <span class="panel-title">角色信息</span>
            <i class="panel-toggle fa-solid fa-chevron-down"></i>
          </div>
          <div class="panel-content"></div>
        </div>
      `);

        const $content = $panel.find('.panel-content');

        _.forEach(charData.sections, section => {
          const $section = $(`<div class="section"></div>`);

          // 添加一级标题
          if (section.title) {
            $section.append(`<div class="section-title">${section.title}</div>`);
          }

          // 添加一级内容行
          _.forEach(section.rows, row => {
            $section.append(`<div class="data-row">${beautifyRow(row)}</div>`);
          });

          // 添加二级子部分
          _.forEach(section.subsections, subsection => {
            const $subsection = $(`<div></div>`);

            if (subsection.title) {
              $subsection.append(`<div class="subsection-title">${subsection.title}</div>`);
            }

            _.forEach(subsection.rows, row => {
              $subsection.append(`<div class="data-row" style="padding-left: 12px;">${beautifyRow(row)}</div>`);
            });

            $section.append($subsection);
          });

          $content.append($section);
        });

        $panel.find('.panel-header').on('click', function () {
          $(this).toggleClass('collapsed');
          $(this).next('.panel-content').toggleClass('collapsed');
        });

        $container.append($panel);
      }

      /**
       * 主函数
       */
      function processCharInfo(text) {
        const charData = extractCharInfo(text);
        if (charData) {
          renderPanel(charData, '#content');
        }
      }

      // 页面加载完成后执行
      $(() => {
        const mockText = `$0`;
        processCharInfo(mockText);
      });
    </script>
  </body>
</html>
